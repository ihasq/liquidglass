<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Multi-Element Atlas Test</title>
  <style>
    body { margin: 0; padding: 20px; background: #1a1a2e; font-family: monospace; color: #fff; }
    .test-grid { display: flex; gap: 20px; flex-wrap: wrap; }
    .element-test { background: #2a2a3e; padding: 10px; border-radius: 8px; }
    .element-test h4 { margin: 0 0 5px 0; font-size: 11px; color: #888; }
    .container {
      position: relative;
      background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
      overflow: hidden;
    }
    .container::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 9px, rgba(255,255,255,0.3) 9px, rgba(255,255,255,0.3) 10px),
        repeating-linear-gradient(90deg, transparent, transparent 9px, rgba(255,255,255,0.3) 9px, rgba(255,255,255,0.3) 10px);
    }
    liquid-glass { position: absolute; }
    #results { margin-top: 20px; padding: 15px; background: #000; border-radius: 8px; white-space: pre; font-size: 10px; max-height: 400px; overflow: auto; }
    .pass { color: #0f0; }
    .fail { color: #f00; }
    canvas { border: 1px solid #333; margin: 2px; }
  </style>
</head>
<body>
  <h2>Multi-Element Atlas Consistency Test</h2>

  <div class="test-grid" id="test-grid"></div>

  <div id="results">Initializing...</div>

  <script type="module">
    import { LiquidGlassElement } from '../src/index.ts';
    import { generateCanvasDisplacementMap } from '../src/core/displacement/canvas-generator.ts';

    // Test configurations - different sizes and radii
    const testConfigs = [
      { id: 'el1', width: 150, height: 80, radius: 12, left: 10, top: 10 },
      { id: 'el2', width: 100, height: 100, radius: 20, left: 10, top: 10 },
      { id: 'el3', width: 200, height: 60, radius: 8, left: 10, top: 10 },
      { id: 'el4', width: 80, height: 120, radius: 16, left: 10, top: 10 },
    ];

    const grid = document.getElementById('test-grid');

    // Create test elements
    for (const cfg of testConfigs) {
      const wrapper = document.createElement('div');
      wrapper.className = 'element-test';
      wrapper.innerHTML = `
        <h4>${cfg.id}: ${cfg.width}x${cfg.height}, r=${cfg.radius}</h4>
        <div class="container" style="width:${cfg.width + 20}px;height:${cfg.height + 20}px;">
          <liquid-glass id="${cfg.id}"
            style="left:${cfg.left}px;top:${cfg.top}px;width:${cfg.width}px;height:${cfg.height}px;border-radius:${cfg.radius}px;"
            refraction="50" thickness="50">
          </liquid-glass>
        </div>
        <div style="display:flex;gap:5px;margin-top:5px;">
          <div><div style="font-size:9px;color:#666;">Atlas</div><canvas id="atlas-${cfg.id}" width="${cfg.width}" height="${cfg.height}"></canvas></div>
          <div><div style="font-size:9px;color:#666;">Ref</div><canvas id="ref-${cfg.id}" width="${cfg.width}" height="${cfg.height}"></canvas></div>
          <div><div style="font-size:9px;color:#666;">Diff</div><canvas id="diff-${cfg.id}" width="${cfg.width}" height="${cfg.height}"></canvas></div>
        </div>
        <div id="info-${cfg.id}" style="font-size:9px;color:#888;"></div>
      `;
      grid.appendChild(wrapper);
    }

    async function runTests() {
      const results = document.getElementById('results');
      results.textContent = 'Waiting for renders...\n';

      await new Promise(r => setTimeout(r, 3000));

      const report = ['=== Multi-Element Atlas Consistency Test ===\n'];
      let allPass = true;

      // Get SVG filters
      const svg = document.querySelector('svg');
      if (!svg) {
        results.innerHTML = '<span class="fail">ERROR: No SVG container found</span>';
        return;
      }

      const filters = svg.querySelectorAll('filter');
      report.push(`Found ${filters.length} filters\n`);

      // Map filters to elements by examining CSS
      for (const cfg of testConfigs) {
        const el = document.getElementById(cfg.id);
        const computedStyle = getComputedStyle(el);
        const backdropFilter = computedStyle.backdropFilter || computedStyle.webkitBackdropFilter;

        report.push(`\n--- ${cfg.id} (${cfg.width}x${cfg.height}, r=${cfg.radius}) ---`);

        // Find the filter URL
        const filterMatch = backdropFilter?.match(/url\(["']?#([^"')]+)["']?\)/);
        if (!filterMatch) {
          report.push('  No filter URL found');
          allPass = false;
          continue;
        }

        const filterId = filterMatch[1];
        const filter = svg.querySelector(`#${filterId}`);
        if (!filter) {
          report.push(`  Filter ${filterId} not found in SVG`);
          allPass = false;
          continue;
        }

        const feImage = filter.querySelector('feImage[result="d"]');
        if (!feImage) {
          report.push('  No displacement feImage found');
          allPass = false;
          continue;
        }

        const href = feImage.getAttribute('href');
        let atlasDataUrl = null;
        let viewBox = null;

        if (href.startsWith('data:image/svg+xml')) {
          const decoded = decodeURIComponent(href.replace('data:image/svg+xml,', ''));
          const viewBoxMatch = decoded.match(/viewBox="([^"]+)"/);
          const imgSizeMatch = decoded.match(/<image[^>]*width="(\d+)"[^>]*height="(\d+)"/);
          const pngMatch = decoded.match(/href="(data:image\/png;base64,[^"]+)"/);
          viewBox = viewBoxMatch?.[1];
          atlasDataUrl = pngMatch?.[1];
          report.push(`  ViewBox: ${viewBox}`);
          report.push(`  Atlas image size: ${imgSizeMatch?.[1]}x${imgSizeMatch?.[2]}`);
        } else {
          atlasDataUrl = href;
          report.push('  Direct PNG (not atlas mode)');
        }

        if (!atlasDataUrl) {
          report.push('  Could not extract displacement map');
          allPass = false;
          continue;
        }

        // Load and compare
        const atlasImg = new Image();
        await new Promise((resolve, reject) => {
          atlasImg.onload = resolve;
          atlasImg.onerror = reject;
          atlasImg.src = atlasDataUrl;
        });

        const [vx, vy, vw, vh] = (viewBox || `0 0 ${cfg.width} ${cfg.height}`).split(' ').map(Number);

        // Verify viewBox dimensions match element
        if (vw !== cfg.width || vh !== cfg.height) {
          report.push(`  <span class="fail">✗ ViewBox size mismatch: expected ${cfg.width}x${cfg.height}, got ${vw}x${vh}</span>`);
          allPass = false;
        }

        // Extract atlas region
        const atlasCanvas = document.getElementById(`atlas-${cfg.id}`);
        const atlasCtx = atlasCanvas.getContext('2d');
        atlasCtx.drawImage(atlasImg, vx, vy, vw, vh, 0, 0, vw, vh);

        // Generate reference
        const refResult = generateCanvasDisplacementMap({
          width: cfg.width,
          height: cfg.height,
          borderRadius: cfg.radius,
          edgeWidthRatio: 0.5
        });

        const refCanvas = document.getElementById(`ref-${cfg.id}`);
        const refCtx = refCanvas.getContext('2d');
        refCtx.drawImage(refResult.canvas, 0, 0);

        // Compare pixels
        const atlasData = atlasCtx.getImageData(0, 0, cfg.width, cfg.height).data;
        const refData = refCtx.getImageData(0, 0, cfg.width, cfg.height).data;

        const diffCanvas = document.getElementById(`diff-${cfg.id}`);
        const diffCtx = diffCanvas.getContext('2d');
        const diffImageData = diffCtx.createImageData(cfg.width, cfg.height);
        const diffData = diffImageData.data;

        let maxDiff = 0;
        let mismatchPixels = 0;

        for (let i = 0; i < atlasData.length; i += 4) {
          const rDiff = Math.abs(atlasData[i] - refData[i]);
          const gDiff = Math.abs(atlasData[i + 1] - refData[i + 1]);
          const diff = Math.max(rDiff, gDiff);
          maxDiff = Math.max(maxDiff, diff);
          if (diff > 2) mismatchPixels++;

          diffData[i] = Math.min(255, diff * 20);
          diffData[i + 1] = 0;
          diffData[i + 2] = 0;
          diffData[i + 3] = 255;
        }

        diffCtx.putImageData(diffImageData, 0, 0);

        const pixelCount = (cfg.width * cfg.height);
        const mismatchPct = (mismatchPixels / pixelCount * 100).toFixed(2);

        document.getElementById(`info-${cfg.id}`).textContent =
          `MaxDiff: ${maxDiff}, Mismatches: ${mismatchPct}%`;

        if (maxDiff === 0) {
          report.push(`  <span class="pass">✓ IDENTICAL (diff=0)</span>`);
        } else if (maxDiff <= 2) {
          report.push(`  <span class="pass">✓ PASS (maxDiff=${maxDiff})</span>`);
        } else {
          report.push(`  <span class="fail">✗ FAIL: maxDiff=${maxDiff}, mismatches=${mismatchPct}%</span>`);
          allPass = false;
        }
      }

      report.push('\n' + '='.repeat(50));
      if (allPass) {
        report.push('<span class="pass">ALL TESTS PASSED</span>');
      } else {
        report.push('<span class="fail">SOME TESTS FAILED</span>');
      }

      results.innerHTML = report.join('\n');

      window.__testResult = { allPass };
    }

    runTests().catch(e => {
      document.getElementById('results').innerHTML = '<span class="fail">ERROR: ' + e.message + '</span>';
      console.error(e);
    });
  </script>
</body>
</html>
