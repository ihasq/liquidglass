<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU Displacement Map Test</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1, h2 { color: #00d4ff; }
        .test-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 20px 0;
        }
        .test-card {
            background: #16213e;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .test-card h3 {
            margin: 0 0 10px;
            font-size: 14px;
            color: #888;
        }
        .test-card canvas {
            border: 1px solid #333;
            border-radius: 4px;
            max-width: 100%;
        }
        .test-card .time {
            margin-top: 8px;
            font-size: 12px;
            color: #0f0;
        }
        .controls {
            background: #16213e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .controls label {
            display: block;
            margin: 10px 0 5px;
        }
        .controls input {
            width: 100%;
            max-width: 300px;
        }
        button {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
        button:hover { background: #00a8cc; }
        button:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }
        .status {
            padding: 10px;
            border-radius: 6px;
            margin: 20px 0;
        }
        .status.success { background: #1b4332; }
        .status.error { background: #5c1d1d; }
        .status.info { background: #1e3a5f; }
        .diff-result {
            margin-top: 20px;
            padding: 15px;
            background: #16213e;
            border-radius: 12px;
        }
        .diff-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }
        .diff-row:last-child { border-bottom: none; }
        .diff-row.pass { color: #0f0; }
        .diff-row.fail { color: #f00; }
    </style>
</head>
<body>
    <h1>WebGPU Displacement Map Test</h1>

    <div class="controls">
        <h2>Parameters</h2>
        <label>Width: <span id="widthVal">200</span>px</label>
        <input type="range" id="width" min="50" max="500" value="200">

        <label>Height: <span id="heightVal">200</span>px</label>
        <input type="range" id="height" min="50" max="500" value="200">

        <label>Border Radius: <span id="radiusVal">20</span>px</label>
        <input type="range" id="radius" min="0" max="100" value="20">

        <label>Edge Width Ratio: <span id="edgeVal">0.5</span></label>
        <input type="range" id="edge" min="10" max="100" value="50">

        <button id="runTest">Run Equivalence Test</button>
    </div>

    <div id="statusBox" class="status info">
        Checking WebGPU support...
    </div>

    <div class="test-grid">
        <div class="test-card">
            <h3>WASM-SIMD</h3>
            <canvas id="wasmCanvas"></canvas>
            <div class="time" id="wasmTime">-</div>
        </div>
        <div class="test-card">
            <h3>WebGL2</h3>
            <canvas id="gl2Canvas"></canvas>
            <div class="time" id="gl2Time">-</div>
        </div>
        <div class="test-card">
            <h3>WebGPU</h3>
            <canvas id="gpuCanvas"></canvas>
            <div class="time" id="gpuTime">-</div>
        </div>
    </div>

    <div id="diffResult" class="diff-result" style="display: none;">
        <h3>Pixel Difference Analysis</h3>
        <div id="diffContent"></div>
    </div>

    <script type="module">
        import {
            generateWasmDisplacementMap,
            preloadWasm,
            isWasmSimdSupported,
        } from '../src/core/displacement/wasm-generator.ts';

        import {
            generateWebGL2DisplacementMap,
            preloadWebGL2,
            isWebGL2Supported,
        } from '../src/core/displacement/webgl2-generator.ts';

        import {
            generateWebGPUDisplacementMap,
            preloadWebGPU,
            isWebGPUSupported,
        } from '../src/core/displacement/webgpu-generator.ts';

        const statusBox = document.getElementById('statusBox');
        const runButton = document.getElementById('runTest');

        // Slider updates
        const sliders = ['width', 'height', 'radius', 'edge'];
        sliders.forEach(id => {
            const slider = document.getElementById(id);
            const valSpan = document.getElementById(id + 'Val');
            slider.addEventListener('input', () => {
                if (id === 'edge') {
                    valSpan.textContent = (slider.value / 100).toFixed(2);
                } else {
                    valSpan.textContent = slider.value;
                }
            });
        });

        // Check support and preload
        async function init() {
            const supports = {
                wasm: isWasmSimdSupported(),
                gl2: isWebGL2Supported(),
                gpu: isWebGPUSupported(),
            };

            statusBox.innerHTML = `
                <strong>Support Status:</strong><br>
                WASM-SIMD: ${supports.wasm ? '✅' : '❌'}<br>
                WebGL2: ${supports.gl2 ? '✅' : '❌'}<br>
                WebGPU: ${supports.gpu ? '✅' : '❌'}
            `;

            if (!supports.gpu) {
                statusBox.className = 'status error';
                statusBox.innerHTML += '<br><br>⚠️ WebGPU not supported in this browser';
                runButton.disabled = true;
                return;
            }

            statusBox.className = 'status info';
            statusBox.innerHTML += '<br><br>Preloading...';

            await Promise.all([
                preloadWasm(),
                preloadWebGL2(),
                preloadWebGPU(),
            ]);

            statusBox.className = 'status success';
            statusBox.innerHTML += '<br>✅ All backends ready!';
            runButton.disabled = false;
        }

        // Run equivalence test
        async function runTest() {
            const options = {
                width: parseInt(document.getElementById('width').value),
                height: parseInt(document.getElementById('height').value),
                borderRadius: parseInt(document.getElementById('radius').value),
                edgeWidthRatio: parseInt(document.getElementById('edge').value) / 100,
            };

            statusBox.className = 'status info';
            statusBox.textContent = 'Running test...';
            runButton.disabled = true;

            try {
                // Generate with all backends
                const [wasmResult, gl2Result, gpuResult] = await Promise.all([
                    generateWasmDisplacementMap(options),
                    generateWebGL2DisplacementMap(options),
                    generateWebGPUDisplacementMap(options),
                ]);

                // Display results
                displayCanvas('wasmCanvas', wasmResult?.canvas);
                displayCanvas('gl2Canvas', gl2Result?.canvas);
                displayCanvas('gpuCanvas', gpuResult?.canvas);

                document.getElementById('wasmTime').textContent =
                    wasmResult ? `${wasmResult.generationTime.toFixed(2)}ms` : 'Failed';
                document.getElementById('gl2Time').textContent =
                    gl2Result ? `${gl2Result.generationTime.toFixed(2)}ms` : 'Failed';
                document.getElementById('gpuTime').textContent =
                    gpuResult ? `${gpuResult.generationTime.toFixed(2)}ms` : 'Failed';

                // Compare pixels
                if (wasmResult && gl2Result && gpuResult) {
                    const wasmData = getCanvasData(wasmResult.canvas);
                    const gl2Data = getCanvasData(gl2Result.canvas);
                    const gpuData = getCanvasData(gpuResult.canvas);

                    const wasmGl2Diff = comparePixels(wasmData, gl2Data);
                    const wasmGpuDiff = comparePixels(wasmData, gpuData);
                    const gl2GpuDiff = comparePixels(gl2Data, gpuData);

                    displayDiff({
                        'WASM vs WebGL2': wasmGl2Diff,
                        'WASM vs WebGPU': wasmGpuDiff,
                        'WebGL2 vs WebGPU': gl2GpuDiff,
                    });

                    const allPass = wasmGl2Diff.maxDiff <= 1 &&
                                   wasmGpuDiff.maxDiff <= 1 &&
                                   gl2GpuDiff.maxDiff <= 1;

                    statusBox.className = allPass ? 'status success' : 'status error';
                    statusBox.textContent = allPass
                        ? '✅ All backends produce equivalent output!'
                        : '⚠️ Pixel differences detected (may be acceptable rounding)';
                } else {
                    statusBox.className = 'status error';
                    statusBox.textContent = '❌ One or more backends failed';
                }
            } catch (error) {
                statusBox.className = 'status error';
                statusBox.textContent = `❌ Error: ${error.message}`;
                console.error(error);
            }

            runButton.disabled = false;
        }

        function displayCanvas(id, srcCanvas) {
            const canvas = document.getElementById(id);
            if (!srcCanvas) {
                canvas.width = 100;
                canvas.height = 100;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#333';
                ctx.fillRect(0, 0, 100, 100);
                ctx.fillStyle = '#f00';
                ctx.fillText('Failed', 30, 50);
                return;
            }
            canvas.width = srcCanvas.width;
            canvas.height = srcCanvas.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(srcCanvas, 0, 0);
        }

        function getCanvasData(canvas) {
            const ctx = canvas.getContext('2d');
            return ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        }

        function comparePixels(a, b) {
            let maxDiff = 0;
            let totalDiff = 0;
            let diffCount = 0;

            for (let i = 0; i < a.length; i++) {
                const diff = Math.abs(a[i] - b[i]);
                if (diff > 0) {
                    diffCount++;
                    totalDiff += diff;
                    maxDiff = Math.max(maxDiff, diff);
                }
            }

            return {
                maxDiff,
                avgDiff: diffCount > 0 ? (totalDiff / diffCount).toFixed(2) : 0,
                diffPixels: Math.floor(diffCount / 4),
                totalPixels: Math.floor(a.length / 4),
            };
        }

        function displayDiff(results) {
            const container = document.getElementById('diffResult');
            const content = document.getElementById('diffContent');
            container.style.display = 'block';

            content.innerHTML = Object.entries(results).map(([label, diff]) => {
                const pass = diff.maxDiff <= 1;
                return `
                    <div class="diff-row ${pass ? 'pass' : 'fail'}">
                        <span>${label}</span>
                        <span>Max: ${diff.maxDiff} | Avg: ${diff.avgDiff} | Pixels: ${diff.diffPixels}/${diff.totalPixels}</span>
                    </div>
                `;
            }).join('');
        }

        // Event listeners
        runButton.addEventListener('click', runTest);

        // Initialize
        init();
    </script>
</body>
</html>
