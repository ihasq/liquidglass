<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dynamic Resize Consistency Test</title>
  <style>
    body { margin: 0; padding: 20px; background: #1a1a2e; font-family: monospace; color: #fff; }
    .container {
      position: relative;
      width: 400px;
      height: 300px;
      background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
      overflow: hidden;
    }
    .container::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 19px, rgba(255,255,255,0.4) 19px, rgba(255,255,255,0.4) 20px),
        repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(255,255,255,0.4) 19px, rgba(255,255,255,0.4) 20px);
    }
    liquid-glass {
      position: absolute;
      transition: none;
    }
    #results {
      margin-top: 20px;
      padding: 15px;
      background: #000;
      border-radius: 8px;
      white-space: pre;
      font-size: 11px;
      max-height: 300px;
      overflow: auto;
    }
    .pass { color: #0f0; }
    .fail { color: #f00; }
    #status { margin: 10px 0; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Dynamic Resize Consistency Test</h2>
  <div id="status">Initializing...</div>

  <div class="container">
    <liquid-glass id="el1" style="left:20px;top:20px;width:150px;height:100px;border-radius:16px;" refraction="50" thickness="50"></liquid-glass>
    <liquid-glass id="el2" style="left:200px;top:150px;width:120px;height:80px;border-radius:12px;" refraction="50" thickness="50"></liquid-glass>
  </div>

  <div id="results"></div>

  <script type="module">
    import { LiquidGlassElement } from '../src/index.ts';
    import { generateCanvasDisplacementMap } from '../src/core/displacement/canvas-generator.ts';

    const status = document.getElementById('status');
    const results = document.getElementById('results');
    const el1 = document.getElementById('el1');
    const el2 = document.getElementById('el2');

    let testCount = 0;
    let passCount = 0;
    let failCount = 0;
    const failures = [];

    async function verifyElement(el, name) {
      const rect = el.getBoundingClientRect();
      const width = Math.ceil(rect.width);
      const height = Math.ceil(rect.height);
      const borderRadius = parseFloat(getComputedStyle(el).borderRadius) || 0;

      // Find the filter
      const computedStyle = getComputedStyle(el);
      const backdropFilter = computedStyle.backdropFilter || computedStyle.webkitBackdropFilter;
      const filterMatch = backdropFilter?.match(/url\(["']?#([^"')]+)["']?\)/);
      if (!filterMatch) return { error: 'No filter' };

      const svg = document.querySelector('svg');
      const filter = svg?.querySelector(`#${filterMatch[1]}`);
      const feImage = filter?.querySelector('feImage[result="d"]');
      if (!feImage) return { error: 'No feImage' };

      const href = feImage.getAttribute('href');
      let atlasDataUrl, viewBox;

      if (href.startsWith('data:image/svg+xml')) {
        const decoded = decodeURIComponent(href.replace('data:image/svg+xml,', ''));
        const viewBoxMatch = decoded.match(/viewBox="([^"]+)"/);
        const pngMatch = decoded.match(/href="(data:image\/png;base64,[^"]+)"/);
        viewBox = viewBoxMatch?.[1];
        atlasDataUrl = pngMatch?.[1];
      } else {
        atlasDataUrl = href;
      }

      if (!atlasDataUrl) return { error: 'No atlas' };

      // Load atlas
      const atlasImg = new Image();
      await new Promise((resolve, reject) => {
        atlasImg.onload = resolve;
        atlasImg.onerror = reject;
        atlasImg.src = atlasDataUrl;
      });

      const [vx, vy, vw, vh] = (viewBox || `0 0 ${width} ${height}`).split(' ').map(Number);

      // Verify dimensions match
      if (vw !== width || vh !== height) {
        return { error: `Size mismatch: viewBox ${vw}x${vh} vs element ${width}x${height}` };
      }

      // Extract and compare
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(atlasImg, vx, vy, vw, vh, 0, 0, vw, vh);
      const atlasData = ctx.getImageData(0, 0, width, height).data;

      const ref = generateCanvasDisplacementMap({ width, height, borderRadius, edgeWidthRatio: 0.5 });
      const refCtx = ref.canvas.getContext('2d');
      const refData = refCtx.getImageData(0, 0, width, height).data;

      let maxDiff = 0;
      for (let i = 0; i < atlasData.length; i += 4) {
        const diff = Math.max(
          Math.abs(atlasData[i] - refData[i]),
          Math.abs(atlasData[i+1] - refData[i+1])
        );
        maxDiff = Math.max(maxDiff, diff);
      }

      return { pass: maxDiff <= 2, maxDiff, width, height, viewBox };
    }

    async function runIteration() {
      testCount++;

      // Random resize
      const newWidth1 = 100 + Math.floor(Math.random() * 150);
      const newHeight1 = 60 + Math.floor(Math.random() * 100);
      const newWidth2 = 80 + Math.floor(Math.random() * 120);
      const newHeight2 = 50 + Math.floor(Math.random() * 80);

      el1.style.width = newWidth1 + 'px';
      el1.style.height = newHeight1 + 'px';
      el2.style.width = newWidth2 + 'px';
      el2.style.height = newHeight2 + 'px';

      // Wait for render
      await new Promise(r => setTimeout(r, 200));

      // Verify
      const result1 = await verifyElement(el1, 'el1');
      const result2 = await verifyElement(el2, 'el2');

      let iterPass = true;

      if (result1.error) {
        failures.push(`#${testCount} el1: ${result1.error}`);
        iterPass = false;
      } else if (!result1.pass) {
        failures.push(`#${testCount} el1: maxDiff=${result1.maxDiff} (${result1.width}x${result1.height})`);
        iterPass = false;
      }

      if (result2.error) {
        failures.push(`#${testCount} el2: ${result2.error}`);
        iterPass = false;
      } else if (!result2.pass) {
        failures.push(`#${testCount} el2: maxDiff=${result2.maxDiff} (${result2.width}x${result2.height})`);
        iterPass = false;
      }

      if (iterPass) {
        passCount++;
      } else {
        failCount++;
      }

      status.innerHTML = `Test ${testCount}: ${iterPass ? '<span class="pass">PASS</span>' : '<span class="fail">FAIL</span>'} | Total: ${passCount}/${testCount} passed`;
    }

    async function runAllTests() {
      results.textContent = 'Starting dynamic resize tests...\n';

      // Initial wait
      await new Promise(r => setTimeout(r, 2000));

      // Run 20 iterations
      for (let i = 0; i < 20; i++) {
        await runIteration();
        await new Promise(r => setTimeout(r, 100));
      }

      // Final report
      let report = [];
      report.push('=== Dynamic Resize Test Complete ===');
      report.push(`Iterations: ${testCount}`);
      report.push(`Passed: ${passCount}`);
      report.push(`Failed: ${failCount}`);
      report.push('');

      if (failCount === 0) {
        report.push('<span class="pass">ALL TESTS PASSED</span>');
      } else {
        report.push('<span class="fail">FAILURES:</span>');
        for (const f of failures) {
          report.push('  ' + f);
        }
      }

      results.innerHTML = report.join('\n');

      window.__testResult = {
        total: testCount,
        passed: passCount,
        failed: failCount,
        allPass: failCount === 0
      };
    }

    runAllTests().catch(e => {
      results.innerHTML = '<span class="fail">ERROR: ' + e.message + '</span>';
      console.error(e);
    });
  </script>
</body>
</html>
