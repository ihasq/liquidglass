<!DOCTYPE html>
<html>
<head>
  <title>WebGL2 Instancing Benchmark</title>
  <style>
    body { margin: 0; padding: 20px; background: #1a1a2e; color: #eee; font-family: monospace; }
    #log { white-space: pre-wrap; font-size: 12px; background: #000; padding: 15px; border-radius: 8px; max-height: 600px; overflow-y: auto; }
    button { padding: 12px 24px; margin: 10px 5px 10px 0; font-size: 14px; cursor: pointer; background: #4a4a8a; color: white; border: none; border-radius: 4px; }
    button:hover { background: #5a5a9a; }
    h2 { margin-bottom: 10px; }
  </style>
</head>
<body>
  <h2>WebGL2 Instanced Triangle Strip Benchmark</h2>
  <div>
    <button onclick="runBenchmark()">Run Benchmark</button>
    <button onclick="copyResults()">Copy Results</button>
  </div>
  <div id="log"></div>

<script type="module">
const log = (msg) => {
  const el = document.getElementById('log');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
  console.log(msg);
};

// ============================================================================
// Fullscreen vertex shader
// ============================================================================
const FULLSCREEN_VERT = `#version 300 es
void main() {
    int vi = gl_VertexID;
    float x = float(((vi & 1) << 2)) - 1.0;
    float y = float(((vi & 2) << 1)) - 1.0;
    gl_Position = vec4(x, y, 0.0, 1.0);
}
`;

// ============================================================================
// Single-Pass fragment
// ============================================================================
const SINGLE_PASS_FRAG = `#version 300 es
precision highp float;
uniform vec2 u_resolution;
uniform float u_borderRadius;
uniform float u_edgeWidthRatio;
out vec4 fragColor;

const float LOG2E = 1.4426950408889634;
const float LN2 = 0.6931471805599453;

float fastExp(float x) {
    if (x < -87.0) return 0.0;
    if (x > 0.0) return 1.0;
    float k = floor(x * LOG2E);
    float r = x - k * LN2;
    float r2 = r * r;
    return (1.0 + r + r2 * 0.5 + r2 * r * 0.16666667 + r2 * r2 * 0.04166667) * exp2(k);
}

void main() {
    float fw = u_resolution.x;
    float fh = u_resolution.y;
    float halfW = fw * 0.5;
    float halfH = fh * 0.5;
    float minHalf = min(halfW, halfH);
    float edgeW = minHalf * u_edgeWidthRatio;
    float r = min(u_borderRadius, minHalf);
    float neg3ew = -3.0 / edgeW;
    float ctX = halfW - r;
    float ctY = halfH - r;

    float px = gl_FragCoord.x - 0.5;
    float py = gl_FragCoord.y - 0.5;
    float dx = abs(px - halfW + 0.5);
    float dy = abs(py - halfH + 0.5);
    float sx = px >= halfW ? 1.0 : -1.0;
    float sy = py >= halfH ? 1.0 : -1.0;

    bool inCorner = dx > ctX && dy > ctY;
    float dist; float dirX = 0.0; float dirY = 0.0;

    if (inCorner) {
        float cx = dx - ctX; float cy = dy - ctY;
        float cd = sqrt(cx * cx + cy * cy);
        dist = r - cd;
        if (cd > 0.001) { float inv = 1.0 / cd; dirX = cx * inv * sx; dirY = cy * inv * sy; }
    } else {
        float distX = halfW - dx; float distY = halfH - dy;
        if (distX < distY) { dist = distX; dirX = sx; } else { dist = distY; dirY = sy; }
    }

    float mag = fastExp(max(dist, 0.0) * neg3ew);
    fragColor = vec4(
        clamp(floor(128.0 - dirX * mag * 127.0), 0.0, 255.0) / 255.0,
        clamp(floor(128.0 - dirY * mag * 127.0), 0.0, 255.0) / 255.0,
        128.0 / 255.0, 1.0
    );
}
`;

// ============================================================================
// Quadrant fragment
// ============================================================================
const QUADRANT_FRAG = `#version 300 es
precision highp float;
uniform vec2 u_quadRes;
uniform vec2 u_fullRes;
uniform float u_borderRadius;
uniform float u_edgeWidthRatio;
out vec4 fragColor;

const float LOG2E = 1.4426950408889634;
const float LN2 = 0.6931471805599453;

float fastExp(float x) {
    if (x < -87.0) return 0.0;
    if (x > 0.0) return 1.0;
    float k = floor(x * LOG2E);
    float r = x - k * LN2;
    float r2 = r * r;
    return (1.0 + r + r2 * 0.5 + r2 * r * 0.16666667 + r2 * r2 * 0.04166667) * exp2(k);
}

void main() {
    float fw = u_fullRes.x;
    float fh = u_fullRes.y;
    float halfW = fw * 0.5;
    float halfH = fh * 0.5;
    float minHalf = min(halfW, halfH);
    float edgeW = minHalf * u_edgeWidthRatio;
    float r = min(u_borderRadius, minHalf);
    float neg3ew = -3.0 / edgeW;
    float ctX = halfW - r;
    float ctY = halfH - r;

    float dx = gl_FragCoord.x - 0.5;
    float dy = gl_FragCoord.y - 0.5;
    bool inCorner = dx > ctX && dy > ctY;

    float dist; float dirX = 0.0; float dirY = 0.0;
    if (inCorner) {
        float cx = dx - ctX; float cy = dy - ctY;
        float cd = sqrt(cx * cx + cy * cy);
        dist = r - cd;
        if (cd > 0.001) { float inv = 1.0 / cd; dirX = cx * inv; dirY = cy * inv; }
    } else {
        float distX = halfW - dx; float distY = halfH - dy;
        if (distX < distY) { dist = distX; dirX = 1.0; } else { dist = distY; dirY = 1.0; }
    }

    float mag = fastExp(max(dist, 0.0) * neg3ew);
    fragColor = vec4(
        clamp(floor(128.0 - dirX * mag * 127.0), 0.0, 255.0) / 255.0,
        clamp(floor(128.0 - dirY * mag * 127.0), 0.0, 255.0) / 255.0,
        128.0 / 255.0, 1.0
    );
}
`;

// ============================================================================
// Instanced vertex shader (triangle strip)
// ============================================================================
const INSTANCED_VERT = `#version 300 es
flat out uint v_quadrantId;
out vec2 v_localUV;

void main() {
    int vi = gl_VertexID;
    int ii = gl_InstanceID;

    vec2 stripVerts[4] = vec2[4](
        vec2(0.0, 0.0), vec2(1.0, 0.0),
        vec2(0.0, 1.0), vec2(1.0, 1.0)
    );

    vec2 localPos = stripVerts[vi];
    float quadX = float(ii & 1);
    float quadY = float(ii >> 1);

    vec2 clipPos;
    clipPos.x = (localPos.x + quadX) - 1.0;
    clipPos.y = 1.0 - (localPos.y + quadY);

    gl_Position = vec4(clipPos, 0.0, 1.0);
    v_quadrantId = uint(ii);
    v_localUV = localPos;
}
`;

// ============================================================================
// Instanced fragment shader
// ============================================================================
const INSTANCED_FRAG = `#version 300 es
precision highp float;
uniform sampler2D u_quadrantTexture;
flat in uint v_quadrantId;
in vec2 v_localUV;
out vec4 fragColor;

void main() {
    vec2 uv = v_localUV;
    bool mirrorX = (v_quadrantId & 1u) == 0u;
    bool mirrorY = v_quadrantId < 2u;
    if (mirrorX) uv.x = 1.0 - uv.x;
    if (mirrorY) uv.y = 1.0 - uv.y;
    vec4 color = texture(u_quadrantTexture, uv);
    bool invertR = (v_quadrantId & 1u) == 0u;
    bool invertG = v_quadrantId < 2u;
    if (invertR) color.r = 1.0 - color.r;
    if (invertG) color.g = 1.0 - color.g;
    fragColor = color;
}
`;

function compileShader(gl, type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    throw new Error(gl.getShaderInfoLog(shader));
  }
  return shader;
}

function createProgram(gl, vs, fs) {
  const prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    throw new Error(gl.getProgramInfoLog(prog));
  }
  return prog;
}

async function runBenchmark() {
  log('=== WebGL2 INSTANCING BENCHMARK ===\n');

  const canvas = document.createElement('canvas');
  const gl = canvas.getContext('webgl2', { antialias: false, depth: false, stencil: false });
  if (!gl) { log('ERROR: WebGL2 not available'); return; }
  log('WebGL2: Available');

  const sizes = [{ w: 256, h: 256 }, { w: 512, h: 512 }, { w: 1024, h: 1024 }];
  const iterations = 200;
  const warmup = 50;

  log(`Testing ${sizes.length} sizes × ${iterations} iterations\n`);

  // Create programs
  const fsVert = compileShader(gl, gl.VERTEX_SHADER, FULLSCREEN_VERT);
  const singleFrag = compileShader(gl, gl.FRAGMENT_SHADER, SINGLE_PASS_FRAG);
  const singleProg = createProgram(gl, fsVert, singleFrag);

  const quadFrag = compileShader(gl, gl.FRAGMENT_SHADER, QUADRANT_FRAG);
  const quadProg = createProgram(gl, fsVert, quadFrag);

  const instVert = compileShader(gl, gl.VERTEX_SHADER, INSTANCED_VERT);
  const instFrag = compileShader(gl, gl.FRAGMENT_SHADER, INSTANCED_FRAG);
  const instProg = createProgram(gl, instVert, instFrag);

  const vao = gl.createVertexArray();

  for (const { w, h } of sizes) {
    canvas.width = w;
    canvas.height = h;
    const qw = Math.ceil(w / 2), qh = Math.ceil(h / 2);

    // Create framebuffer and texture for quadrant
    const quadTex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, quadTex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, qw, qh, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);

    const fbo = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, quadTex, 0);
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);

    // Benchmark Single-Pass
    gl.bindVertexArray(vao);
    for (let i = 0; i < warmup; i++) {
      gl.viewport(0, 0, w, h);
      gl.useProgram(singleProg);
      gl.uniform2f(gl.getUniformLocation(singleProg, 'u_resolution'), w, h);
      gl.uniform1f(gl.getUniformLocation(singleProg, 'u_borderRadius'), 24);
      gl.uniform1f(gl.getUniformLocation(singleProg, 'u_edgeWidthRatio'), 0.5);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
    }
    gl.finish();

    const singleStart = performance.now();
    for (let i = 0; i < iterations; i++) {
      gl.viewport(0, 0, w, h);
      gl.useProgram(singleProg);
      gl.uniform2f(gl.getUniformLocation(singleProg, 'u_resolution'), w, h);
      gl.uniform1f(gl.getUniformLocation(singleProg, 'u_borderRadius'), 24);
      gl.uniform1f(gl.getUniformLocation(singleProg, 'u_edgeWidthRatio'), 0.5);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
    }
    gl.finish();
    const singleTime = (performance.now() - singleStart) / iterations;

    // Benchmark Instanced
    for (let i = 0; i < warmup; i++) {
      // Pass 1
      gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
      gl.viewport(0, 0, qw, qh);
      gl.useProgram(quadProg);
      gl.uniform2f(gl.getUniformLocation(quadProg, 'u_quadRes'), qw, qh);
      gl.uniform2f(gl.getUniformLocation(quadProg, 'u_fullRes'), w, h);
      gl.uniform1f(gl.getUniformLocation(quadProg, 'u_borderRadius'), 24);
      gl.uniform1f(gl.getUniformLocation(quadProg, 'u_edgeWidthRatio'), 0.5);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      // Pass 2
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      gl.viewport(0, 0, w, h);
      gl.useProgram(instProg);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, quadTex);
      gl.uniform1i(gl.getUniformLocation(instProg, 'u_quadrantTexture'), 0);
      gl.drawArraysInstanced(gl.TRIANGLE_STRIP, 0, 4, 4);
    }
    gl.finish();

    const instStart = performance.now();
    for (let i = 0; i < iterations; i++) {
      gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
      gl.viewport(0, 0, qw, qh);
      gl.useProgram(quadProg);
      gl.uniform2f(gl.getUniformLocation(quadProg, 'u_quadRes'), qw, qh);
      gl.uniform2f(gl.getUniformLocation(quadProg, 'u_fullRes'), w, h);
      gl.uniform1f(gl.getUniformLocation(quadProg, 'u_borderRadius'), 24);
      gl.uniform1f(gl.getUniformLocation(quadProg, 'u_edgeWidthRatio'), 0.5);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      gl.viewport(0, 0, w, h);
      gl.useProgram(instProg);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, quadTex);
      gl.uniform1i(gl.getUniformLocation(instProg, 'u_quadrantTexture'), 0);
      gl.drawArraysInstanced(gl.TRIANGLE_STRIP, 0, 4, 4);
    }
    gl.finish();
    const instTime = (performance.now() - instStart) / iterations;

    const winner = singleTime < instTime ? 'Single-Pass' : 'Instanced';
    const speedup = (Math.max(singleTime, instTime) / Math.min(singleTime, instTime)).toFixed(2);

    log(`${w}x${h}: Single=${singleTime.toFixed(3)}ms, Instanced=${instTime.toFixed(3)}ms => ${winner} wins (${speedup}x)`);

    gl.deleteTexture(quadTex);
    gl.deleteFramebuffer(fbo);
  }

  log('\nBenchmark complete!');
}

window.runBenchmark = runBenchmark;
window.copyResults = () => navigator.clipboard.writeText(document.getElementById('log').textContent).then(() => log('\nCopied!'));

log('Ready. Click "Run Benchmark" to compare WebGL2 Single-Pass vs Instanced.');
</script>
</body>
</html>
