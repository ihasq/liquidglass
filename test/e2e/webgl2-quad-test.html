<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebGL2 Quadrant Test</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        canvas { border: 1px solid #ccc; margin: 5px; }
        .result { padding: 10px; margin: 10px 0; }
        .pass { background: #d4edda; }
        .fail { background: #f8d7da; }
    </style>
</head>
<body>
    <h1>WebGL2 Quadrant Optimization Test</h1>
    <div id="results"></div>
    <div id="canvases"></div>
    
    <script type="module">
        import { generateWasmDisplacementMap, preloadWasm } from '../src/core/displacement/wasm-generator.ts';
        import { generateWebGL2DisplacementMap, preloadWebGL2 } from '../src/core/displacement/webgl2-generator.ts';

        const testCases = [
            { width: 100, height: 100, borderRadius: 20, edgeWidthRatio: 0.5, name: 'square-100' },
            { width: 200, height: 150, borderRadius: 30, edgeWidthRatio: 0.5, name: 'rect-200x150' },
            { width: 64, height: 64, borderRadius: 0, edgeWidthRatio: 0.5, name: 'no-radius' },
        ];

        async function runTest(config) {
            const { width, height, borderRadius, edgeWidthRatio } = config;

            const [wasmResult, webglResult] = await Promise.all([
                generateWasmDisplacementMap({ width, height, borderRadius, edgeWidthRatio }),
                generateWebGL2DisplacementMap({ width, height, borderRadius, edgeWidthRatio }),
            ]);

            if (!wasmResult || !webglResult) {
                return { error: 'Generation failed', wasmOk: !!wasmResult, webglOk: !!webglResult };
            }

            const wasmCtx = wasmResult.canvas.getContext('2d');
            const webglCtx = webglResult.canvas.getContext('2d');

            const wasmData = wasmCtx.getImageData(0, 0, width, height).data;
            const webglData = webglCtx.getImageData(0, 0, width, height).data;

            let totalPixels = width * height;
            let matchingPixels = 0;
            let maxDiff = 0;
            let diffSum = 0;
            const diffPixels = [];

            for (let i = 0; i < wasmData.length; i += 4) {
                const pixelIdx = i / 4;
                const rDiff = Math.abs(wasmData[i] - webglData[i]);
                const gDiff = Math.abs(wasmData[i + 1] - webglData[i + 1]);
                const pixelDiff = Math.max(rDiff, gDiff);
                diffSum += rDiff + gDiff;

                if (pixelDiff === 0) {
                    matchingPixels++;
                } else {
                    if (pixelDiff > maxDiff) maxDiff = pixelDiff;
                    if (diffPixels.length < 10) {
                        diffPixels.push({
                            x: pixelIdx % width,
                            y: Math.floor(pixelIdx / width),
                            wasm: [wasmData[i], wasmData[i+1]],
                            webgl: [webglData[i], webglData[i+1]],
                            diff: [rDiff, gDiff]
                        });
                    }
                }
            }

            return {
                totalPixels,
                matchingPixels,
                matchRate: matchingPixels / totalPixels,
                maxDiff,
                avgDiff: diffSum / (totalPixels * 2),
                diffPixels,
                wasmCanvas: wasmResult.canvas,
                webglCanvas: webglResult.canvas,
                wasmTime: wasmResult.generationTime,
                webglTime: webglResult.generationTime,
            };
        }

        async function main() {
            const resultsDiv = document.getElementById('results');
            const canvasesDiv = document.getElementById('canvases');
            
            resultsDiv.innerHTML = 'Loading...';
            
            await Promise.all([preloadWasm(), preloadWebGL2()]);
            
            resultsDiv.innerHTML = '';

            for (const config of testCases) {
                const result = await runTest(config);
                
                const div = document.createElement('div');
                div.className = 'result ' + (result.matchRate === 1.0 ? 'pass' : 'fail');
                
                if (result.error) {
                    div.innerHTML = `<b>${config.name}</b>: ERROR - ${result.error}`;
                } else {
                    const pct = (result.matchRate * 100).toFixed(2);
                    div.innerHTML = `
                        <b>${config.name}</b>: ${pct}% match (${result.matchingPixels}/${result.totalPixels})<br>
                        Max diff: ${result.maxDiff}, Avg diff: ${result.avgDiff.toFixed(4)}<br>
                        WASM: ${result.wasmTime.toFixed(2)}ms, WebGL2: ${result.webglTime.toFixed(2)}ms
                    `;
                    
                    if (result.diffPixels.length > 0) {
                        div.innerHTML += '<br>First diffs:<br>';
                        for (const p of result.diffPixels.slice(0, 5)) {
                            div.innerHTML += `  (${p.x},${p.y}): WASM[${p.wasm}] vs WebGL[${p.webgl}] diff=${p.diff}<br>`;
                        }
                    }
                    
                    // Add canvases
                    const canvasDiv = document.createElement('div');
                    canvasDiv.innerHTML = `<b>${config.name}</b> - WASM | WebGL2<br>`;
                    canvasDiv.appendChild(result.wasmCanvas);
                    canvasDiv.appendChild(result.webglCanvas);
                    canvasesDiv.appendChild(canvasDiv);
                }
                
                resultsDiv.appendChild(div);
            }
        }

        main().catch(e => {
            document.getElementById('results').innerHTML = 'ERROR: ' + e.message;
            console.error(e);
        });
    </script>
</body>
</html>
