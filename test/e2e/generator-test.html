<!DOCTYPE html>
<html>
<head>
  <title>Generator Memory Test</title>
  <style>
    body { margin: 0; padding: 20px; background: #222; color: #fff; font-family: monospace; }
    #test { background: rgba(255,255,255,0.1); border-radius: 24px; }
    #log { margin-top: 20px; white-space: pre; font-size: 12px; }
  </style>
</head>
<body>
  <div id="test" style="width:320px;height:200px;"></div>
  <div id="log"></div>
  <script type="module">
    import { FilterManager, DEFAULT_PARAMS } from '../../src/index.ts';

    const log = (msg) => {
      document.getElementById('log').textContent += msg + '\n';
      console.log(msg);
    };

    window.testManager = new FilterManager();
    window.testElement = document.getElementById('test');
    window.testParams = { ...DEFAULT_PARAMS };

    window.runGeneratorTest = async function(iterations) {
      const results = [];
      const el = window.testElement;
      const manager = window.testManager;
      const params = window.testParams;

      manager.attach(el, params);
      log(`Attached. Running ${iterations} iterations...`);

      for (let i = 0; i < iterations; i++) {
        const phase = (i / iterations) * Math.PI * 4;
        const w = 320 + Math.sin(phase) * 80;
        const h = 200 + Math.cos(phase) * 60;

        el.style.width = w + 'px';
        el.style.height = h + 'px';

        await new Promise(r => setTimeout(r, 30));

        if ((i + 1) % 20 === 0) {
          const heap = performance.memory?.usedJSHeapSize || 0;
          results.push({ iteration: i + 1, heap });
          log(`  [${i + 1}/${iterations}] Heap: ${(heap / 1024 / 1024).toFixed(2)} MB`);
        }
      }

      manager.detach(el);
      log('Detached.');
      return results;
    };

    log('Ready. Run window.runGeneratorTest(100) to start.');
    window.ready = true;
  </script>
</body>
</html>
