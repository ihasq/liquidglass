<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="100" viewBox="0 0 200 100">
  <defs>
    <!-- Linear gradients for edges -->
    <linearGradient id="grad-left" x1="0" y1="0" x2="50" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0.0%" stop-color="rgb(128,128,128)"/>
      <stop offset="10.0%" stop-color="rgb(225,128,128)"/>
      <stop offset="20.0%" stop-color="rgb(239,128,128)"/>
      <stop offset="30.0%" stop-color="rgb(247,128,128)"/>
      <stop offset="40.0%" stop-color="rgb(251,128,128)"/>
      <stop offset="50.0%" stop-color="rgb(253,128,128)"/>
      <stop offset="60.0%" stop-color="rgb(254,128,128)"/>
      <stop offset="70.0%" stop-color="rgb(255,128,128)"/>
      <stop offset="80.0%" stop-color="rgb(255,128,128)"/>
      <stop offset="90.0%" stop-color="rgb(255,128,128)"/>
      <stop offset="100.0%" stop-color="rgb(255,128,128)"/>
    </linearGradient>

    <linearGradient id="grad-right" x1="200" y1="0" x2="150" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0.0%" stop-color="rgb(128,128,128)"/>
      <stop offset="10.0%" stop-color="rgb(31,128,128)"/>
      <stop offset="20.0%" stop-color="rgb(17,128,128)"/>
      <stop offset="30.0%" stop-color="rgb(9,128,128)"/>
      <stop offset="40.0%" stop-color="rgb(5,128,128)"/>
      <stop offset="50.0%" stop-color="rgb(3,128,128)"/>
      <stop offset="60.0%" stop-color="rgb(2,128,128)"/>
      <stop offset="70.0%" stop-color="rgb(1,128,128)"/>
      <stop offset="80.0%" stop-color="rgb(1,128,128)"/>
      <stop offset="90.0%" stop-color="rgb(1,128,128)"/>
      <stop offset="100.0%" stop-color="rgb(1,128,128)"/>
    </linearGradient>

    <linearGradient id="grad-top" x1="0" y1="0" x2="0" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0.0%" stop-color="rgb(128,128,128)"/>
      <stop offset="10.0%" stop-color="rgb(128,225,128)"/>
      <stop offset="20.0%" stop-color="rgb(128,239,128)"/>
      <stop offset="30.0%" stop-color="rgb(128,247,128)"/>
      <stop offset="40.0%" stop-color="rgb(128,251,128)"/>
      <stop offset="50.0%" stop-color="rgb(128,253,128)"/>
      <stop offset="60.0%" stop-color="rgb(128,254,128)"/>
      <stop offset="70.0%" stop-color="rgb(128,255,128)"/>
      <stop offset="80.0%" stop-color="rgb(128,255,128)"/>
      <stop offset="90.0%" stop-color="rgb(128,255,128)"/>
      <stop offset="100.0%" stop-color="rgb(128,255,128)"/>
    </linearGradient>

    <linearGradient id="grad-bottom" x1="0" y1="100" x2="0" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0.0%" stop-color="rgb(128,128,128)"/>
      <stop offset="10.0%" stop-color="rgb(128,31,128)"/>
      <stop offset="20.0%" stop-color="rgb(128,17,128)"/>
      <stop offset="30.0%" stop-color="rgb(128,9,128)"/>
      <stop offset="40.0%" stop-color="rgb(128,5,128)"/>
      <stop offset="50.0%" stop-color="rgb(128,3,128)"/>
      <stop offset="60.0%" stop-color="rgb(128,2,128)"/>
      <stop offset="70.0%" stop-color="rgb(128,1,128)"/>
      <stop offset="80.0%" stop-color="rgb(128,1,128)"/>
      <stop offset="90.0%" stop-color="rgb(128,1,128)"/>
      <stop offset="100.0%" stop-color="rgb(128,1,128)"/>
    </linearGradient>

    <!-- Radial gradients for corners -->
    <radialGradient id="grad-tl" cx="20" cy="20" r="50" gradientUnits="userSpaceOnUse">
      <stop offset="0.0%" stop-color="rgb(255,255,128)"/>
      <stop offset="10.0%" stop-color="rgb(255,255,128)"/>
      <stop offset="20.0%" stop-color="rgb(255,255,128)"/>
      <stop offset="30.0%" stop-color="rgb(255,255,128)"/>
      <stop offset="40.0%" stop-color="rgb(254,254,128)"/>
      <stop offset="50.0%" stop-color="rgb(253,253,128)"/>
      <stop offset="60.0%" stop-color="rgb(251,251,128)"/>
      <stop offset="70.0%" stop-color="rgb(247,247,128)"/>
      <stop offset="80.0%" stop-color="rgb(239,239,128)"/>
      <stop offset="90.0%" stop-color="rgb(225,225,128)"/>
      <stop offset="100.0%" stop-color="rgb(128,128,128)"/>
    </radialGradient>

    <radialGradient id="grad-tr" cx="180" cy="20" r="50" gradientUnits="userSpaceOnUse">
      <stop offset="0.0%" stop-color="rgb(1,255,128)"/>
      <stop offset="10.0%" stop-color="rgb(1,255,128)"/>
      <stop offset="20.0%" stop-color="rgb(1,255,128)"/>
      <stop offset="30.0%" stop-color="rgb(1,255,128)"/>
      <stop offset="40.0%" stop-color="rgb(2,254,128)"/>
      <stop offset="50.0%" stop-color="rgb(3,253,128)"/>
      <stop offset="60.0%" stop-color="rgb(5,251,128)"/>
      <stop offset="70.0%" stop-color="rgb(9,247,128)"/>
      <stop offset="80.0%" stop-color="rgb(17,239,128)"/>
      <stop offset="90.0%" stop-color="rgb(31,225,128)"/>
      <stop offset="100.0%" stop-color="rgb(128,128,128)"/>
    </radialGradient>

    <radialGradient id="grad-bl" cx="20" cy="80" r="50" gradientUnits="userSpaceOnUse">
      <stop offset="0.0%" stop-color="rgb(255,1,128)"/>
      <stop offset="10.0%" stop-color="rgb(255,1,128)"/>
      <stop offset="20.0%" stop-color="rgb(255,1,128)"/>
      <stop offset="30.0%" stop-color="rgb(255,1,128)"/>
      <stop offset="40.0%" stop-color="rgb(254,2,128)"/>
      <stop offset="50.0%" stop-color="rgb(253,3,128)"/>
      <stop offset="60.0%" stop-color="rgb(251,5,128)"/>
      <stop offset="70.0%" stop-color="rgb(247,9,128)"/>
      <stop offset="80.0%" stop-color="rgb(239,17,128)"/>
      <stop offset="90.0%" stop-color="rgb(225,31,128)"/>
      <stop offset="100.0%" stop-color="rgb(128,128,128)"/>
    </radialGradient>

    <radialGradient id="grad-br" cx="180" cy="80" r="50" gradientUnits="userSpaceOnUse">
      <stop offset="0.0%" stop-color="rgb(1,1,128)"/>
      <stop offset="10.0%" stop-color="rgb(1,1,128)"/>
      <stop offset="20.0%" stop-color="rgb(1,1,128)"/>
      <stop offset="30.0%" stop-color="rgb(1,1,128)"/>
      <stop offset="40.0%" stop-color="rgb(2,2,128)"/>
      <stop offset="50.0%" stop-color="rgb(3,3,128)"/>
      <stop offset="60.0%" stop-color="rgb(5,5,128)"/>
      <stop offset="70.0%" stop-color="rgb(9,9,128)"/>
      <stop offset="80.0%" stop-color="rgb(17,17,128)"/>
      <stop offset="90.0%" stop-color="rgb(31,31,128)"/>
      <stop offset="100.0%" stop-color="rgb(128,128,128)"/>
    </radialGradient>

    <!-- Clip path for rounded rect -->
    <clipPath id="clip-shape">
      <rect x="0" y="0" width="200" height="100" rx="20" ry="20"/>
    </clipPath>

    <!-- Masks for edge regions -->
    <mask id="mask-left">
      <rect x="0" y="20" width="50" height="60" fill="white"/>
    </mask>

    <mask id="mask-right">
      <rect x="150" y="20" width="50" height="60" fill="white"/>
    </mask>

    <mask id="mask-top">
      <rect x="20" y="0" width="160" height="50" fill="white"/>
    </mask>

    <mask id="mask-bottom">
      <rect x="20" y="50" width="160" height="50" fill="white"/>
    </mask>

    <!-- Corner masks (quarter circles) -->
    <mask id="mask-tl">
      <circle cx="20" cy="20" r="50" fill="white"/>
      <rect x="20" y="0" width="50" height="20" fill="black"/>
      <rect x="0" y="20" width="20" height="50" fill="black"/>
    </mask>

    <mask id="mask-tr">
      <circle cx="180" cy="20" r="50" fill="white"/>
      <rect x="130" y="0" width="50" height="20" fill="black"/>
      <rect x="180" y="20" width="20" height="50" fill="black"/>
    </mask>

    <mask id="mask-bl">
      <circle cx="20" cy="80" r="50" fill="white"/>
      <rect x="20" y="80" width="50" height="20" fill="black"/>
      <rect x="0" y="30" width="20" height="50" fill="black"/>
    </mask>

    <mask id="mask-br">
      <circle cx="180" cy="80" r="50" fill="white"/>
      <rect x="130" y="80" width="50" height="20" fill="black"/>
      <rect x="180" y="30" width="20" height="50" fill="black"/>
    </mask>
  </defs>

  <!-- Background: neutral gray (no displacement) -->
  <rect width="100%" height="100%" fill="rgb(128,128,128)"/>

  <!-- Apply clip path to all displacement regions -->
  <g clip-path="url(#clip-shape)">
    <!-- Edge regions -->
    <rect x="0" y="20" width="50" height="60" fill="url(#grad-left)"/>
    <rect x="150" y="20" width="50" height="60" fill="url(#grad-right)"/>
    <rect x="20" y="0" width="160" height="50" fill="url(#grad-top)"/>
    <rect x="20" y="50" width="160" height="50" fill="url(#grad-bottom)"/>

    <!-- Corner regions (with masks to get quarter circles) -->
    <rect x="0" y="0" width="70" height="70" fill="url(#grad-tl)" mask="url(#mask-tl)"/>
    <rect x="130" y="0" width="70" height="70" fill="url(#grad-tr)" mask="url(#mask-tr)"/>
    <rect x="0" y="30" width="70" height="70" fill="url(#grad-bl)" mask="url(#mask-bl)"/>
    <rect x="130" y="30" width="70" height="70" fill="url(#grad-br)" mask="url(#mask-br)"/>
  </g>
</svg>