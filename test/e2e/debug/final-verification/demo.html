<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SVG + WebP Displacement Map Demo</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  padding: 20px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
}
h1 { color: white; margin-bottom: 20px; }
.demo-container {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.demo-box {
  background: white;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.demo-box h3 { margin: 0 0 10px 0; color: #333; }
.glass-panel {
  width: 420px;
  height: 300px;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  position: relative;
  overflow: hidden;
}
.glass-panel.with-filter {
  filter: url(#liquidglass);
}
.controls {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.control-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.control-row label {
  width: 120px;
  font-weight: 500;
}
.control-row input[type="range"] {
  flex: 1;
}
.control-row span {
  width: 50px;
  text-align: right;
}
.background-image {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: -1;
}
.content-inside {
  padding: 30px;
  color: #333;
  text-shadow: 0 1px 1px rgba(255,255,255,0.5);
}
</style>
</head>
<body>
<!-- SVG Filter Definitions -->
<svg width="0" height="0" style="position: absolute;">
  <defs>
    <filter id="liquidglass" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">
      <!-- Load WebP displacement map -->
      <feImage id="dispMapImage"
               href="displacement-map.webp"
               result="dispMap"
               width="100%" height="100%"
               preserveAspectRatio="none"/>

      <!-- Optional: Gamma adjustment (controlled via JS) -->
      <feComponentTransfer in="dispMap" result="adjustedMap">
        <feFuncR id="funcR" type="gamma" amplitude="1" exponent="1" offset="0"/>
        <feFuncG id="funcG" type="gamma" amplitude="1" exponent="1" offset="0"/>
      </feComponentTransfer>

      <!-- Apply displacement -->
      <feDisplacementMap id="dispMapFilter"
                         in="SourceGraphic"
                         in2="adjustedMap"
                         xChannelSelector="R"
                         yChannelSelector="G"
                         scale="50"
                         result="displaced"/>
    </filter>
  </defs>
</svg>

<h1>SVG + WebP Displacement Map</h1>

<div class="demo-container">
  <div class="demo-box">
    <h3>With Liquid Glass Effect</h3>
    <div class="glass-panel with-filter">
      <div class="content-inside">
        <h2>Liquid Glass</h2>
        <p>Using WebP displacement map via SVG filter.<br>
        All parameters adjustable without re-encoding.</p>
      </div>
    </div>

    <div class="controls">
      <div class="control-row">
        <label>Scale (Intensity):</label>
        <input type="range" id="scaleSlider" min="0" max="150" value="50">
        <span id="scaleValue">50</span>
      </div>
      <div class="control-row">
        <label>Gamma:</label>
        <input type="range" id="gammaSlider" min="0.3" max="2" step="0.1" value="1">
        <span id="gammaValue">1.0</span>
      </div>
    </div>
  </div>

  <div class="demo-box">
    <h3>Without Effect (Reference)</h3>
    <div class="glass-panel">
      <div class="content-inside">
        <h2>Reference Panel</h2>
        <p>No displacement effect applied.<br>
        Compare with the filtered version.</p>
      </div>
    </div>
  </div>
</div>

<script>
// Interactive controls
const scaleSlider = document.getElementById('scaleSlider');
const gammaSlider = document.getElementById('gammaSlider');
const scaleValue = document.getElementById('scaleValue');
const gammaValue = document.getElementById('gammaValue');
const dispMapFilter = document.getElementById('dispMapFilter');
const funcR = document.getElementById('funcR');
const funcG = document.getElementById('funcG');

scaleSlider.addEventListener('input', (e) => {
  const scale = e.target.value;
  scaleValue.textContent = scale;
  dispMapFilter.setAttribute('scale', scale);
});

gammaSlider.addEventListener('input', (e) => {
  const gamma = parseFloat(e.target.value);
  gammaValue.textContent = gamma.toFixed(1);
  funcR.setAttribute('exponent', gamma);
  funcG.setAttribute('exponent', gamma);
});
</script>
</body>
</html>
