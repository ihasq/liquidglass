<!DOCTYPE html><html lang="en"><head>
  <script type="module" src="/@vite/client"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Glass Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-size: 400% 400%;
      animation: gradientBg 15s ease infinite;
      padding: 40px;
    }

    @keyframes gradientBg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .background-content {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .background-content::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      top: 10%;
      left: 20%;
      filter: blur(40px);
    }

    .background-content::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(255, 200, 100, 0.3);
      border-radius: 50%;
      bottom: 20%;
      right: 15%;
      filter: blur(60px);
    }

    .demo-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      color: white;
      text-align: center;
      font-weight: 600;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }

    .demo-card {
      position: relative;
      padding: 30px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    .demo-card h3 {
      font-size: 1.2rem;
      margin-bottom: 10px;
    }

    .demo-card p {
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .controls {
      padding: 20px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
    }

    .controls h2 {
      font-size: 1rem;
      margin-bottom: 20px;
    }

    .control-group {
      margin-bottom: 15px;
    }

    .control-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 0.85rem;
    }

    .control-group input[type="range"] {
      width: 100%;
    }

    .control-group select {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .control-group select option {
      color: black;
    }

    .value-display {
      float: right;
      font-family: monospace;
    }

    /* Test target panels */
    #panel-squircle {
      width: 300px;
      height: 200px;
    }

    #panel-circle {
      width: 200px;
      height: 200px;
      border-radius: 50% !important;
    }

    #panel-lip {
      width: 280px;
      height: 180px;
    }

    .image-test {
      position: relative;
    }

    .image-test img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      border-radius: inherit;
    }
  </style>
</head>
<body>
  <div class="background-content"></div>

  <div class="demo-container">
    <h1>Liquid Glass Effect Demo</h1>

    <div class="demo-grid">
      <!-- Squircle Panel -->
      <div class="demo-card" id="panel-squircle" data-testid="panel-squircle" style="backdrop-filter: url(&quot;#liquid-glass-filter-5&quot;); background-color: rgba(255, 255, 255, 0.1);">
        <h3>Squircle Panel</h3>
        <p>Apple's preferred soft curvature profile</p>
      </div>

      <!-- Circle Panel -->
      <div class="demo-card" id="panel-circle" data-testid="panel-circle" style="backdrop-filter: url(&quot;#liquid-glass-filter-6&quot;); background-color: rgba(255, 255, 255, 0.1);">
        <h3>Circle</h3>
        <p>Spherical lens effect</p>
      </div>

      <!-- Lip Panel -->
      <div class="demo-card" id="panel-lip" data-testid="panel-lip" style="backdrop-filter: url(&quot;#liquid-glass-filter-7&quot;); background-color: rgba(255, 255, 255, 0.1);">
        <h3>Lip Profile</h3>
        <p>Convex center, concave edge</p>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls" id="controls" style="backdrop-filter: url(&quot;#liquid-glass-filter-8&quot;); background-color: rgba(255, 255, 255, 0.1);">
      <h2>Adjust Parameters</h2>

      <div class="control-group">
        <label>
          Profile
          <select id="ctrl-profile">
            <option value="squircle">Squircle</option>
            <option value="circle">Circle</option>
            <option value="lip">Lip</option>
            <option value="parabolic">Parabolic</option>
            <option value="concave">Concave</option>
          </select>
        </label>
      </div>

      <div class="control-group">
        <label>
          Refractive Index
          <span class="value-display" id="val-ri">1.5</span>
        </label>
        <input type="range" id="ctrl-ri" min="1.0" max="2.5" step="0.1" value="1.5">
      </div>

      <div class="control-group">
        <label>
          Refraction Level
          <span class="value-display" id="val-refraction">0.8</span>
        </label>
        <input type="range" id="ctrl-refraction" min="0" max="1" step="0.05" value="0.8">
      </div>

      <div class="control-group">
        <label>
          Specular Opacity
          <span class="value-display" id="val-specular">0.5</span>
        </label>
        <input type="range" id="ctrl-specular" min="0" max="1" step="0.05" value="0.5">
      </div>

      <div class="control-group">
        <label>
          Background Opacity
          <span class="value-display" id="val-bg">0.1</span>
        </label>
        <input type="range" id="ctrl-bg" min="0" max="0.5" step="0.02" value="0.1">
      </div>
    </div>

    <!-- Browser support info -->
    <div class="controls" id="support-info">
      <h2>Browser Support</h2>
      <p id="support-status" style="color: rgb(74, 222, 128);">✓ Full SVG filter support (Chrome/Edge)</p>
    </div>
  </div>
