<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="100" viewBox="0 0 200 100">
  <defs>
    <!-- Linear gradients for edges -->
    <linearGradient id="grad-left" x1="0" y1="0" x2="30" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0.0%" stop-color="rgb(255,128,128)"/>
      <stop offset="10.0%" stop-color="rgb(231,128,128)"/>
      <stop offset="20.0%" stop-color="rgb(209,128,128)"/>
      <stop offset="30.0%" stop-color="rgb(190,128,128)"/>
      <stop offset="40.0%" stop-color="rgb(174,128,128)"/>
      <stop offset="50.0%" stop-color="rgb(160,128,128)"/>
      <stop offset="60.0%" stop-color="rgb(148,128,128)"/>
      <stop offset="70.0%" stop-color="rgb(139,128,128)"/>
      <stop offset="80.0%" stop-color="rgb(133,128,128)"/>
      <stop offset="90.0%" stop-color="rgb(129,128,128)"/>
      <stop offset="100.0%" stop-color="rgb(128,128,128)"/>
    </linearGradient>

    <linearGradient id="grad-right" x1="200" y1="0" x2="170" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0.0%" stop-color="rgb(1,128,128)"/>
      <stop offset="10.0%" stop-color="rgb(25,128,128)"/>
      <stop offset="20.0%" stop-color="rgb(47,128,128)"/>
      <stop offset="30.0%" stop-color="rgb(66,128,128)"/>
      <stop offset="40.0%" stop-color="rgb(82,128,128)"/>
      <stop offset="50.0%" stop-color="rgb(96,128,128)"/>
      <stop offset="60.0%" stop-color="rgb(108,128,128)"/>
      <stop offset="70.0%" stop-color="rgb(117,128,128)"/>
      <stop offset="80.0%" stop-color="rgb(123,128,128)"/>
      <stop offset="90.0%" stop-color="rgb(127,128,128)"/>
      <stop offset="100.0%" stop-color="rgb(128,128,128)"/>
    </linearGradient>

    <linearGradient id="grad-top" x1="0" y1="0" x2="0" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0.0%" stop-color="rgb(128,255,128)"/>
      <stop offset="10.0%" stop-color="rgb(128,231,128)"/>
      <stop offset="20.0%" stop-color="rgb(128,209,128)"/>
      <stop offset="30.0%" stop-color="rgb(128,190,128)"/>
      <stop offset="40.0%" stop-color="rgb(128,174,128)"/>
      <stop offset="50.0%" stop-color="rgb(128,160,128)"/>
      <stop offset="60.0%" stop-color="rgb(128,148,128)"/>
      <stop offset="70.0%" stop-color="rgb(128,139,128)"/>
      <stop offset="80.0%" stop-color="rgb(128,133,128)"/>
      <stop offset="90.0%" stop-color="rgb(128,129,128)"/>
      <stop offset="100.0%" stop-color="rgb(128,128,128)"/>
    </linearGradient>

    <linearGradient id="grad-bottom" x1="0" y1="100" x2="0" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0.0%" stop-color="rgb(128,1,128)"/>
      <stop offset="10.0%" stop-color="rgb(128,25,128)"/>
      <stop offset="20.0%" stop-color="rgb(128,47,128)"/>
      <stop offset="30.0%" stop-color="rgb(128,66,128)"/>
      <stop offset="40.0%" stop-color="rgb(128,82,128)"/>
      <stop offset="50.0%" stop-color="rgb(128,96,128)"/>
      <stop offset="60.0%" stop-color="rgb(128,108,128)"/>
      <stop offset="70.0%" stop-color="rgb(128,117,128)"/>
      <stop offset="80.0%" stop-color="rgb(128,123,128)"/>
      <stop offset="90.0%" stop-color="rgb(128,127,128)"/>
      <stop offset="100.0%" stop-color="rgb(128,128,128)"/>
    </linearGradient>

    <!-- Radial gradients for corners -->
    <radialGradient id="grad-tl" cx="20" cy="20" r="30" gradientUnits="userSpaceOnUse">
      <stop offset="0.0%" stop-color="rgb(128,128,128)"/>
      <stop offset="10.0%" stop-color="rgb(129,129,128)"/>
      <stop offset="20.0%" stop-color="rgb(133,133,128)"/>
      <stop offset="30.0%" stop-color="rgb(139,139,128)"/>
      <stop offset="40.0%" stop-color="rgb(148,148,128)"/>
      <stop offset="50.0%" stop-color="rgb(160,160,128)"/>
      <stop offset="60.0%" stop-color="rgb(174,174,128)"/>
      <stop offset="70.0%" stop-color="rgb(190,190,128)"/>
      <stop offset="80.0%" stop-color="rgb(209,209,128)"/>
      <stop offset="90.0%" stop-color="rgb(231,231,128)"/>
      <stop offset="100.0%" stop-color="rgb(255,255,128)"/>
    </radialGradient>

    <radialGradient id="grad-tr" cx="180" cy="20" r="30" gradientUnits="userSpaceOnUse">
      <stop offset="0.0%" stop-color="rgb(128,128,128)"/>
      <stop offset="10.0%" stop-color="rgb(127,129,128)"/>
      <stop offset="20.0%" stop-color="rgb(123,133,128)"/>
      <stop offset="30.0%" stop-color="rgb(117,139,128)"/>
      <stop offset="40.0%" stop-color="rgb(108,148,128)"/>
      <stop offset="50.0%" stop-color="rgb(96,160,128)"/>
      <stop offset="60.0%" stop-color="rgb(82,174,128)"/>
      <stop offset="70.0%" stop-color="rgb(66,190,128)"/>
      <stop offset="80.0%" stop-color="rgb(47,209,128)"/>
      <stop offset="90.0%" stop-color="rgb(25,231,128)"/>
      <stop offset="100.0%" stop-color="rgb(1,255,128)"/>
    </radialGradient>

    <radialGradient id="grad-bl" cx="20" cy="80" r="30" gradientUnits="userSpaceOnUse">
      <stop offset="0.0%" stop-color="rgb(128,128,128)"/>
      <stop offset="10.0%" stop-color="rgb(129,127,128)"/>
      <stop offset="20.0%" stop-color="rgb(133,123,128)"/>
      <stop offset="30.0%" stop-color="rgb(139,117,128)"/>
      <stop offset="40.0%" stop-color="rgb(148,108,128)"/>
      <stop offset="50.0%" stop-color="rgb(160,96,128)"/>
      <stop offset="60.0%" stop-color="rgb(174,82,128)"/>
      <stop offset="70.0%" stop-color="rgb(190,66,128)"/>
      <stop offset="80.0%" stop-color="rgb(209,47,128)"/>
      <stop offset="90.0%" stop-color="rgb(231,25,128)"/>
      <stop offset="100.0%" stop-color="rgb(255,1,128)"/>
    </radialGradient>

    <radialGradient id="grad-br" cx="180" cy="80" r="30" gradientUnits="userSpaceOnUse">
      <stop offset="0.0%" stop-color="rgb(128,128,128)"/>
      <stop offset="10.0%" stop-color="rgb(127,127,128)"/>
      <stop offset="20.0%" stop-color="rgb(123,123,128)"/>
      <stop offset="30.0%" stop-color="rgb(117,117,128)"/>
      <stop offset="40.0%" stop-color="rgb(108,108,128)"/>
      <stop offset="50.0%" stop-color="rgb(96,96,128)"/>
      <stop offset="60.0%" stop-color="rgb(82,82,128)"/>
      <stop offset="70.0%" stop-color="rgb(66,66,128)"/>
      <stop offset="80.0%" stop-color="rgb(47,47,128)"/>
      <stop offset="90.0%" stop-color="rgb(25,25,128)"/>
      <stop offset="100.0%" stop-color="rgb(1,1,128)"/>
    </radialGradient>

    <!-- Clip path for rounded rect -->
    <clipPath id="clip-shape">
      <rect x="0" y="0" width="200" height="100" rx="20" ry="20"/>
    </clipPath>

    <!-- Masks for edge regions -->
    <mask id="mask-left">
      <rect x="0" y="20" width="30" height="60" fill="white"/>
    </mask>

    <mask id="mask-right">
      <rect x="170" y="20" width="30" height="60" fill="white"/>
    </mask>

    <mask id="mask-top">
      <rect x="20" y="0" width="160" height="30" fill="white"/>
    </mask>

    <mask id="mask-bottom">
      <rect x="20" y="70" width="160" height="30" fill="white"/>
    </mask>

    <!-- Corner masks (quarter circles) -->
    <mask id="mask-tl">
      <circle cx="20" cy="20" r="30" fill="white"/>
      <rect x="20" y="0" width="30" height="20" fill="black"/>
      <rect x="0" y="20" width="20" height="30" fill="black"/>
    </mask>

    <mask id="mask-tr">
      <circle cx="180" cy="20" r="30" fill="white"/>
      <rect x="150" y="0" width="30" height="20" fill="black"/>
      <rect x="180" y="20" width="20" height="30" fill="black"/>
    </mask>

    <mask id="mask-bl">
      <circle cx="20" cy="80" r="30" fill="white"/>
      <rect x="20" y="80" width="30" height="20" fill="black"/>
      <rect x="0" y="50" width="20" height="30" fill="black"/>
    </mask>

    <mask id="mask-br">
      <circle cx="180" cy="80" r="30" fill="white"/>
      <rect x="150" y="80" width="30" height="20" fill="black"/>
      <rect x="180" y="50" width="20" height="30" fill="black"/>
    </mask>
  </defs>

  <!-- Background: neutral gray (no displacement) -->
  <rect width="100%" height="100%" fill="rgb(128,128,128)"/>

  <!-- Apply clip path to all displacement regions -->
  <g clip-path="url(#clip-shape)">
    <!-- Edge regions -->
    <rect x="0" y="20" width="30" height="60" fill="url(#grad-left)"/>
    <rect x="170" y="20" width="30" height="60" fill="url(#grad-right)"/>
    <rect x="20" y="0" width="160" height="30" fill="url(#grad-top)"/>
    <rect x="20" y="70" width="160" height="30" fill="url(#grad-bottom)"/>

    <!-- Corner regions (with masks to get quarter circles) -->
    <rect x="0" y="0" width="50" height="50" fill="url(#grad-tl)" mask="url(#mask-tl)"/>
    <rect x="150" y="0" width="50" height="50" fill="url(#grad-tr)" mask="url(#mask-tr)"/>
    <rect x="0" y="50" width="50" height="50" fill="url(#grad-bl)" mask="url(#mask-bl)"/>
    <rect x="150" y="50" width="50" height="50" fill="url(#grad-br)" mask="url(#mask-br)"/>
  </g>
</svg>