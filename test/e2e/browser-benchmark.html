<!DOCTYPE html>
<html>
<head>
  <title>LiquidGlass Browser Benchmark</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 20px;
      background: #0a0a0a; color: #0f0;
      font-family: 'SF Mono', Monaco, monospace; font-size: 11px;
      line-height: 1.4;
    }
    h2 { color: #0ff; margin: 0 0 10px 0; font-size: 14px; }
    .section { margin-bottom: 20px; padding: 10px; background: #111; border: 1px solid #333; border-radius: 4px; }
    .section-title { color: #ff0; margin-bottom: 8px; font-weight: bold; }
    .log { white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
    .error { color: #f55; }
    .success { color: #5f5; }
    .info { color: #5af; }
    .warn { color: #fa5; }
    .header { color: #0ff; font-weight: bold; margin-top: 10px; }
    button {
      background: #222; color: #0f0; border: 1px solid #0f0;
      padding: 8px 16px; margin: 5px; cursor: pointer; font-family: inherit;
      border-radius: 4px;
    }
    button:hover { background: #0f02; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #testArea { position: fixed; top: 0; left: -9999px; }
    .glass-panel { background: rgba(255,255,255,0.1); }
    #copyBtn { background: #060; }
    #copyBtn:hover { background: #080; }
    .results { background: #000; padding: 10px; border: 1px solid #333; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>LiquidGlass Comprehensive Browser Benchmark</h2>

  <div class="section">
    <div class="section-title">Controls</div>
    <button id="runShaderBtn">Run Shader Benchmark</button>
    <button id="runMemoryBtn">Run Memory Test</button>
    <button id="runAllBtn">Run All Tests</button>
    <button id="copyBtn">Copy Results to Clipboard</button>
    <button id="clearBtn">Clear Log</button>
  </div>

  <div class="section">
    <div class="section-title">Results</div>
    <div id="log" class="log"></div>
  </div>

  <div id="testArea">
    <div id="testElement" class="glass-panel" style="width:320px;height:200px;border-radius:24px;"></div>
  </div>

  <script type="module">
    import { FilterManager, DEFAULT_PARAMS } from '../../src/index.ts';

    const logEl = document.getElementById('log');
    const allLogs = [];

    function log(msg, type = '') {
      const line = `[${new Date().toISOString().slice(11, 23)}] ${msg}`;
      allLogs.push(line);
      const span = document.createElement('span');
      span.className = type;
      span.textContent = line + '\n';
      logEl.appendChild(span);
      logEl.scrollTop = logEl.scrollHeight;
      console.log(msg);
    }

    function logHeader(msg) { log(msg, 'header'); }
    function logInfo(msg) { log(msg, 'info'); }
    function logSuccess(msg) { log(msg, 'success'); }
    function logWarn(msg) { log(msg, 'warn'); }
    function logError(msg) { log(msg, 'error'); }

    // ============================================================
    // Memory Utilities
    // ============================================================
    function getMemoryMB() {
      if (!performance.memory) return null;
      return {
        used: performance.memory.usedJSHeapSize / 1024 / 1024,
        total: performance.memory.totalJSHeapSize / 1024 / 1024,
        limit: performance.memory.jsHeapSizeLimit / 1024 / 1024,
      };
    }

    function formatMem(mb) {
      return mb !== null ? mb.toFixed(2) + ' MB' : 'N/A';
    }

    async function forceGC() {
      // Aggressive memory pressure to encourage GC
      if (window.gc) {
        window.gc();
        return true;
      }
      // Fallback: create and release large arrays to pressure GC
      for (let i = 0; i < 3; i++) {
        const arr = new Array(1000000).fill(0);
        arr.length = 0;
        await new Promise(r => setTimeout(r, 50));
      }
      return false;
    }

    // ============================================================
    // Shader Benchmark (WebGPU)
    // ============================================================
    async function runShaderBenchmark() {
      logHeader('=== SHADER APPROACH BENCHMARK ===');

      if (!navigator.gpu) {
        logError('WebGPU not supported in this browser!');
        return;
      }

      const adapter = await navigator.gpu.requestAdapter({ powerPreference: 'high-performance' });
      if (!adapter) {
        logError('No WebGPU adapter available');
        return;
      }

      const device = await adapter.requestDevice();
      logSuccess('WebGPU device acquired');
      logInfo(`Adapter: ${adapter.name || 'unknown'}`);

      const FULLSCREEN_VERT = `
        @vertex fn main(@builtin(vertex_index) vi: u32) -> @builtin(position) vec4<f32> {
          var pos = array<vec2<f32>, 3>(vec2(-1.0, -3.0), vec2(-1.0, 1.0), vec2(3.0, 1.0));
          return vec4<f32>(pos[vi], 0.0, 1.0);
        }
      `;

      const QUADRANT_FRAG = `
        struct U { qr: vec2<f32>, fr: vec2<f32>, br: f32, ew: f32 }
        @group(0) @binding(0) var<uniform> u: U;
        fn fexp(x: f32) -> f32 { let t = 1.0 + x * 0.03125; let t2 = t*t; let t4 = t2*t2; let t8 = t4*t4; let t16 = t8*t8; return t16*t16; }
        @fragment fn main(@builtin(position) fc: vec4<f32>) -> @location(0) vec4<f32> {
          let p = fc.xy - 0.5; let gx = p.x + floor(u.fr.x*0.5); let gy = p.y + floor(u.fr.y*0.5);
          let hw = u.fr.x*0.5; let hh = u.fr.y*0.5; let r = min(u.br, min(hw, hh));
          let iw = hw - r; let ih = hh - r; let dx = gx - hw; let dy = gy - hh;
          let ax = abs(dx); let ay = abs(dy);
          var ed: f32 = 0.0;
          if (ax <= iw && ay <= ih) { ed = min(hw - ax, hh - ay); }
          else if (ax <= iw) { ed = hh - ay; } else if (ay <= ih) { ed = hw - ax; }
          else { let cx = ax - iw; let cy = ay - ih; ed = r - sqrt(cx*cx + cy*cy); }
          let ew = max(hw, hh) * u.ew; let en = clamp(ed / ew, 0.0, 1.0);
          let i = fexp(-3.0 * en); return vec4(i * sign(dx) * 0.5 + 0.5, i * sign(dy) * 0.5 + 0.5, 0.5, 1.0);
        }
      `;

      const COMPOSITE_FRAG = `
        struct U { fr: vec2<f32>, qr: vec2<f32> }
        @group(0) @binding(0) var<uniform> u: U;
        @group(0) @binding(1) var qt: texture_2d<f32>;
        @group(0) @binding(2) var qs: sampler;
        @fragment fn main(@builtin(position) fc: vec4<f32>) -> @location(0) vec4<f32> {
          let p = fc.xy - 0.5; let cx = floor(u.fr.x * 0.5); let cy = floor(u.fr.y * 0.5);
          let ir = p.x >= cx; let ib = p.y >= cy;
          var qx: f32; var qy: f32; var invR = false; var invG = false;
          if (ir && ib) { qx = p.x - cx; qy = p.y - cy; }
          else if (!ir && ib) { qx = cx - 1.0 - p.x; qy = p.y - cy; invR = true; }
          else if (ir && !ib) { qx = p.x - cx; qy = cy - 1.0 - p.y; invG = true; }
          else { qx = cx - 1.0 - p.x; qy = cy - 1.0 - p.y; invR = true; invG = true; }
          let tc = (vec2(clamp(qx, 0.0, u.qr.x - 1.0), clamp(qy, 0.0, u.qr.y - 1.0)) + 0.5) / u.qr;
          var c = textureSample(qt, qs, tc);
          if (invR) { c.r = 1.0 - c.r; } if (invG) { c.g = 1.0 - c.g; }
          return c;
        }
      `;

      const SINGLEPASS_FRAG = `
        struct U { fr: vec2<f32>, br: f32, ew: f32 }
        @group(0) @binding(0) var<uniform> u: U;
        fn fexp(x: f32) -> f32 { let t = 1.0 + x * 0.03125; let t2 = t*t; let t4 = t2*t2; let t8 = t4*t4; let t16 = t8*t8; return t16*t16; }
        @fragment fn main(@builtin(position) fc: vec4<f32>) -> @location(0) vec4<f32> {
          let p = fc.xy - 0.5; let hw = u.fr.x*0.5; let hh = u.fr.y*0.5;
          let r = min(u.br, min(hw, hh)); let iw = hw - r; let ih = hh - r;
          let dx = p.x - hw; let dy = p.y - hh; let ax = abs(dx); let ay = abs(dy);
          var ed: f32 = 0.0;
          if (ax <= iw && ay <= ih) { ed = min(hw - ax, hh - ay); }
          else if (ax <= iw) { ed = hh - ay; } else if (ay <= ih) { ed = hw - ax; }
          else { let cx = ax - iw; let cy = ay - ih; ed = r - sqrt(cx*cx + cy*cy); }
          let ew = max(hw, hh) * u.ew; let en = clamp(ed / ew, 0.0, 1.0);
          let i = fexp(-3.0 * en); return vec4(i * sign(dx) * 0.5 + 0.5, i * sign(dy) * 0.5 + 0.5, 0.5, 1.0);
        }
      `;

      const sizes = [
        { w: 64, h: 64 }, { w: 128, h: 128 }, { w: 256, h: 256 },
        { w: 512, h: 512 }, { w: 1024, h: 1024 },
      ];
      const iterations = 200;

      logInfo(`Testing ${sizes.length} sizes × ${iterations} iterations each`);
      logInfo('');

      const results = [];

      for (const size of sizes) {
        const quadW = Math.ceil(size.w / 2);
        const quadH = Math.ceil(size.h / 2);

        // --- 2-Pass Setup ---
        const quadTex = device.createTexture({
          size: [quadW, quadH], format: 'rgba8unorm',
          usage: GPUTextureUsage.RENDER_ATTACHMENT | GPUTextureUsage.TEXTURE_BINDING,
        });
        const outputTex2 = device.createTexture({
          size: [size.w, size.h], format: 'rgba8unorm',
          usage: GPUTextureUsage.RENDER_ATTACHMENT,
        });
        const vertMod = device.createShaderModule({ code: FULLSCREEN_VERT });
        const quadFragMod = device.createShaderModule({ code: QUADRANT_FRAG });
        const compFragMod = device.createShaderModule({ code: COMPOSITE_FRAG });
        const quadUniBuf = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
        const compUniBuf = device.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
        const sampler = device.createSampler({ magFilter: 'nearest', minFilter: 'nearest' });

        const quadPipe = device.createRenderPipeline({
          layout: 'auto',
          vertex: { module: vertMod, entryPoint: 'main' },
          fragment: { module: quadFragMod, entryPoint: 'main', targets: [{ format: 'rgba8unorm' }] },
        });
        const compPipe = device.createRenderPipeline({
          layout: 'auto',
          vertex: { module: vertMod, entryPoint: 'main' },
          fragment: { module: compFragMod, entryPoint: 'main', targets: [{ format: 'rgba8unorm' }] },
        });

        const quadBG = device.createBindGroup({
          layout: quadPipe.getBindGroupLayout(0),
          entries: [{ binding: 0, resource: { buffer: quadUniBuf } }],
        });
        const quadTexView = quadTex.createView();
        const compBG = device.createBindGroup({
          layout: compPipe.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: compUniBuf } },
            { binding: 1, resource: quadTexView },
            { binding: 2, resource: sampler },
          ],
        });

        device.queue.writeBuffer(quadUniBuf, 0, new Float32Array([quadW, quadH, size.w, size.h, 24, 0.5, 0, 0]));
        device.queue.writeBuffer(compUniBuf, 0, new Float32Array([size.w, size.h, quadW, quadH]));

        // --- Single-Pass Setup ---
        const outputTex1 = device.createTexture({
          size: [size.w, size.h], format: 'rgba8unorm',
          usage: GPUTextureUsage.RENDER_ATTACHMENT,
        });
        const singleFragMod = device.createShaderModule({ code: SINGLEPASS_FRAG });
        const singleUniBuf = device.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
        const singlePipe = device.createRenderPipeline({
          layout: 'auto',
          vertex: { module: vertMod, entryPoint: 'main' },
          fragment: { module: singleFragMod, entryPoint: 'main', targets: [{ format: 'rgba8unorm' }] },
        });
        const singleBG = device.createBindGroup({
          layout: singlePipe.getBindGroupLayout(0),
          entries: [{ binding: 0, resource: { buffer: singleUniBuf } }],
        });
        device.queue.writeBuffer(singleUniBuf, 0, new Float32Array([size.w, size.h, 24, 0.5]));

        const quadTexView2 = quadTex.createView();
        const outView2 = outputTex2.createView();
        const outView1 = outputTex1.createView();

        // Warmup
        for (let i = 0; i < 20; i++) {
          const enc = device.createCommandEncoder();
          const p1 = enc.beginRenderPass({ colorAttachments: [{ view: quadTexView2, loadOp: 'clear', storeOp: 'store', clearValue: { r: 0.5, g: 0.5, b: 0.5, a: 1 } }] });
          p1.setPipeline(quadPipe); p1.setBindGroup(0, quadBG); p1.draw(3); p1.end();
          const p2 = enc.beginRenderPass({ colorAttachments: [{ view: outView2, loadOp: 'clear', storeOp: 'store', clearValue: { r: 0.5, g: 0.5, b: 0.5, a: 1 } }] });
          p2.setPipeline(compPipe); p2.setBindGroup(0, compBG); p2.draw(3); p2.end();
          device.queue.submit([enc.finish()]);
        }
        await device.queue.onSubmittedWorkDone();

        // Benchmark 2-Pass
        const start2 = performance.now();
        for (let i = 0; i < iterations; i++) {
          const enc = device.createCommandEncoder();
          const p1 = enc.beginRenderPass({ colorAttachments: [{ view: quadTexView2, loadOp: 'clear', storeOp: 'store', clearValue: { r: 0.5, g: 0.5, b: 0.5, a: 1 } }] });
          p1.setPipeline(quadPipe); p1.setBindGroup(0, quadBG); p1.draw(3); p1.end();
          const p2 = enc.beginRenderPass({ colorAttachments: [{ view: outView2, loadOp: 'clear', storeOp: 'store', clearValue: { r: 0.5, g: 0.5, b: 0.5, a: 1 } }] });
          p2.setPipeline(compPipe); p2.setBindGroup(0, compBG); p2.draw(3); p2.end();
          device.queue.submit([enc.finish()]);
        }
        await device.queue.onSubmittedWorkDone();
        const time2pass = performance.now() - start2;

        // Warmup single-pass
        for (let i = 0; i < 20; i++) {
          const enc = device.createCommandEncoder();
          const p = enc.beginRenderPass({ colorAttachments: [{ view: outView1, loadOp: 'clear', storeOp: 'store', clearValue: { r: 0.5, g: 0.5, b: 0.5, a: 1 } }] });
          p.setPipeline(singlePipe); p.setBindGroup(0, singleBG); p.draw(3); p.end();
          device.queue.submit([enc.finish()]);
        }
        await device.queue.onSubmittedWorkDone();

        // Benchmark Single-Pass
        const start1 = performance.now();
        for (let i = 0; i < iterations; i++) {
          const enc = device.createCommandEncoder();
          const p = enc.beginRenderPass({ colorAttachments: [{ view: outView1, loadOp: 'clear', storeOp: 'store', clearValue: { r: 0.5, g: 0.5, b: 0.5, a: 1 } }] });
          p.setPipeline(singlePipe); p.setBindGroup(0, singleBG); p.draw(3); p.end();
          device.queue.submit([enc.finish()]);
        }
        await device.queue.onSubmittedWorkDone();
        const time1pass = performance.now() - start1;

        const t2 = (time2pass / iterations).toFixed(3);
        const t1 = (time1pass / iterations).toFixed(3);
        const faster = time1pass < time2pass ? 'Single-Pass' : '2-Pass';
        const ratio = time1pass < time2pass ? (time2pass / time1pass).toFixed(2) : (time1pass / time2pass).toFixed(2);

        results.push({ size: `${size.w}x${size.h}`, twoPass: t2, singlePass: t1, faster, ratio });

        log(`${size.w}x${size.h}: 2-Pass=${t2}ms, Single-Pass=${t1}ms => ${faster} is ${ratio}x faster`);

        // Cleanup
        quadTex.destroy(); outputTex2.destroy(); outputTex1.destroy();
      }

      logHeader('');
      logHeader('=== SUMMARY ===');
      for (const r of results) {
        log(`${r.size.padEnd(10)} | 2-Pass: ${r.twoPass.padStart(6)}ms | Single: ${r.singlePass.padStart(6)}ms | Winner: ${r.faster} (${r.ratio}x)`);
      }

      device.destroy();
      logSuccess('Shader benchmark complete');
    }

    // ============================================================
    // Memory Test
    // ============================================================
    async function runMemoryTest() {
      logHeader('=== MEMORY LEAK TEST ===');

      const mem0 = getMemoryMB();
      if (!mem0) {
        logWarn('performance.memory not available (try Chrome with --enable-precise-memory-info)');
      } else {
        logInfo(`Initial heap: ${formatMem(mem0.used)} / ${formatMem(mem0.total)}`);
      }

      const manager = new FilterManager();
      const el = document.getElementById('testElement');
      const params = { ...DEFAULT_PARAMS };

      manager.attach(el, params);
      logInfo('FilterManager attached');

      const iterations = 100;
      const snapshots = [];

      logInfo(`Running ${iterations} resize iterations...`);

      for (let i = 0; i < iterations; i++) {
        const phase = (i / iterations) * Math.PI * 4;
        const w = 320 + Math.sin(phase) * 100;
        const h = 200 + Math.cos(phase) * 80;
        el.style.width = w + 'px';
        el.style.height = h + 'px';

        await new Promise(r => setTimeout(r, 30));

        if ((i + 1) % 20 === 0) {
          const mem = getMemoryMB();
          if (mem) {
            snapshots.push({ iter: i + 1, heap: mem.used });
            log(`  [${i + 1}/${iterations}] Heap: ${formatMem(mem.used)}`);
          }
        }
      }

      manager.detach(el);
      logInfo('FilterManager detached');

      // Try to GC
      logInfo('Attempting garbage collection...');
      const hadGC = await forceGC();
      await new Promise(r => setTimeout(r, 500));

      const memFinal = getMemoryMB();
      if (memFinal && mem0) {
        const growth = memFinal.used - mem0.used;
        const perIter = (growth * 1024) / iterations;

        logHeader('');
        logHeader('=== MEMORY RESULTS ===');
        log(`Initial:       ${formatMem(mem0.used)}`);
        log(`Final:         ${formatMem(memFinal.used)}`);
        log(`Growth:        ${formatMem(growth)} (${growth > 1 ? 'LEAK' : 'OK'})`);
        log(`Per iteration: ${perIter.toFixed(2)} KB`);
        log(`GC available:  ${hadGC ? 'Yes (window.gc)' : 'No (fallback used)'}`);

        if (growth > 2) {
          logError(`Significant memory leak detected: ${formatMem(growth)}`);
        } else if (growth > 0.5) {
          logWarn(`Moderate memory growth: ${formatMem(growth)}`);
        } else {
          logSuccess('Memory usage appears stable');
        }
      }

      // Count DOM elements
      const svgFilters = document.querySelectorAll('svg filter').length;
      const feImages = document.querySelectorAll('feImage').length;
      log(`SVG Filters: ${svgFilters}, feImage elements: ${feImages}`);

      logSuccess('Memory test complete');
    }

    // ============================================================
    // Event Handlers
    // ============================================================
    document.getElementById('runShaderBtn').onclick = async () => {
      document.getElementById('runShaderBtn').disabled = true;
      try { await runShaderBenchmark(); }
      catch (e) { logError(`Error: ${e.message}`); console.error(e); }
      document.getElementById('runShaderBtn').disabled = false;
    };

    document.getElementById('runMemoryBtn').onclick = async () => {
      document.getElementById('runMemoryBtn').disabled = true;
      try { await runMemoryTest(); }
      catch (e) { logError(`Error: ${e.message}`); console.error(e); }
      document.getElementById('runMemoryBtn').disabled = false;
    };

    document.getElementById('runAllBtn').onclick = async () => {
      const btns = document.querySelectorAll('button');
      btns.forEach(b => b.disabled = true);
      try {
        await runShaderBenchmark();
        logHeader('');
        await runMemoryTest();
      } catch (e) { logError(`Error: ${e.message}`); console.error(e); }
      btns.forEach(b => b.disabled = false);
    };

    document.getElementById('copyBtn').onclick = () => {
      const text = allLogs.join('\n');
      navigator.clipboard.writeText(text).then(() => {
        log('Results copied to clipboard!', 'success');
      });
    };

    document.getElementById('clearBtn').onclick = () => {
      logEl.innerHTML = '';
      allLogs.length = 0;
    };

    log('Ready. Click a button to start benchmark.');
    log(`WebGPU: ${navigator.gpu ? 'Available' : 'Not available'}`);
    log(`Memory API: ${performance.memory ? 'Available' : 'Not available'}`);
  </script>
</body>
</html>
