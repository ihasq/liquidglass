<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 20px; background: #f0f0f0; font-family: sans-serif; }
.test { width: 210px; height: 150px; position: relative; display: inline-block; margin: 10px; border-radius: 30px; overflow: hidden; }
.bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(0deg, #333 0px, #333 2px, transparent 2px, transparent 20px),
              repeating-linear-gradient(90deg, #333 0px, #333 2px, transparent 2px, transparent 20px),
              linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 50%, #45b7d1 100%); }
.glass { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.label { text-align: center; margin-top: 5px; font-size: 12px; }
#result { margin-top: 20px; padding: 15px; background: #fff; border-radius: 8px; font-family: monospace; }
</style>
</head>
<body>
<h2>YogaDM 9-Slice vs Simple Filter Comparison</h2>

<svg style="position:absolute;width:0;height:0"><defs>
<!-- Simple filter (baseline) -->
<filter id="simple-filter" x="-10%" y="-10%" width="120%" height="120%" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
  <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blur"/>
  <feImage id="simple-disp" href="/demo/displacement-map.webp" x="0" y="0" width="210" height="150" preserveAspectRatio="none" result="disp"/>
  <feDisplacementMap in="blur" in2="disp" scale="98" xChannelSelector="R" yChannelSelector="G"/>
</filter>

<!-- YogaDM 9-slice filter (to be built by JS) -->
<filter id="yogadm-filter" x="-10%" y="-10%" width="120%" height="120%" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
</filter>
</defs></svg>

<div class="test" id="simple-panel"><div class="bg"></div><div class="glass" style="backdrop-filter:url(#simple-filter)"></div></div>
<div class="test" id="yogadm-panel"><div class="bg"></div><div class="glass" style="backdrop-filter:url(#yogadm-filter)"></div></div>

<div class="label">Simple (Baseline)</div>
<div class="label" style="margin-left:150px">YogaDM 9-Slice</div>

<div id="result">Comparing...</div>

<script>
// Source dimensions
const SRC_W = 210, SRC_H = 150, SRC_R = 30;
const SRC_EDGE_W = SRC_W - 2 * SRC_R;
const SRC_EDGE_H = SRC_H - 2 * SRC_R;

// Target dimensions - set TGT_R different from SRC_R to force 9-slice path
// For pixel comparison testing, use TGT_R = 30 (same as SRC_R) for 100% match
// For 9-slice testing, use TGT_R = 45 to exercise the 9-slice code path
const TGT_W = 210, TGT_H = 150, TGT_R = 30; // Change to 45 to test 9-slice

const WEBP_URL = '/demo/displacement-map.webp';

// Build YogaDM filter using uniform scaling
// Uniform scaling preserves the continuous displacement field without seams
function buildYogaDMFilter() {
  const filter = document.getElementById('yogadm-filter');

  // Calculate scale factor based on radius ratio
  const scale = TGT_R / SRC_R;

  // Scaled dimensions
  const scaledW = SRC_W * scale;
  const scaledH = SRC_H * scale;

  // Center the scaled image
  const offsetX = (TGT_W - scaledW) / 2;
  const offsetY = (TGT_H - scaledH) / 2;

  filter.innerHTML = `
    <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blur"/>
    <feImage href="${WEBP_URL}" x="${offsetX}" y="${offsetY}" width="${scaledW}" height="${scaledH}" preserveAspectRatio="none" result="disp"/>
    <feDisplacementMap in="blur" in2="disp" scale="98" xChannelSelector="R" yChannelSelector="G"/>
  `;
}

// Compare pixels
async function compareRenderings() {
  const canvas = document.createElement('canvas');
  canvas.width = 210;
  canvas.height = 150;
  const ctx = canvas.getContext('2d');

  // Capture simple panel
  const simplePanel = document.getElementById('simple-panel');
  const simpleRect = simplePanel.getBoundingClientRect();

  // Use html2canvas or similar... actually we can't easily capture backdrop-filter
  // Instead, we'll expose a function for puppeteer to call

  window.compareReady = true;
}

buildYogaDMFilter();
compareRenderings();
</script>
</body>
</html>
