<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 20px; background: #f0f0f0; font-family: sans-serif; }
.demo { display: flex; gap: 40px; flex-wrap: wrap; }
.panel { position: relative; width: 210px; height: 150px; border-radius: 30px; overflow: hidden; }
.background {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(0deg, #333 0px, #333 2px, transparent 2px, transparent 20px),
    repeating-linear-gradient(90deg, #333 0px, #333 2px, transparent 2px, transparent 20px),
    linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 50%, #45b7d1 100%);
}
.glass { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
h3 { margin: 5px 0; font-size: 12px; }
</style>
</head>
<body>
<h1>SVG Gradient-Based Displacement Maps</h1>
<p>PNG不要 - 純粋なSVGグラデーションで変位マップを定義</p>

<svg style="position:absolute;width:0;height:0">
<defs>
  <!-- 方法1: 4方向の線形グラデーションを合成 -->
  <linearGradient id="dispX" x1="0%" y1="50%" x2="100%" y2="50%">
    <stop offset="0%" stop-color="rgb(255,128,128)"/>
    <stop offset="15%" stop-color="rgb(128,128,128)"/>
    <stop offset="85%" stop-color="rgb(128,128,128)"/>
    <stop offset="100%" stop-color="rgb(0,128,128)"/>
  </linearGradient>

  <linearGradient id="dispY" x1="50%" y1="0%" x2="50%" y2="100%">
    <stop offset="0%" stop-color="rgb(128,255,128)"/>
    <stop offset="15%" stop-color="rgb(128,128,128)"/>
    <stop offset="85%" stop-color="rgb(128,128,128)"/>
    <stop offset="100%" stop-color="rgb(128,0,128)"/>
  </linearGradient>

  <!-- 方法1用フィルター: 2つのグラデーションを合成 -->
  <filter id="filter-gradient-blend" x="0" y="0" width="100%" height="100%"
          filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
          color-interpolation-filters="sRGB">
    <!-- X方向グラデーション -->
    <feFlood flood-color="url(#dispX)" result="floodX"/>
    <feImage href="#rectX" result="dispMapX" preserveAspectRatio="none"/>
    <feImage href="#rectY" result="dispMapY" preserveAspectRatio="none"/>
    <!-- 2つを合成してRGを得る -->
    <feBlend in="dispMapX" in2="dispMapY" mode="multiply" result="combined"/>
    <feDisplacementMap in="SourceGraphic" in2="combined" scale="50"
                       xChannelSelector="R" yChannelSelector="G"/>
  </filter>

  <!-- 変位用の矩形要素 -->
  <rect id="rectX" width="210" height="150" fill="url(#dispX)"/>
  <rect id="rectY" width="210" height="150" fill="url(#dispY)"/>

  <!-- 方法2: 単一SVG内で完結するフィルター -->
  <filter id="filter-edge-gradient" x="-20%" y="-20%" width="140%" height="140%"
          filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
          color-interpolation-filters="sRGB">
    <!-- 上端からのグラデーション (Y+方向) -->
    <feFlood flood-color="rgb(128,255,128)" result="topColor"/>
    <feFlood flood-color="rgb(128,128,128)" result="neutral"/>

    <!-- 変位マップを直接生成する代わりにfeTurbulenceを使用 -->
    <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" result="blurred"/>

    <!-- シンプルな放射状ぼかし効果 -->
    <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="dilated"/>
    <feGaussianBlur in="dilated" stdDeviation="5" result="glow"/>

    <feComposite in="blurred" in2="glow" operator="over"/>
  </filter>

  <!-- 方法3: より単純な線形グラデーション変位 -->
  <linearGradient id="simpleDispX" x1="0%" y1="50%" x2="100%" y2="50%">
    <stop offset="0%" stop-color="rgb(200,128,128)"/>
    <stop offset="10%" stop-color="rgb(128,128,128)"/>
    <stop offset="90%" stop-color="rgb(128,128,128)"/>
    <stop offset="100%" stop-color="rgb(56,128,128)"/>
  </linearGradient>

  <linearGradient id="simpleDispY" x1="50%" y1="0%" x2="50%" y2="100%">
    <stop offset="0%" stop-color="rgb(128,200,128)"/>
    <stop offset="10%" stop-color="rgb(128,128,128)"/>
    <stop offset="90%" stop-color="rgb(128,128,128)"/>
    <stop offset="100%" stop-color="rgb(128,56,128)"/>
  </linearGradient>

  <!-- SVG内部で変位マップ画像を生成 -->
  <svg id="dispMapSVG" width="210" height="150" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="rgb(128,128,128)"/>
    <rect width="100%" height="100%" fill="url(#simpleDispX)" style="mix-blend-mode: multiply"/>
    <rect width="100%" height="100%" fill="url(#simpleDispY)" style="mix-blend-mode: screen"/>
  </svg>

  <filter id="filter-simple" x="0" y="0" width="100%" height="100%"
          filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
          color-interpolation-filters="sRGB">
    <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blurred"/>
    <feImage href="#dispMapSVG" x="0" y="0" width="210" height="150"
             preserveAspectRatio="none" result="dispMap"/>
    <feDisplacementMap in="blurred" in2="dispMap" scale="60"
                       xChannelSelector="R" yChannelSelector="G"/>
  </filter>

  <!-- 方法4: data URI SVGを使用 -->
  <filter id="filter-datauri" x="0" y="0" width="100%" height="100%"
          filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
          color-interpolation-filters="sRGB">
    <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blurred"/>
    <feImage id="datauri-disp" x="0" y="0" width="210" height="150"
             preserveAspectRatio="none" result="dispMap"/>
    <feDisplacementMap in="blurred" in2="dispMap" scale="80"
                       xChannelSelector="R" yChannelSelector="G"/>
  </filter>

  <!-- Kube参照用 -->
  <filter id="filter-kube" x="0" y="0" width="100%" height="100%"
          filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
          color-interpolation-filters="sRGB">
    <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blurred"/>
    <feImage id="kube-disp" x="0" y="0" width="210" height="150"
             preserveAspectRatio="none" result="dispMap"/>
    <feDisplacementMap in="blurred" in2="dispMap" scale="98"
                       xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs>
</svg>

<div class="demo">
  <div>
    <h3>Kube.io (PNG参照)</h3>
    <div class="panel" id="kube-panel">
      <div class="background"></div>
      <div class="glass" style="backdrop-filter:url(#filter-kube)"></div>
    </div>
  </div>

  <div>
    <h3>SVG Data URI グラデーション</h3>
    <div class="panel" id="svg-panel">
      <div class="background"></div>
      <div class="glass" style="backdrop-filter:url(#filter-datauri)"></div>
    </div>
  </div>
</div>

<script>
// Kube PNGをロード
fetch('/e2e/debug/kube-assets/displacement-map-w2qrsb.png')
  .then(r => r.blob())
  .then(blob => {
    document.getElementById('kube-disp').setAttribute('href', URL.createObjectURL(blob));
  });

// SVGグラデーションで変位マップを作成 (data URI)
function createSVGDisplacementMap(width, height) {
  // エッジからの距離に基づく変位グラデーションをSVGで定義
  const svg = `
<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
  <defs>
    <!-- X軸変位: 左端=255(右へ押す), 右端=0(左へ押す), 中央=128 -->
    <linearGradient id="gX" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgb(255,128,128)"/>
      <stop offset="5%" stop-color="rgb(200,128,128)"/>
      <stop offset="12%" stop-color="rgb(128,128,128)"/>
      <stop offset="88%" stop-color="rgb(128,128,128)"/>
      <stop offset="95%" stop-color="rgb(56,128,128)"/>
      <stop offset="100%" stop-color="rgb(0,128,128)"/>
    </linearGradient>
    <!-- Y軸変位: 上端=255(下へ押す), 下端=0(上へ押す), 中央=128 -->
    <linearGradient id="gY" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgb(128,255,128)"/>
      <stop offset="5%" stop-color="rgb(128,200,128)"/>
      <stop offset="12%" stop-color="rgb(128,128,128)"/>
      <stop offset="88%" stop-color="rgb(128,128,128)"/>
      <stop offset="95%" stop-color="rgb(128,56,128)"/>
      <stop offset="100%" stop-color="rgb(128,0,128)"/>
    </linearGradient>
  </defs>
  <!-- ベース: ニュートラル -->
  <rect width="100%" height="100%" fill="rgb(128,128,128)"/>
  <!-- X軸グラデーションをR成分として適用 -->
  <rect width="100%" height="100%" fill="url(#gX)" opacity="1"/>
  <!-- Y軸グラデーションをG成分として合成 (multiply使用でRGを独立に) -->
  <!-- 注: SVGでは完璧なチャンネル分離は難しいため、近似 -->
</svg>`;

  return 'data:image/svg+xml,' + encodeURIComponent(svg);
}

// 改良版: Canvas経由でRGチャンネルを正確に制御
function createCanvasDisplacementMap(width, height) {
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');

  const imageData = ctx.createImageData(width, height);
  const data = imageData.data;

  const edgeZone = Math.min(width, height) * 0.12;  // エッジゾーン = 12%

  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const idx = (y * width + x) * 4;

      // エッジからの距離
      const distLeft = x;
      const distRight = width - 1 - x;
      const distTop = y;
      const distBottom = height - 1 - y;

      // X変位 (R channel)
      let dispX = 128;
      if (distLeft < edgeZone) {
        const t = distLeft / edgeZone;
        dispX = 128 + (1 - t * t) * 127;  // 二次減衰
      } else if (distRight < edgeZone) {
        const t = distRight / edgeZone;
        dispX = 128 - (1 - t * t) * 127;
      }

      // Y変位 (G channel)
      let dispY = 128;
      if (distTop < edgeZone) {
        const t = distTop / edgeZone;
        dispY = 128 + (1 - t * t) * 127;
      } else if (distBottom < edgeZone) {
        const t = distBottom / edgeZone;
        dispY = 128 - (1 - t * t) * 127;
      }

      data[idx] = Math.round(dispX);
      data[idx + 1] = Math.round(dispY);
      data[idx + 2] = 128;
      data[idx + 3] = 255;
    }
  }

  ctx.putImageData(imageData, 0, 0);
  return canvas.toDataURL('image/png');
}

// SVG data URIを設定
const svgDataUri = createSVGDisplacementMap(210, 150);
document.getElementById('datauri-disp').setAttribute('href', svgDataUri);

console.log('SVG displacement map created');
console.log('SVG Data URI length:', svgDataUri.length, 'bytes');
</script>
</body>
</html>
