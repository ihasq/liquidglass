<!DOCTYPE html>
<html><head><style>
body{margin:0;padding:20px;background:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.demo-container{position:relative;width:210px;height:150px;border-radius:30px;overflow:hidden}
.background{position:absolute;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(0deg,#333 0px,#333 2px,transparent 2px,transparent 20px),
    repeating-linear-gradient(90deg,#333 0px,#333 2px,transparent 2px,transparent 20px),
    linear-gradient(135deg,#ff6b6b 0%,#4ecdc4 50%,#45b7d1 100%)}
.glass{position:absolute;top:0;left:0;width:100%;height:100%}
.label{text-align:center;margin-top:10px;font-size:12px;color:#666}
.label strong{color:#333}
.controls{background:#fff;border-radius:12px;padding:15px;margin-top:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1);max-width:500px}
.controls h3{margin:0 0 15px 0;font-size:14px;color:#333}
.control-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.control-row label{width:100px;font-size:12px;color:#666}
.control-row input[type="range"]{flex:1;height:4px}
.control-row .value{width:50px;text-align:right;font-size:12px;font-family:monospace;color:#333}
.control-row select{flex:1;padding:4px;border:1px solid #ddd;border-radius:4px;font-size:12px}
.lg-controls{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:12px;padding:20px;margin-top:20px;box-shadow:0 4px 20px rgba(102,126,234,0.4);max-width:500px}
.lg-controls h3{margin:0 0 15px 0;font-size:16px;color:#fff;font-weight:600}
.lg-controls .control-row label{color:rgba(255,255,255,0.9)}
.lg-controls .control-row .value{color:#fff;font-weight:500}
.lg-controls input[type="range"]{accent-color:#fff}
.controls.technical{opacity:0.7;transition:opacity 0.2s}
.controls.technical:hover{opacity:1}
.controls.technical h3{font-size:12px;color:#999}
</style></head>
<body>
<svg style="position:absolute;width:0;height:0"><defs>
<!-- Kube filter with kube displacement + kube specular (reference) -->
<filter id="kube-filter" x="0" y="0" width="100%" height="100%" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
<feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blurred_source"/>
<feImage id="kube-disp-img" x="0" y="0" width="210" height="150" preserveAspectRatio="none" result="displacement_map"/>
<feDisplacementMap in="blurred_source" in2="displacement_map" scale="98" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
<feColorMatrix in="displaced" type="saturate" values="9" result="displaced_saturated"/>
<feImage id="kube-spec-img" x="0" y="0" width="210" height="150" preserveAspectRatio="none" result="specular_layer"/>
<feComposite in="displaced_saturated" in2="specular_layer" operator="in" result="specular_saturated"/>
<feComponentTransfer in="specular_layer" result="specular_faded"><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
<feBlend in="specular_saturated" in2="displaced" mode="normal" result="withSaturation"/>
<feBlend in="specular_faded" in2="withSaturation" mode="normal"/>
</filter>
<!-- Our filter using kube displacement + our specular (existing) -->
<filter id="our-filter" x="0" y="0" width="100%" height="100%" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
<feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blurred_source"/>
<feImage id="our-disp-img" x="0" y="0" width="210" height="150" preserveAspectRatio="none" result="displacement_map"/>
<feDisplacementMap in="blurred_source" in2="displacement_map" scale="98" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
<feColorMatrix in="displaced" type="saturate" values="9" result="displaced_saturated"/>
<feImage id="our-spec-img" x="0" y="0" width="210" height="150" preserveAspectRatio="none" result="specular_layer"/>
<feComposite in="displaced_saturated" in2="specular_layer" operator="in" result="specular_saturated"/>
<feComponentTransfer in="specular_layer" result="specular_faded"><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
<feBlend in="specular_saturated" in2="displaced" mode="normal" result="withSaturation"/>
<feBlend in="specular_faded" in2="withSaturation" mode="normal"/>
</filter>
<!-- WebP displacement + generated specular (simple, no 9-slice) -->
<filter id="webp-filter" x="0" y="0" width="100%" height="100%" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
<feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blurred_source"/>
<feImage id="webp-disp-img" href="/demo/displacement-map.webp" x="0" y="0" width="210" height="150" preserveAspectRatio="none" result="displacement_map"/>
<feDisplacementMap in="blurred_source" in2="displacement_map" scale="98" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
<feColorMatrix in="displaced" type="saturate" values="9" result="displaced_saturated"/>
<feImage id="webp-spec-img" x="0" y="0" width="210" height="150" preserveAspectRatio="none" result="specular_layer"/>
<feComposite in="displaced_saturated" in2="specular_layer" operator="in" result="specular_saturated"/>
<feComponentTransfer in="specular_layer" result="specular_faded"><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
<feBlend in="specular_saturated" in2="displaced" mode="normal" result="withSaturation"/>
<feBlend in="specular_faded" in2="withSaturation" mode="normal"/>
</filter>
</defs></svg>
<div style="display:flex;gap:40px;flex-wrap:wrap">
<div>
  <div class="demo-container" id="kube-demo"><div class="background"></div><div class="glass" style="backdrop-filter:url(#kube-filter);-webkit-backdrop-filter:url(#kube-filter)"></div></div>
  <div class="label"><strong>Kube.io (Reference)</strong><br>PNG displacement + PNG specular</div>
</div>
<div>
  <div class="demo-container" id="our-demo"><div class="background"></div><div class="glass" style="backdrop-filter:url(#our-filter);-webkit-backdrop-filter:url(#our-filter)"></div></div>
  <div class="label"><strong>Existing</strong><br>Kube PNG + Our specular</div>
</div>
<div>
  <div class="demo-container" id="webp-demo"><div class="background"></div><div class="glass" style="backdrop-filter:url(#webp-filter);-webkit-backdrop-filter:url(#webp-filter)"></div></div>
  <div class="label"><strong>WebP (NEW)</strong><br>WebP displacement (13.7KB, 100% match)</div>
</div>
</div>

<script type="module">
import{generateSpecularMap}from'../src/core/specular/highlight.ts';

// Initialize - load assets
(async()=>{
  // Kube maps (reference)
  document.getElementById('kube-disp-img').setAttribute('href', URL.createObjectURL(await(await fetch('/e2e/debug/kube-assets/displacement-map-w2qrsb.png')).blob()));
  document.getElementById('kube-spec-img').setAttribute('href', URL.createObjectURL(await(await fetch('/e2e/debug/kube-assets/specular-map-w2qrsb.png')).blob()));

  // Existing: Kube displacement + Our specular
  document.getElementById('our-disp-img').setAttribute('href', URL.createObjectURL(await(await fetch('/e2e/debug/kube-assets/displacement-map-w2qrsb.png')).blob()));
  const specResult = generateSpecularMap({width:420, height:300, profile:'squircle', lightDirection:{x:0.6,y:-0.8}, intensity:0.5, saturation:0, borderRadius:60});
  document.getElementById('our-spec-img').setAttribute('href', specResult.dataUrl);

  // WebP: uses static href in HTML, just need to set specular
  const webpSpec = generateSpecularMap({width:210, height:150, profile:'squircle', lightDirection:{x:0.6,y:-0.8}, intensity:0.5, saturation:0, borderRadius:30});
  document.getElementById('webp-spec-img').setAttribute('href', webpSpec.dataUrl);

  console.log('All assets loaded');
})();
</script></body></html>
