<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Glass - 60fps Stress Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'SF Mono', Monaco, monospace;
      overflow: hidden;
    }

    .grid-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      display: grid;
      grid-template-columns: repeat(auto-fill, 40px);
      grid-template-rows: repeat(auto-fill, 40px);
      background: #0a0a12;
    }

    .grid-cell {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .grid-cell:nth-child(odd) { background: rgba(255,80,80,0.2); color: #ff6b6b; }
    .grid-cell:nth-child(even) { background: rgba(80,180,255,0.2); color: #4ecdc4; }

    .hud {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.85);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 20px;
      color: #fff;
      z-index: 1000;
      min-width: 280px;
    }

    .hud h1 {
      font-size: 14px;
      color: #888;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #222;
    }

    .metric:last-child { border-bottom: none; }

    .metric-label { color: #888; font-size: 12px; }

    .metric-value {
      font-size: 18px;
      font-weight: bold;
    }

    .metric-value.good { color: #00e676; }
    .metric-value.warn { color: #ffab00; }
    .metric-value.bad { color: #ff5252; }

    .fps-bar {
      height: 4px;
      background: #222;
      border-radius: 2px;
      margin-top: 5px;
      overflow: hidden;
    }

    .fps-bar-fill {
      height: 100%;
      background: #00e676;
      transition: width 0.1s, background 0.3s;
    }

    .controls {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start { background: #00e676; color: #000; }
    .btn-start:hover { background: #00c853; }
    .btn-stop { background: #ff5252; color: #fff; }
    .btn-stop:hover { background: #ff1744; }

    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .control-row label {
      font-size: 11px;
      color: #888;
      min-width: 80px;
    }

    .control-row input[type="range"] { flex: 1; }
    .control-row span { min-width: 30px; font-size: 11px; color: #0f0; }

    .test-area {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    liquid-glass {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 14px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .frame-graph {
      margin-top: 15px;
      height: 60px;
      background: #111;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }

    .frame-bar {
      flex: 1;
      min-width: 2px;
      background: #00e676;
      transition: height 0.05s;
    }

    .frame-bar.dropped { background: #ff5252; }
  </style>
</head>
<body>
  <div class="grid-background" id="grid-bg"></div>

  <div class="hud">
    <h1>60fps Stress Test</h1>

    <div class="metric">
      <span class="metric-label">FPS</span>
      <span class="metric-value good" id="fps">--</span>
    </div>
    <div class="fps-bar"><div class="fps-bar-fill" id="fps-bar"></div></div>

    <div class="metric">
      <span class="metric-label">Frame Time</span>
      <span class="metric-value" id="frame-time">-- ms</span>
    </div>

    <div class="metric">
      <span class="metric-label">Generation Time</span>
      <span class="metric-value" id="gen-time">-- ms</span>
    </div>

    <div class="metric">
      <span class="metric-label">Dropped Frames</span>
      <span class="metric-value" id="dropped">0</span>
    </div>

    <div class="metric">
      <span class="metric-label">Total Frames</span>
      <span class="metric-value" id="total-frames">0</span>
    </div>

    <div class="frame-graph" id="frame-graph"></div>

    <div class="controls">
      <div class="control-row">
        <label>Elements:</label>
        <input type="range" id="element-count" min="1" max="10" value="1">
        <span id="element-count-val">1</span>
      </div>

      <div class="control-row">
        <label>Animation:</label>
        <select id="animation-type" style="flex:1; padding:5px;">
          <option value="bounce">Bounce (size)</option>
          <option value="radius">Radius change</option>
          <option value="both">Both</option>
          <option value="wave">Wave</option>
        </select>
      </div>

      <div class="control-row">
        <label>Speed:</label>
        <input type="range" id="speed" min="1" max="10" value="5">
        <span id="speed-val">5</span>
      </div>

      <button class="btn btn-start" id="start-btn">Start Test</button>
      <button class="btn btn-stop" id="stop-btn" style="display:none;">Stop Test</button>
    </div>
  </div>

  <div class="test-area" id="test-area"></div>

  <script>
    // Generate grid
    (function() {
      const grid = document.getElementById('grid-bg');
      const cols = Math.ceil(window.innerWidth / 40);
      const rows = Math.ceil(window.innerHeight / 40) + 5;
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      for (let i = 0; i < rows * cols; i++) {
        const cell = document.createElement('div');
        cell.className = 'grid-cell';
        cell.textContent = chars[i % chars.length];
        grid.appendChild(cell);
      }
    })();
  </script>

  <script type="module">
    import { LiquidGlassElement } from '../src/index.ts';

    // State
    let running = false;
    let animationId = null;
    let elements = [];
    let frameCount = 0;
    let droppedFrames = 0;
    let lastFrameTime = 0;
    let frameTimes = [];
    let genTimes = [];

    // Config
    let elementCount = 1;
    let animationType = 'bounce';
    let speed = 5;

    // DOM
    const fpsEl = document.getElementById('fps');
    const fpsBar = document.getElementById('fps-bar');
    const frameTimeEl = document.getElementById('frame-time');
    const genTimeEl = document.getElementById('gen-time');
    const droppedEl = document.getElementById('dropped');
    const totalFramesEl = document.getElementById('total-frames');
    const frameGraph = document.getElementById('frame-graph');
    const testArea = document.getElementById('test-area');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');

    // Initialize frame graph
    for (let i = 0; i < 60; i++) {
      const bar = document.createElement('div');
      bar.className = 'frame-bar';
      bar.style.height = '100%';
      frameGraph.appendChild(bar);
    }
    const frameBars = frameGraph.querySelectorAll('.frame-bar');

    function createElements(count) {
      // Clear existing
      testArea.innerHTML = '';
      elements = [];

      const baseSize = 150;
      const spacing = 180;
      const startX = -((count - 1) * spacing) / 2;

      for (let i = 0; i < count; i++) {
        const el = document.createElement('liquid-glass');
        el.style.width = baseSize + 'px';
        el.style.height = baseSize + 'px';
        el.style.borderRadius = '20px';
        el.style.left = (startX + i * spacing) + 'px';
        el.style.top = '0px';
        el.style.transform = 'translate(-50%, -50%)';
        el.textContent = `#${i + 1}`;
        el.setAttribute('refraction', '50');
        el.setAttribute('thickness', '50');

        testArea.appendChild(el);
        elements.push({
          el,
          phase: i * (Math.PI / count),
          baseWidth: baseSize,
          baseHeight: baseSize,
          baseRadius: 20
        });
      }
    }

    function updateMetrics(frameTime, genTime) {
      frameTimes.push(frameTime);
      if (frameTimes.length > 60) frameTimes.shift();

      genTimes.push(genTime);
      if (genTimes.length > 60) genTimes.shift();

      const avgFrameTime = frameTimes.reduce((a, b) => a + b, 0) / frameTimes.length;
      const avgGenTime = genTimes.reduce((a, b) => a + b, 0) / genTimes.length;
      const fps = 1000 / avgFrameTime;

      // Update display
      fpsEl.textContent = fps.toFixed(1);
      fpsEl.className = 'metric-value ' + (fps >= 55 ? 'good' : fps >= 30 ? 'warn' : 'bad');

      fpsBar.style.width = Math.min(fps / 60 * 100, 100) + '%';
      fpsBar.style.background = fps >= 55 ? '#00e676' : fps >= 30 ? '#ffab00' : '#ff5252';

      frameTimeEl.textContent = avgFrameTime.toFixed(2) + ' ms';
      frameTimeEl.className = 'metric-value ' + (avgFrameTime <= 16.67 ? 'good' : avgFrameTime <= 33.33 ? 'warn' : 'bad');

      genTimeEl.textContent = avgGenTime.toFixed(2) + ' ms';
      genTimeEl.className = 'metric-value ' + (avgGenTime <= 8 ? 'good' : avgGenTime <= 16 ? 'warn' : 'bad');

      droppedEl.textContent = droppedFrames;
      droppedEl.className = 'metric-value ' + (droppedFrames === 0 ? 'good' : droppedFrames < 10 ? 'warn' : 'bad');

      totalFramesEl.textContent = frameCount;

      // Update frame graph
      const graphIndex = frameCount % 60;
      frameBars.forEach((bar, i) => {
        if (i === graphIndex) {
          const height = Math.min(frameTime / 33.33 * 100, 100);
          bar.style.height = height + '%';
          bar.className = 'frame-bar' + (frameTime > 18 ? ' dropped' : '');
        }
      });

      // Detect dropped frame
      if (frameTime > 18) {
        droppedFrames++;
      }
    }

    function animate(timestamp) {
      if (!running) return;

      const frameStart = performance.now();
      const deltaTime = lastFrameTime ? timestamp - lastFrameTime : 16.67;
      lastFrameTime = timestamp;

      const time = timestamp / 1000 * speed;
      let totalGenTime = 0;

      elements.forEach((item, index) => {
        const { el, phase, baseWidth, baseHeight, baseRadius } = item;

        let newWidth = baseWidth;
        let newHeight = baseHeight;
        let newRadius = baseRadius;

        switch (animationType) {
          case 'bounce':
            const bounceScale = 1 + Math.sin(time * 2 + phase) * 0.3;
            newWidth = baseWidth * bounceScale;
            newHeight = baseHeight * (1 + Math.sin(time * 2 + phase + Math.PI/4) * 0.2);
            break;

          case 'radius':
            newRadius = 10 + Math.abs(Math.sin(time * 1.5 + phase)) * 40;
            break;

          case 'both':
            const scale = 1 + Math.sin(time * 2 + phase) * 0.25;
            newWidth = baseWidth * scale;
            newHeight = baseHeight * scale;
            newRadius = 10 + Math.abs(Math.sin(time * 3 + phase)) * 35;
            break;

          case 'wave':
            const waveOffset = Math.sin(time * 3 + index * 0.5) * 0.2;
            newWidth = baseWidth * (1 + waveOffset);
            newHeight = baseHeight * (1 - waveOffset * 0.5);
            newRadius = 15 + Math.sin(time * 2 + phase) * 15;
            break;
        }

        // Measure generation time by forcing style recalc
        const genStart = performance.now();
        el.style.width = Math.round(newWidth) + 'px';
        el.style.height = Math.round(newHeight) + 'px';
        el.style.borderRadius = Math.round(newRadius) + 'px';
        // Force reflow to trigger displacement map regeneration
        el.offsetHeight;
        totalGenTime += performance.now() - genStart;
      });

      frameCount++;
      const frameTime = performance.now() - frameStart + deltaTime - 16.67;

      updateMetrics(deltaTime, totalGenTime / elements.length);

      animationId = requestAnimationFrame(animate);
    }

    function startTest() {
      if (running) return;

      running = true;
      frameCount = 0;
      droppedFrames = 0;
      frameTimes = [];
      genTimes = [];
      lastFrameTime = 0;

      createElements(elementCount);

      startBtn.style.display = 'none';
      stopBtn.style.display = 'block';

      animationId = requestAnimationFrame(animate);
    }

    function stopTest() {
      running = false;
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      startBtn.style.display = 'block';
      stopBtn.style.display = 'none';
    }

    // Event listeners
    startBtn.addEventListener('click', startTest);
    stopBtn.addEventListener('click', stopTest);

    document.getElementById('element-count').addEventListener('input', e => {
      elementCount = parseInt(e.target.value);
      document.getElementById('element-count-val').textContent = elementCount;
      if (running) {
        createElements(elementCount);
      }
    });

    document.getElementById('animation-type').addEventListener('change', e => {
      animationType = e.target.value;
    });

    document.getElementById('speed').addEventListener('input', e => {
      speed = parseInt(e.target.value);
      document.getElementById('speed-val').textContent = speed;
    });

    // Initial setup
    createElements(1);
  </script>
</body>
</html>
