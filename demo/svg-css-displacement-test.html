<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 20px; background: #f0f0f0; font-family: sans-serif; }
.demo { display: flex; gap: 30px; flex-wrap: wrap; }
.panel { position: relative; width: 210px; height: 150px; border-radius: 30px; overflow: hidden; }
.bg {
  position: absolute; width: 100%; height: 100%;
  background: repeating-linear-gradient(0deg, #333 0px, #333 2px, transparent 2px, transparent 20px),
    repeating-linear-gradient(90deg, #333 0px, #333 2px, transparent 2px, transparent 20px),
    linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 50%, #45b7d1 100%);
}
.glass { position: absolute; width: 100%; height: 100%; }
h3 { margin: 5px 0; font-size: 12px; }
</style>
</head>
<body>
<h1>SVG + CSS Displacement Map Test</h1>
<p>インラインSVG内のCSS定義がfeDisplacementMapに反映されるか検証</p>

<svg style="position:absolute;width:0;height:0">
<defs>
  <style>
    /* CSS inside SVG */
    .disp-base {
      fill: #808080;
    }
    .disp-x {
      fill: none;
      background: linear-gradient(to right, #ff8080, #808080 15%, #808080 85%, #008080);
    }
    .disp-y {
      fill: none;
      background: linear-gradient(to bottom, #80ff80, #808080 15%, #808080 85%, #800080);
    }

    /* Using CSS gradients via foreignObject */
    .css-gradient-x {
      width: 100%;
      height: 100%;
      background: linear-gradient(to right,
        rgb(255,128,128) 0%,
        rgb(128,128,128) 15%,
        rgb(128,128,128) 85%,
        rgb(0,128,128) 100%
      );
    }
    .css-gradient-y {
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom,
        rgb(128,255,128) 0%,
        rgb(128,128,128) 15%,
        rgb(128,128,128) 85%,
        rgb(128,0,128) 100%
      );
      mix-blend-mode: multiply;
    }
    .css-combined {
      width: 100%;
      height: 100%;
      background:
        linear-gradient(to bottom,
          rgba(0,255,0,1) 0%,
          rgba(0,128,0,1) 15%,
          rgba(0,128,0,1) 85%,
          rgba(0,0,0,1) 100%
        ),
        linear-gradient(to right,
          rgb(255,0,128) 0%,
          rgb(128,0,128) 15%,
          rgb(128,0,128) 85%,
          rgb(0,0,128) 100%
        );
      background-blend-mode: screen;
    }
  </style>

  <!-- Test 1: foreignObject with CSS gradients -->
  <foreignObject id="css-disp-map" width="210" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" class="css-combined"></div>
  </foreignObject>

  <!-- Test 2: foreignObject with layered CSS gradients -->
  <foreignObject id="css-disp-layered" width="210" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" style="position:relative;width:100%;height:100%">
      <div class="css-gradient-x" style="position:absolute;top:0;left:0"></div>
      <div class="css-gradient-y" style="position:absolute;top:0;left:0"></div>
    </div>
  </foreignObject>

  <!-- Test 3: SVG rect with CSS class -->
  <g id="svg-css-rects">
    <rect class="disp-base" width="210" height="150"/>
  </g>

  <!-- Filter using foreignObject reference -->
  <filter id="filter-css-fo" x="0" y="0" width="100%" height="100%"
          filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
          color-interpolation-filters="sRGB">
    <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blurred"/>
    <feImage href="#css-disp-map" x="0" y="0" width="210" height="150"
             preserveAspectRatio="none" result="dispMap"/>
    <feDisplacementMap in="blurred" in2="dispMap" scale="80"
                       xChannelSelector="R" yChannelSelector="G"/>
  </filter>

  <!-- Filter using layered foreignObject -->
  <filter id="filter-css-layered" x="0" y="0" width="100%" height="100%"
          filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
          color-interpolation-filters="sRGB">
    <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blurred"/>
    <feImage href="#css-disp-layered" x="0" y="0" width="210" height="150"
             preserveAspectRatio="none" result="dispMap"/>
    <feDisplacementMap in="blurred" in2="dispMap" scale="80"
                       xChannelSelector="R" yChannelSelector="G"/>
  </filter>

  <!-- Kube reference -->
  <filter id="kube-filter" x="0" y="0" width="100%" height="100%"
          filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
          color-interpolation-filters="sRGB">
    <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blurred"/>
    <feImage id="kube-img" x="0" y="0" width="210" height="150"
             preserveAspectRatio="none" result="dispMap"/>
    <feDisplacementMap in="blurred" in2="dispMap" scale="98"
                       xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs>
</svg>

<div class="demo">
  <div>
    <h3>Kube.io (PNG)</h3>
    <div class="panel" id="kube-panel">
      <div class="bg"></div>
      <div class="glass" style="backdrop-filter:url(#kube-filter)"></div>
    </div>
  </div>

  <div>
    <h3>CSS foreignObject (combined)</h3>
    <div class="panel" id="css-fo-panel">
      <div class="bg"></div>
      <div class="glass" style="backdrop-filter:url(#filter-css-fo)"></div>
    </div>
  </div>

  <div>
    <h3>CSS foreignObject (layered)</h3>
    <div class="panel" id="css-layered-panel">
      <div class="bg"></div>
      <div class="glass" style="backdrop-filter:url(#filter-css-layered)"></div>
    </div>
  </div>
</div>

<h2>Displacement Map Visualization</h2>
<div class="demo">
  <div>
    <h3>CSS Combined (background-blend-mode: screen)</h3>
    <div style="width:210px;height:150px;background:
      linear-gradient(to bottom,
        rgba(0,255,0,1) 0%,
        rgba(0,128,0,1) 15%,
        rgba(0,128,0,1) 85%,
        rgba(0,0,0,1) 100%
      ),
      linear-gradient(to right,
        rgb(255,0,128) 0%,
        rgb(128,0,128) 15%,
        rgb(128,0,128) 85%,
        rgb(0,0,128) 100%
      );
      background-blend-mode: screen;
      border: 1px solid #ccc;"></div>
  </div>

  <div>
    <h3>CSS Layered (mix-blend-mode: multiply)</h3>
    <div style="position:relative;width:210px;height:150px;border:1px solid #ccc;">
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;
        background: linear-gradient(to right,
          rgb(255,128,128) 0%,
          rgb(128,128,128) 15%,
          rgb(128,128,128) 85%,
          rgb(0,128,128) 100%
        );"></div>
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;
        background: linear-gradient(to bottom,
          rgb(128,255,128) 0%,
          rgb(128,128,128) 15%,
          rgb(128,128,128) 85%,
          rgb(128,0,128) 100%
        );
        mix-blend-mode: multiply;"></div>
    </div>
  </div>

  <div>
    <h3>Kube.io PNG</h3>
    <img id="kube-map-img" width="210" height="150" style="border:1px solid #ccc"/>
  </div>
</div>

<h2>Console Output</h2>
<pre id="output"></pre>

<script>
// Load kube PNG
fetch('/e2e/debug/kube-assets/displacement-map-w2qrsb.png')
  .then(r => r.blob())
  .then(blob => {
    const url = URL.createObjectURL(blob);
    document.getElementById('kube-img').setAttribute('href', url);
    document.getElementById('kube-map-img').src = url;
  });

// Check if foreignObject is being rendered
const output = document.getElementById('output');
output.textContent = 'Testing foreignObject rendering in feImage...\n';

// Try to render the foreignObject to canvas to see what it produces
setTimeout(() => {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '210');
  svg.setAttribute('height', '150');
  svg.innerHTML = `
    <foreignObject width="210" height="150">
      <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;
        background:
          linear-gradient(to bottom,
            rgba(0,255,0,1) 0%,
            rgba(0,128,0,1) 15%,
            rgba(0,128,0,1) 85%,
            rgba(0,0,0,1) 100%
          ),
          linear-gradient(to right,
            rgb(255,0,128) 0%,
            rgb(128,0,128) 15%,
            rgb(128,0,128) 85%,
            rgb(0,0,128) 100%
          );
        background-blend-mode: screen;
      "></div>
    </foreignObject>
  `;

  const svgData = new XMLSerializer().serializeToString(svg);
  const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);

  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = 210;
    canvas.height = 150;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);

    try {
      const data = ctx.getImageData(0, 0, 210, 150).data;
      output.textContent += '\nforeignObject rendered to canvas:\n';
      output.textContent += `  Top-left (0,0): R=${data[0]}, G=${data[1]}, B=${data[2]}\n`;
      output.textContent += `  Top-center (105,0): R=${data[(105)*4]}, G=${data[(105)*4+1]}, B=${data[(105)*4+2]}\n`;
      output.textContent += `  Center (105,75): R=${data[(75*210+105)*4]}, G=${data[(75*210+105)*4+1]}, B=${data[(75*210+105)*4+2]}\n`;
      output.textContent += `  Bottom-right (209,149): R=${data[(149*210+209)*4]}, G=${data[(149*210+209)*4+1]}, B=${data[(149*210+209)*4+2]}\n`;
    } catch (e) {
      output.textContent += '\nError reading canvas data: ' + e.message + '\n';
      output.textContent += '(This might be due to CORS restrictions with foreignObject)\n';
    }
  };
  img.onerror = () => {
    output.textContent += '\nforeignObject SVG failed to load as image\n';
  };
  img.src = url;
}, 500);
</script>
</body>
</html>
