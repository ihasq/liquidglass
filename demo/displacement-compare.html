<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Displacement Map Algorithm Comparison</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', Monaco, monospace;
      background: #0a0a12;
      color: #eee;
      padding: 20px;
    }
    h1 { font-size: 18px; margin-bottom: 20px; color: #888; }
    .container { display: flex; gap: 40px; flex-wrap: wrap; }
    .panel {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
    }
    .panel h2 {
      font-size: 14px;
      margin-bottom: 16px;
      color: #4ecdc4;
    }
    .canvas-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .canvas-item {
      text-align: center;
    }
    .canvas-item label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 8px;
    }
    canvas {
      border: 1px solid #333;
      image-rendering: pixelated;
    }
    .stats {
      font-size: 11px;
      color: #666;
      margin-top: 8px;
    }
    .diff-panel {
      margin-top: 20px;
    }
    .diff-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }
    .stat-box {
      background: #1a1a2e;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
    }
    .stat-box .value {
      font-size: 24px;
      font-weight: bold;
      color: #43e97b;
    }
    .stat-box .label {
      font-size: 10px;
      color: #888;
      margin-top: 4px;
    }
    .stat-box.warning .value { color: #ffab00; }
    .stat-box.error .value { color: #ff5252; }
    .controls {
      margin-bottom: 20px;
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .control {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .control label { font-size: 12px; color: #888; }
    .control input { width: 80px; }
    .control span { font-size: 12px; color: #4ecdc4; min-width: 40px; }
    .discontinuity-map {
      margin-top: 20px;
    }
    .analysis-output {
      background: #0d0d15;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 12px;
      font-size: 11px;
      line-height: 1.6;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .highlight { color: #ff5252; font-weight: bold; }
    .success { color: #43e97b; }
  </style>
</head>
<body>
  <h1>Displacement Map Algorithm Comparison: Current vs SDF-based</h1>

  <div class="controls">
    <div class="control">
      <label>Width:</label>
      <input type="range" id="width" min="100" max="400" value="200">
      <span id="width-val">200</span>
    </div>
    <div class="control">
      <label>Height:</label>
      <input type="range" id="height" min="100" max="300" value="150">
      <span id="height-val">150</span>
    </div>
    <div class="control">
      <label>Border Radius:</label>
      <input type="range" id="radius" min="0" max="75" value="20">
      <span id="radius-val">20</span>
    </div>
    <div class="control">
      <label>Edge Width:</label>
      <input type="range" id="edgeWidth" min="10" max="100" value="50">
      <span id="edgeWidth-val">50%</span>
    </div>
  </div>

  <div class="container">
    <div class="panel">
      <h2>Current Algorithm</h2>
      <div class="canvas-row">
        <div class="canvas-item">
          <label>Displacement Map</label>
          <canvas id="current-disp" width="200" height="150"></canvas>
          <div class="stats" id="current-stats"></div>
        </div>
        <div class="canvas-item">
          <label>Direction Field</label>
          <canvas id="current-dir" width="200" height="150"></canvas>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>SDF-based Algorithm</h2>
      <div class="canvas-row">
        <div class="canvas-item">
          <label>Displacement Map</label>
          <canvas id="sdf-disp" width="200" height="150"></canvas>
          <div class="stats" id="sdf-stats"></div>
        </div>
        <div class="canvas-item">
          <label>Direction Field</label>
          <canvas id="sdf-dir" width="200" height="150"></canvas>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Difference Analysis</h2>
      <div class="canvas-row">
        <div class="canvas-item">
          <label>Absolute Difference (amplified 10x)</label>
          <canvas id="diff-map" width="200" height="150"></canvas>
        </div>
        <div class="canvas-item">
          <label>Discontinuity Detection</label>
          <canvas id="discontinuity-map" width="200" height="150"></canvas>
        </div>
      </div>
      <div class="diff-stats" id="diff-stats"></div>
    </div>
  </div>

  <div class="panel" style="margin-top: 20px; width: 100%;">
    <h2>SAT Solver Analysis: Continuity Verification</h2>
    <div class="analysis-output" id="sat-output">Initializing...</div>
  </div>

  <script type="module">
    // ========================================
    // Algorithm Implementations
    // ========================================

    // Current algorithm (with discontinuities)
    function currentAlgorithm(px, py, halfW, halfH, r, edgeWidth) {
      const dx = Math.abs(px - halfW);
      const dy = Math.abs(py - halfH);
      const signX = Math.sign(px - halfW) || 1;
      const signY = Math.sign(py - halfH) || 1;

      const inCorner = dx > halfW - r && dy > halfH - r;

      if (inCorner) {
        const cornerX = dx - (halfW - r);
        const cornerY = dy - (halfH - r);
        const cornerDist = Math.sqrt(cornerX * cornerX + cornerY * cornerY);
        if (cornerDist > r) return null;

        const distFromEdge = r - cornerDist;
        const magnitude = Math.exp(-3 * distFromEdge / edgeWidth);

        const dirX = cornerDist > 0.001 ? (cornerX / cornerDist) * signX : 0;
        const dirY = cornerDist > 0.001 ? (cornerY / cornerDist) * signY : 0;

        return { dispX: -dirX * magnitude, dispY: -dirY * magnitude, dirX, dirY };
      }

      const distX = halfW - dx;
      const distY = halfH - dy;

      if (distX < distY) {
        const magnitude = Math.exp(-3 * distX / edgeWidth);
        return { dispX: -signX * magnitude, dispY: 0, dirX: signX, dirY: 0 };
      } else {
        const magnitude = Math.exp(-3 * distY / edgeWidth);
        return { dispX: 0, dispY: -signY * magnitude, dirX: 0, dirY: signY };
      }
    }

    // SDF-based algorithm (continuous)
    function sdfAlgorithm(px, py, halfW, halfH, r, edgeWidth) {
      const dx = Math.abs(px - halfW);
      const dy = Math.abs(py - halfH);
      const signX = Math.sign(px - halfW) || 1;
      const signY = Math.sign(py - halfH) || 1;

      const innerW = halfW - r;
      const innerH = halfH - r;

      let distFromEdge, dirX, dirY;

      if (dx <= innerW && dy <= innerH) {
        // Inner rectangle - smooth blend
        const distX = halfW - dx;
        const distY = halfH - dy;

        // Exponential weighting for smooth transition
        const k = 8;
        const expX = Math.exp(-k * distX / edgeWidth);
        const expY = Math.exp(-k * distY / edgeWidth);
        const sumExp = expX + expY;

        distFromEdge = Math.min(distX, distY);
        dirX = (expX / sumExp) * signX;
        dirY = (expY / sumExp) * signY;

      } else if (dx <= innerW) {
        // Top/bottom edge
        distFromEdge = halfH - dy;
        dirX = 0;
        dirY = signY;

      } else if (dy <= innerH) {
        // Left/right edge
        distFromEdge = halfW - dx;
        dirX = signX;
        dirY = 0;

      } else {
        // Corner region
        const cornerX = dx - innerW;
        const cornerY = dy - innerH;
        const cornerDist = Math.sqrt(cornerX * cornerX + cornerY * cornerY);

        if (cornerDist > r) return null;

        distFromEdge = r - cornerDist;

        if (cornerDist > 0.001) {
          dirX = (cornerX / cornerDist) * signX;
          dirY = (cornerY / cornerDist) * signY;
        } else {
          dirX = 0;
          dirY = 0;
        }
      }

      const magnitude = distFromEdge > 0 ? Math.exp(-3 * distFromEdge / edgeWidth) : 0;
      return { dispX: -dirX * magnitude, dispY: -dirY * magnitude, dirX, dirY };
    }

    // ========================================
    // Rendering Functions
    // ========================================

    function renderDisplacementMap(canvas, algorithm, width, height, radius, edgeWidthRatio) {
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;

      const halfW = width / 2;
      const halfH = height / 2;
      const r = Math.min(radius, halfW, halfH);
      const edgeWidth = Math.min(halfW, halfH) * edgeWidthRatio;

      const results = [];

      for (let py = 0; py < height; py++) {
        for (let px = 0; px < width; px++) {
          const idx = (py * width + px) * 4;
          const result = algorithm(px, py, halfW, halfH, r, edgeWidth);

          if (result === null) {
            data[idx] = 128;
            data[idx + 1] = 128;
            data[idx + 2] = 128;
            data[idx + 3] = 255;
            results.push({ px, py, dispX: 0, dispY: 0, outside: true });
          } else {
            data[idx] = Math.round(128 + result.dispX * 127);
            data[idx + 1] = Math.round(128 + result.dispY * 127);
            data[idx + 2] = 128;
            data[idx + 3] = 255;
            results.push({ px, py, ...result, outside: false });
          }
        }
      }

      ctx.putImageData(imageData, 0, 0);
      return results;
    }

    function renderDirectionField(canvas, results, width, height, step = 10) {
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = '#4ecdc4';
      ctx.lineWidth = 1;

      for (let py = step / 2; py < height; py += step) {
        for (let px = step / 2; px < width; px += step) {
          const idx = py * width + px;
          const r = results[idx];
          if (!r || r.outside) continue;

          const len = Math.sqrt(r.dirX * r.dirX + r.dirY * r.dirY) * step * 0.4;
          if (len < 0.5) continue;

          ctx.beginPath();
          ctx.moveTo(px, py);
          ctx.lineTo(px + r.dirX * len, py + r.dirY * len);
          ctx.stroke();
        }
      }
    }

    function renderDiffMap(canvas, results1, results2, width, height) {
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;

      let maxDiff = 0;
      let totalDiff = 0;
      let pixelCount = 0;

      for (let i = 0; i < results1.length; i++) {
        const r1 = results1[i];
        const r2 = results2[i];
        const idx = i * 4;

        if (r1.outside && r2.outside) {
          data[idx] = 0;
          data[idx + 1] = 0;
          data[idx + 2] = 0;
          data[idx + 3] = 255;
          continue;
        }

        const diffX = Math.abs((r1.dispX || 0) - (r2.dispX || 0));
        const diffY = Math.abs((r1.dispY || 0) - (r2.dispY || 0));
        const diff = Math.sqrt(diffX * diffX + diffY * diffY);

        maxDiff = Math.max(maxDiff, diff);
        totalDiff += diff;
        pixelCount++;

        // Amplify by 10x for visibility
        const intensity = Math.min(255, Math.round(diff * 10 * 255));
        data[idx] = intensity;
        data[idx + 1] = 0;
        data[idx + 2] = 255 - intensity;
        data[idx + 3] = 255;
      }

      ctx.putImageData(imageData, 0, 0);

      return {
        maxDiff,
        avgDiff: pixelCount > 0 ? totalDiff / pixelCount : 0,
        pixelCount
      };
    }

    // ========================================
    // Discontinuity Detection (SAT-like analysis)
    // ========================================

    function detectDiscontinuities(results, width, height) {
      const discontinuities = [];
      const threshold = 0.05; // Direction change threshold

      for (let py = 1; py < height - 1; py++) {
        for (let px = 1; px < width - 1; px++) {
          const idx = py * width + px;
          const r = results[idx];
          if (r.outside) continue;

          // Check neighbors
          const neighbors = [
            results[idx - 1],           // left
            results[idx + 1],           // right
            results[idx - width],       // up
            results[idx + width],       // down
          ];

          for (const n of neighbors) {
            if (!n || n.outside) continue;

            const dirDiffX = Math.abs((r.dirX || 0) - (n.dirX || 0));
            const dirDiffY = Math.abs((r.dirY || 0) - (n.dirY || 0));
            const dirChange = Math.sqrt(dirDiffX * dirDiffX + dirDiffY * dirDiffY);

            if (dirChange > threshold) {
              discontinuities.push({ px, py, dirChange });
              break;
            }
          }
        }
      }

      return discontinuities;
    }

    function renderDiscontinuityMap(canvas, discontinuities, width, height) {
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = '#ff5252';
      for (const d of discontinuities) {
        const intensity = Math.min(1, d.dirChange * 2);
        ctx.globalAlpha = intensity;
        ctx.fillRect(d.px, d.py, 1, 1);
      }
      ctx.globalAlpha = 1;
    }

    // ========================================
    // SAT Solver Simulation
    // ========================================

    function runSATAnalysis(currentResults, sdfResults, width, height, radius) {
      const output = [];
      const halfW = width / 2;
      const halfH = height / 2;
      const r = Math.min(radius, halfW, halfH);

      output.push('=== SAT Solver: Continuity Constraint Verification ===\n');
      output.push('Checking mathematical constraints for displacement field continuity...\n');

      // Constraint 1: C0 continuity (no jumps)
      output.push('--- Constraint 1: C0 Continuity (Value Continuity) ---\n');

      let c0ViolationsCurrent = 0;
      let c0ViolationsSDF = 0;
      const jumpThreshold = 0.1;

      for (let py = 1; py < height - 1; py++) {
        for (let px = 1; px < width - 1; px++) {
          const idx = py * width + px;
          const curr = currentResults[idx];
          const sdf = sdfResults[idx];
          if (curr.outside) continue;

          // Check horizontal neighbor
          const currRight = currentResults[idx + 1];
          const sdfRight = sdfResults[idx + 1];

          if (!currRight.outside) {
            const currJump = Math.abs(curr.dispX - currRight.dispX) + Math.abs(curr.dispY - currRight.dispY);
            const sdfJump = Math.abs(sdf.dispX - sdfRight.dispX) + Math.abs(sdf.dispY - sdfRight.dispY);

            if (currJump > jumpThreshold) c0ViolationsCurrent++;
            if (sdfJump > jumpThreshold) c0ViolationsSDF++;
          }
        }
      }

      output.push(`Current Algorithm: ${c0ViolationsCurrent} C0 violations (threshold: ${jumpThreshold})`);
      output.push(`SDF Algorithm:     ${c0ViolationsSDF} C0 violations\n`);

      // Constraint 2: Direction field continuity at critical boundaries
      output.push('--- Constraint 2: Diagonal Boundary Analysis ---\n');
      output.push('Checking direction field at distX ≈ distY diagonal...\n');

      const diagonalPoints = [];
      for (let t = 0.2; t < 0.8; t += 0.1) {
        const px = Math.round(halfW + (halfW - r) * t);
        const py = Math.round(halfH + (halfH - r) * t);

        // Sample points across diagonal
        for (let offset = -2; offset <= 2; offset++) {
          const testX = px + offset;
          const testY = py - offset;
          const idx = testY * width + testX;

          if (idx >= 0 && idx < currentResults.length) {
            const curr = currentResults[idx];
            const sdf = sdfResults[idx];

            if (!curr.outside) {
              diagonalPoints.push({
                x: testX, y: testY, offset,
                currDir: `(${curr.dirX?.toFixed(2) || 0}, ${curr.dirY?.toFixed(2) || 0})`,
                sdfDir: `(${sdf.dirX?.toFixed(2) || 0}, ${sdf.dirY?.toFixed(2) || 0})`,
                currDisp: curr.dispX?.toFixed(3) + ',' + curr.dispY?.toFixed(3),
                sdfDisp: sdf.dispX?.toFixed(3) + ',' + sdf.dispY?.toFixed(3)
              });
            }
          }
        }
      }

      // Find direction discontinuities
      let currentDiscont = 0;
      let sdfDiscont = 0;

      for (let i = 1; i < diagonalPoints.length; i++) {
        const prev = diagonalPoints[i - 1];
        const curr = diagonalPoints[i];

        // Parse directions
        const prevCurrDir = prev.currDir.match(/-?\d+\.?\d*/g).map(Number);
        const currCurrDir = curr.currDir.match(/-?\d+\.?\d*/g).map(Number);
        const prevSdfDir = prev.sdfDir.match(/-?\d+\.?\d*/g).map(Number);
        const currSdfDir = curr.sdfDir.match(/-?\d+\.?\d*/g).map(Number);

        const currChange = Math.abs(prevCurrDir[0] - currCurrDir[0]) + Math.abs(prevCurrDir[1] - currCurrDir[1]);
        const sdfChange = Math.abs(prevSdfDir[0] - currSdfDir[0]) + Math.abs(prevSdfDir[1] - currSdfDir[1]);

        if (currChange > 0.5) currentDiscont++;
        if (sdfChange > 0.5) sdfDiscont++;
      }

      output.push(`Direction discontinuities detected:`);
      output.push(`  Current: <span class="${currentDiscont > 0 ? 'highlight' : 'success'}">${currentDiscont} discontinuities</span>`);
      output.push(`  SDF:     <span class="${sdfDiscont > 0 ? 'highlight' : 'success'}">${sdfDiscont} discontinuities</span>\n`);

      // Constraint 3: Corner/Edge boundary
      output.push('--- Constraint 3: Corner/Edge Boundary Transition ---\n');

      const cornerBoundaryX = halfW - r;
      const cornerBoundaryY = halfH - r;

      output.push(`Corner region starts at: dx > ${cornerBoundaryX.toFixed(1)}, dy > ${cornerBoundaryY.toFixed(1)}`);

      // Sample along corner boundary
      let cornerViolationsCurrent = 0;
      let cornerViolationsSDF = 0;

      for (let py = Math.round(halfH + cornerBoundaryY - 5); py <= Math.round(halfH + cornerBoundaryY + 5); py++) {
        const px = Math.round(halfW + cornerBoundaryX);
        const idx = py * width + px;
        const idxPrev = py * width + px - 1;

        if (idx < currentResults.length && idxPrev >= 0) {
          const curr = currentResults[idx];
          const currPrev = currentResults[idxPrev];
          const sdf = sdfResults[idx];
          const sdfPrev = sdfResults[idxPrev];

          if (!curr.outside && !currPrev.outside) {
            const currJump = Math.sqrt(
              Math.pow((curr.dirX || 0) - (currPrev.dirX || 0), 2) +
              Math.pow((curr.dirY || 0) - (currPrev.dirY || 0), 2)
            );
            const sdfJump = Math.sqrt(
              Math.pow((sdf.dirX || 0) - (sdfPrev.dirX || 0), 2) +
              Math.pow((sdf.dirY || 0) - (sdfPrev.dirY || 0), 2)
            );

            if (currJump > 0.3) cornerViolationsCurrent++;
            if (sdfJump > 0.3) cornerViolationsSDF++;
          }
        }
      }

      output.push(`Corner boundary violations (direction change > 0.3):`);
      output.push(`  Current: ${cornerViolationsCurrent}`);
      output.push(`  SDF:     ${cornerViolationsSDF}\n`);

      // Summary
      output.push('=== SAT SOLVER VERDICT ===\n');

      const currentScore = c0ViolationsCurrent + currentDiscont * 10 + cornerViolationsCurrent * 5;
      const sdfScore = c0ViolationsSDF + sdfDiscont * 10 + cornerViolationsSDF * 5;

      output.push(`Discontinuity Score (lower is better):`);
      output.push(`  Current Algorithm: <span class="${currentScore > 10 ? 'highlight' : 'success'}">${currentScore}</span>`);
      output.push(`  SDF Algorithm:     <span class="${sdfScore > 10 ? 'highlight' : 'success'}">${sdfScore}</span>\n`);

      if (sdfScore < currentScore) {
        output.push(`<span class="success">✓ SDF algorithm satisfies continuity constraints better</span>`);
        output.push(`<span class="success">✓ Reduction in discontinuities: ${((1 - sdfScore / currentScore) * 100).toFixed(1)}%</span>`);
      } else if (sdfScore === currentScore) {
        output.push(`Both algorithms have equivalent continuity properties.`);
      } else {
        output.push(`<span class="highlight">⚠ SDF algorithm has more violations - needs review</span>`);
      }

      return output.join('\n');
    }

    // ========================================
    // Main Update Function
    // ========================================

    function update() {
      const width = parseInt(document.getElementById('width').value);
      const height = parseInt(document.getElementById('height').value);
      const radius = parseInt(document.getElementById('radius').value);
      const edgeWidthRatio = parseInt(document.getElementById('edgeWidth').value) / 100;

      document.getElementById('width-val').textContent = width;
      document.getElementById('height-val').textContent = height;
      document.getElementById('radius-val').textContent = radius;
      document.getElementById('edgeWidth-val').textContent = Math.round(edgeWidthRatio * 100) + '%';

      // Render both algorithms
      const currentResults = renderDisplacementMap(
        document.getElementById('current-disp'),
        currentAlgorithm, width, height, radius, edgeWidthRatio
      );

      const sdfResults = renderDisplacementMap(
        document.getElementById('sdf-disp'),
        sdfAlgorithm, width, height, radius, edgeWidthRatio
      );

      // Render direction fields
      renderDirectionField(document.getElementById('current-dir'), currentResults, width, height);
      renderDirectionField(document.getElementById('sdf-dir'), sdfResults, width, height);

      // Render diff map
      const diffStats = renderDiffMap(
        document.getElementById('diff-map'),
        currentResults, sdfResults, width, height
      );

      // Detect and render discontinuities
      const currentDiscont = detectDiscontinuities(currentResults, width, height);
      const sdfDiscont = detectDiscontinuities(sdfResults, width, height);

      renderDiscontinuityMap(document.getElementById('discontinuity-map'), currentDiscont, width, height);

      // Update diff stats
      const statsContainer = document.getElementById('diff-stats');
      statsContainer.innerHTML = `
        <div class="stat-box ${diffStats.maxDiff > 0.1 ? 'warning' : ''}">
          <div class="value">${diffStats.maxDiff.toFixed(4)}</div>
          <div class="label">Max Difference</div>
        </div>
        <div class="stat-box">
          <div class="value">${diffStats.avgDiff.toFixed(6)}</div>
          <div class="label">Avg Difference</div>
        </div>
        <div class="stat-box ${currentDiscont.length > sdfDiscont.length ? 'error' : ''}">
          <div class="value">${currentDiscont.length} → ${sdfDiscont.length}</div>
          <div class="label">Discontinuity Points</div>
        </div>
      `;

      // Run SAT analysis
      const satOutput = runSATAnalysis(currentResults, sdfResults, width, height, radius);
      document.getElementById('sat-output').innerHTML = satOutput;
    }

    // Event listeners
    ['width', 'height', 'radius', 'edgeWidth'].forEach(id => {
      document.getElementById(id).addEventListener('input', update);
    });

    // Initial render
    update();
  </script>
</body>
</html>
