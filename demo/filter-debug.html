<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background:
        repeating-linear-gradient(0deg, #000 0px, #000 1px, transparent 1px, transparent 50px),
        repeating-linear-gradient(90deg, #000 0px, #000 1px, transparent 1px, transparent 50px),
        #fff;
    }
    .test-box {
      width: 300px;
      height: 200px;
      border: 2px solid red;
      border-radius: 24px;
    }
    #test1 {
      backdrop-filter: url(#simple-displacement);
      -webkit-backdrop-filter: url(#simple-displacement);
    }
    h3 {
      background: white;
      padding: 5px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <!-- SVG with test filters -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <!-- Filter with scale=30 -->
      <filter id="filter-30" x="0" y="0" width="100%" height="100%"
              filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
              color-interpolation-filters="sRGB">
        <feImage class="disp-image" x="0" y="0" width="300" height="200"
                 preserveAspectRatio="none" result="dispMap" />
        <feDisplacementMap in="SourceGraphic" in2="dispMap"
                           scale="30" xChannelSelector="R" yChannelSelector="G" />
      </filter>

      <!-- Filter with scale=178 (original) -->
      <filter id="filter-178" x="0" y="0" width="100%" height="100%"
              filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
              color-interpolation-filters="sRGB">
        <feImage class="disp-image" x="0" y="0" width="300" height="200"
                 preserveAspectRatio="none" result="dispMap" />
        <feDisplacementMap in="SourceGraphic" in2="dispMap"
                           scale="178" xChannelSelector="R" yChannelSelector="G" />
      </filter>

      <!-- Filter with scale=50 -->
      <filter id="filter-50" x="0" y="0" width="100%" height="100%"
              filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
              color-interpolation-filters="sRGB">
        <feImage class="disp-image" x="0" y="0" width="300" height="200"
                 preserveAspectRatio="none" result="dispMap" />
        <feDisplacementMap in="SourceGraphic" in2="dispMap"
                           scale="50" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>

  <h3>Test 1: scale=30</h3>
  <div id="test1" class="test-box" style="backdrop-filter: url(#filter-30); -webkit-backdrop-filter: url(#filter-30);"></div>

  <h3>Test 2: scale=178 (original)</h3>
  <div id="test2" class="test-box" style="backdrop-filter: url(#filter-178); -webkit-backdrop-filter: url(#filter-178);"></div>

  <h3>Test 3: scale=50</h3>
  <div id="test3" class="test-box" style="backdrop-filter: url(#filter-50); -webkit-backdrop-filter: url(#filter-50);"></div>

  <h3>Generated displacement map:</h3>
  <canvas id="disp-canvas" width="300" height="200" style="border:1px solid #666"></canvas>

  <script type="module">
    import { generateDisplacementMap } from '../src/core/displacement/generator.ts';

    const result = generateDisplacementMap({
      width: 300,
      height: 200,
      profile: 'squircle',
      refractiveIndex: 1.5,
      thickness: 1.0,
      refractionLevel: 1.0,
      borderRadius: 24
    });

    // Show the displacement map
    const canvas = document.getElementById('disp-canvas');
    const ctx = canvas.getContext('2d');
    ctx.drawImage(result.canvas, 0, 0);

    // Set the displacement map on all filters
    document.querySelectorAll('.disp-image').forEach(feImage => {
      feImage.setAttribute('href', result.dataUrl);
    });

    console.log('Displacement map dataUrl length:', result.dataUrl.length);
    console.log('Max displacement:', result.maxDisplacement);
  </script>
</body>
</html>
