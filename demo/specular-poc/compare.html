<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Specular A/B Comparison</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      overflow: hidden;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 15px 20px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .method-select {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .method-select label {
      font-size: 12px;
      color: #888;
    }

    .method-select select {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    .vs {
      font-size: 18px;
      font-weight: bold;
      color: #666;
    }

    .comparison-container {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .background-layer {
      position: absolute;
      inset: 0;
      transition: background 0.5s;
    }

    .bg-gradient {
      background: linear-gradient(135deg,
        #ff6b6b 0%, #feca57 15%, #48dbfb 30%,
        #ff9ff3 45%, #54a0ff 60%, #5f27cd 75%,
        #00d2d3 90%, #ff6b6b 100%);
      background-size: 200% 200%;
      animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .bg-spotlight {
      background: radial-gradient(ellipse at 30% 30%, #fff 0%, #333 40%, #000 80%);
    }

    .bg-text {
      background: #1a1a1a;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      padding: 20px;
      font-size: 14px;
      line-height: 1.8;
      color: #666;
      overflow: hidden;
    }

    .split-view {
      position: absolute;
      inset: 0;
      display: flex;
    }

    .split-left, .split-right {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .divider {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 4px;
      background: rgba(255,255,255,0.3);
      cursor: ew-resize;
      z-index: 50;
      transform: translateX(-50%);
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
    }

    .divider::after {
      content: '< >';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 12px;
      color: #fff;
      white-space: nowrap;
    }

    .panel {
      width: 320px;
      height: 220px;
      border-radius: 28px;
      position: relative;
    }

    .panel-label {
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      white-space: nowrap;
      background: rgba(0,0,0,0.5);
      padding: 4px 12px;
      border-radius: 4px;
    }

    .controls-bottom {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      background: rgba(0,0,0,0.8);
      padding: 15px 25px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .control-group label {
      font-size: 11px;
      color: #888;
    }

    .control-group input[type="range"] {
      width: 100px;
    }

    .bg-buttons {
      display: flex;
      gap: 8px;
    }

    .bg-btn {
      width: 30px;
      height: 30px;
      border: 2px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .bg-btn.active {
      border-color: #fff;
    }

    .bg-btn.gradient {
      background: linear-gradient(135deg, #ff6b6b, #48dbfb);
    }

    .bg-btn.spotlight {
      background: radial-gradient(circle at 30% 30%, #fff, #000);
    }

    .bg-btn.text {
      background: #333;
      font-size: 8px;
      color: #666;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .svg-defs {
      position: absolute;
      width: 0;
      height: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="method-select">
      <label>Left:</label>
      <select id="method-left">
        <option value="static">Static (Current)</option>
        <option value="luma-extract">1: Luminance Extract</option>
        <option value="directional-blur">2: Directional Blur</option>
        <option value="fresnel-hybrid" selected>3: Fresnel Hybrid</option>
        <option value="multi-ibl">4: Multi-stage IBL</option>
        <option value="svg-specular">5: feSpecularLighting</option>
      </select>
    </div>
    <span class="vs">VS</span>
    <div class="method-select">
      <label>Right:</label>
      <select id="method-right">
        <option value="static" selected>Static (Current)</option>
        <option value="luma-extract">1: Luminance Extract</option>
        <option value="directional-blur">2: Directional Blur</option>
        <option value="fresnel-hybrid">3: Fresnel Hybrid</option>
        <option value="multi-ibl">4: Multi-stage IBL</option>
        <option value="svg-specular">5: feSpecularLighting</option>
      </select>
    </div>
  </div>

  <div class="comparison-container">
    <div class="background-layer bg-gradient" id="background"></div>
    <div class="split-view">
      <div class="split-left">
        <div class="panel" id="panel-left">
          <div class="panel-label" id="label-left">Fresnel Hybrid</div>
        </div>
      </div>
      <div class="divider" id="divider"></div>
      <div class="split-right">
        <div class="panel" id="panel-right">
          <div class="panel-label" id="label-right">Static</div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls-bottom">
    <div class="control-group">
      <label>Size</label>
      <input type="range" id="size" min="150" max="400" value="320">
    </div>
    <div class="control-group">
      <label>Radius</label>
      <input type="range" id="radius" min="0" max="100" value="28">
    </div>
    <div class="control-group">
      <label>Blur</label>
      <input type="range" id="blur" min="0" max="30" value="12">
    </div>
    <div class="control-group">
      <label>Intensity</label>
      <input type="range" id="intensity" min="0" max="100" value="70">
    </div>
    <div class="control-group">
      <label>Background</label>
      <div class="bg-buttons">
        <div class="bg-btn gradient active" data-bg="gradient"></div>
        <div class="bg-btn spotlight" data-bg="spotlight"></div>
        <div class="bg-btn text" data-bg="text">Aa</div>
      </div>
    </div>
  </div>

  <svg class="svg-defs" xmlns="http://www.w3.org/2000/svg">
    <defs id="filter-defs"></defs>
  </svg>

  <script type="module">
    // Filter creation functions (same as other files)
    function generateEdgeMask(width, height, radius) {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      const halfW = width / 2;
      const halfH = height / 2;
      const r = Math.min(radius, halfW, halfH);
      const innerW = halfW - r;
      const innerH = halfH - r;
      const ringWidth = Math.max(3, Math.min(width, height) * 0.015);

      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;

      for (let py = 0; py < height; py++) {
        for (let px = 0; px < width; px++) {
          const idx = (py * width + px) * 4;
          const dx = px - halfW;
          const dy = py - halfH;
          const absX = Math.abs(dx);
          const absY = Math.abs(dy);

          let inBounds = true;
          if (absX > innerW && absY > innerH) {
            const cornerX = absX - innerW;
            const cornerY = absY - innerH;
            if (cornerX * cornerX + cornerY * cornerY > r * r) {
              inBounds = false;
            }
          } else if (absX > halfW || absY > halfH) {
            inBounds = false;
          }

          if (!inBounds) {
            data[idx] = data[idx + 1] = data[idx + 2] = data[idx + 3] = 0;
            continue;
          }

          let edgeDist;
          if (absX <= innerW && absY <= innerH) {
            edgeDist = Math.min(halfW - absX, halfH - absY);
          } else if (absX <= innerW) {
            edgeDist = halfH - absY;
          } else if (absY <= innerH) {
            edgeDist = halfW - absX;
          } else {
            const cornerX = absX - innerW;
            const cornerY = absY - innerH;
            edgeDist = r - Math.sqrt(cornerX * cornerX + cornerY * cornerY);
          }

          const ringStart = 1;
          const ringEnd = ringStart + ringWidth;
          let alpha = 0;

          if (edgeDist >= ringStart && edgeDist <= ringEnd) {
            const ringPos = (edgeDist - ringStart) / ringWidth;
            alpha = Math.sin(ringPos * Math.PI);
          }

          data[idx] = data[idx + 1] = data[idx + 2] = 255;
          data[idx + 3] = Math.round(255 * alpha);
        }
      }

      ctx.putImageData(imageData, 0, 0);
      return canvas.toDataURL('image/png');
    }

    function generateFresnelMask(width, height, radius) {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      const halfW = width / 2;
      const halfH = height / 2;
      const r = Math.min(radius, halfW, halfH);
      const innerW = halfW - r;
      const innerH = halfH - r;

      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;

      for (let py = 0; py < height; py++) {
        for (let px = 0; px < width; px++) {
          const idx = (py * width + px) * 4;
          const dx = px - halfW;
          const dy = py - halfH;
          const absX = Math.abs(dx);
          const absY = Math.abs(dy);

          let inBounds = true;
          if (absX > innerW && absY > innerH) {
            const cornerX = absX - innerW;
            const cornerY = absY - innerH;
            if (cornerX * cornerX + cornerY * cornerY > r * r) {
              inBounds = false;
            }
          } else if (absX > halfW || absY > halfH) {
            inBounds = false;
          }

          if (!inBounds) {
            data[idx] = data[idx + 1] = data[idx + 2] = data[idx + 3] = 0;
            continue;
          }

          let edgeDist;
          if (absX <= innerW && absY <= innerH) {
            edgeDist = Math.min(halfW - absX, halfH - absY);
          } else if (absX <= innerW) {
            edgeDist = halfH - absY;
          } else if (absY <= innerH) {
            edgeDist = halfW - absX;
          } else {
            const cornerX = absX - innerW;
            const cornerY = absY - innerH;
            edgeDist = r - Math.sqrt(cornerX * cornerX + cornerY * cornerY);
          }

          const maxDist = Math.min(halfW, halfH);
          const normalizedDist = edgeDist / maxDist;
          const F0 = 0.04;
          const fresnel = F0 + (1 - F0) * Math.pow(1 - normalizedDist, 3);

          const brightness = Math.round(255 * fresnel);
          data[idx] = data[idx + 1] = data[idx + 2] = brightness;
          data[idx + 3] = Math.round(255 * fresnel);
        }
      }

      ctx.putImageData(imageData, 0, 0);
      return canvas.toDataURL('image/png');
    }

    function createFilter(methodId, filterId, params) {
      const { width, height, radius, blur, intensity } = params;
      const edgeMask = generateEdgeMask(width, height, radius);
      const fresnelMask = generateFresnelMask(width, height, radius);

      const filters = {
        'static': `
          <filter id="${filterId}" x="-10%" y="-10%" width="120%" height="120%"
                  filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
                  color-interpolation-filters="sRGB">
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>
            <feImage href="${edgeMask}" x="0" y="0" width="${width}" height="${height}" preserveAspectRatio="none" result="specMap"/>
            <feComponentTransfer in="specMap" result="specAdjusted">
              <feFuncA type="linear" slope="${intensity / 100}"/>
            </feComponentTransfer>
            <feBlend in="specAdjusted" in2="blurred" mode="screen"/>
          </filter>`,

        'luma-extract': `
          <filter id="${filterId}" x="-10%" y="-10%" width="120%" height="120%"
                  filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
                  color-interpolation-filters="sRGB">
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>
            <feColorMatrix in="SourceGraphic" type="matrix"
              values="0.299 0.587 0.114 0 0 0.299 0.587 0.114 0 0 0.299 0.587 0.114 0 0 0 0 0 1 0" result="luma"/>
            <feGaussianBlur in="luma" stdDeviation="${blur * 1.5}" result="lumaBlur"/>
            <feImage href="${edgeMask}" x="0" y="0" width="${width}" height="${height}" preserveAspectRatio="none" result="edgeMask"/>
            <feComposite in="lumaBlur" in2="edgeMask" operator="in" result="edgeLuma"/>
            <feComponentTransfer in="edgeLuma" result="specular">
              <feFuncR type="gamma" amplitude="${intensity / 50}" exponent="1.5" offset="0"/>
              <feFuncG type="gamma" amplitude="${intensity / 50}" exponent="1.5" offset="0"/>
              <feFuncB type="gamma" amplitude="${intensity / 50}" exponent="1.5" offset="0"/>
              <feFuncA type="linear" slope="${intensity / 100}"/>
            </feComponentTransfer>
            <feBlend in="specular" in2="blurred" mode="screen"/>
          </filter>`,

        'directional-blur': `
          <filter id="${filterId}" x="-20%" y="-20%" width="140%" height="140%"
                  filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
                  color-interpolation-filters="sRGB">
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 4}" result="envProbe"/>
            <feImage href="${edgeMask}" x="0" y="0" width="${width}" height="${height}" preserveAspectRatio="none" result="normalMap"/>
            <feDisplacementMap in="envProbe" in2="normalMap" scale="${intensity * 0.5}" xChannelSelector="R" yChannelSelector="G" result="reflected"/>
            <feComponentTransfer in="reflected" result="specular">
              <feFuncR type="linear" slope="1.5" intercept="-0.3"/>
              <feFuncG type="linear" slope="1.5" intercept="-0.3"/>
              <feFuncB type="linear" slope="1.5" intercept="-0.3"/>
              <feFuncA type="linear" slope="${intensity / 100}"/>
            </feComponentTransfer>
            <feBlend in="specular" in2="blurred" mode="screen"/>
          </filter>`,

        'fresnel-hybrid': `
          <filter id="${filterId}" x="-10%" y="-10%" width="120%" height="120%"
                  filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
                  color-interpolation-filters="sRGB">
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 2}" result="envBlur"/>
            <feColorMatrix in="envBlur" type="matrix"
              values="0.299 0.587 0.114 0 0 0.299 0.587 0.114 0 0 0.299 0.587 0.114 0 0 0 0 0 1 0" result="envLuma"/>
            <feImage href="${fresnelMask}" x="0" y="0" width="${width}" height="${height}" preserveAspectRatio="none" result="fresnel"/>
            <feBlend in="fresnel" in2="envLuma" mode="multiply" result="fresnelEnv"/>
            <feComponentTransfer in="fresnelEnv" result="specular">
              <feFuncR type="linear" slope="${intensity / 40}"/>
              <feFuncG type="linear" slope="${intensity / 40}"/>
              <feFuncB type="linear" slope="${intensity / 40}"/>
              <feFuncA type="linear" slope="${intensity / 100}"/>
            </feComponentTransfer>
            <feBlend in="specular" in2="blurred" mode="screen"/>
          </filter>`,

        'multi-ibl': `
          <filter id="${filterId}" x="-10%" y="-10%" width="120%" height="120%"
                  filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
                  color-interpolation-filters="sRGB">
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 0.5}" result="ibl0"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 2}" result="ibl1"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 5}" result="ibl2"/>
            <feImage href="${edgeMask}" x="0" y="0" width="${width}" height="${height}" preserveAspectRatio="none" result="roughMap"/>
            <feComposite in="ibl0" in2="roughMap" operator="in" result="sharp"/>
            <feComposite in="ibl1" in2="roughMap" operator="in" result="medium"/>
            <feComponentTransfer in="medium" result="mediumScaled">
              <feFuncA type="linear" slope="0.5"/>
            </feComponentTransfer>
            <feBlend in="sharp" in2="mediumScaled" mode="screen" result="combined"/>
            <feComponentTransfer in="combined" result="specular">
              <feFuncR type="linear" slope="${intensity / 50}"/>
              <feFuncG type="linear" slope="${intensity / 50}"/>
              <feFuncB type="linear" slope="${intensity / 50}"/>
            </feComponentTransfer>
            <feBlend in="specular" in2="blurred" mode="screen"/>
          </filter>`,

        'svg-specular': `
          <filter id="${filterId}" x="-10%" y="-10%" width="120%" height="120%"
                  filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
                  color-interpolation-filters="sRGB">
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>
            <feImage href="${edgeMask}" x="0" y="0" width="${width}" height="${height}" preserveAspectRatio="none" result="bumpMap"/>
            <feSpecularLighting in="bumpMap" surfaceScale="3" specularConstant="${intensity / 50}" specularExponent="20" lighting-color="white" result="specLight">
              <fePointLight x="${width * 0.7}" y="${-height * 0.3}" z="${Math.max(width, height) * 0.8}"/>
            </feSpecularLighting>
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 2}" result="bgBlur"/>
            <feColorMatrix in="bgBlur" type="luminanceToAlpha" result="bgLuma"/>
            <feComposite in="specLight" in2="bgLuma" operator="arithmetic" k1="0.5" k2="0.3" k3="0.2" k4="0" result="modSpec"/>
            <feBlend in="modSpec" in2="blurred" mode="screen"/>
          </filter>`
      };

      return filters[methodId];
    }

    const methodNames = {
      'static': 'Static (Current)',
      'luma-extract': 'Luminance Extract',
      'directional-blur': 'Directional Blur',
      'fresnel-hybrid': 'Fresnel Hybrid',
      'multi-ibl': 'Multi-stage IBL',
      'svg-specular': 'feSpecularLighting'
    };

    let params = {
      width: 320,
      height: 220,
      radius: 28,
      blur: 12,
      intensity: 70
    };

    function updateFilters() {
      const filterDefs = document.getElementById('filter-defs');
      const panelLeft = document.getElementById('panel-left');
      const panelRight = document.getElementById('panel-right');
      const labelLeft = document.getElementById('label-left');
      const labelRight = document.getElementById('label-right');

      const methodLeft = document.getElementById('method-left').value;
      const methodRight = document.getElementById('method-right').value;

      filterDefs.innerHTML =
        createFilter(methodLeft, 'filter-left', params) +
        createFilter(methodRight, 'filter-right', params);

      panelLeft.style.backdropFilter = 'url(#filter-left)';
      panelLeft.style.webkitBackdropFilter = 'url(#filter-left)';
      panelRight.style.backdropFilter = 'url(#filter-right)';
      panelRight.style.webkitBackdropFilter = 'url(#filter-right)';

      labelLeft.textContent = methodNames[methodLeft];
      labelRight.textContent = methodNames[methodRight];

      // Update panel sizes
      const size = document.getElementById('size').value;
      const aspectRatio = 320 / 220;
      const newWidth = parseInt(size);
      const newHeight = Math.round(newWidth / aspectRatio);

      params.width = newWidth;
      params.height = newHeight;

      panelLeft.style.width = `${newWidth}px`;
      panelLeft.style.height = `${newHeight}px`;
      panelRight.style.width = `${newWidth}px`;
      panelRight.style.height = `${newHeight}px`;

      const radius = document.getElementById('radius').value;
      params.radius = parseInt(radius);
      panelLeft.style.borderRadius = `${radius}px`;
      panelRight.style.borderRadius = `${radius}px`;
    }

    // Event listeners
    document.getElementById('method-left').addEventListener('change', updateFilters);
    document.getElementById('method-right').addEventListener('change', updateFilters);

    ['size', 'radius', 'blur', 'intensity'].forEach(id => {
      document.getElementById(id).addEventListener('input', e => {
        params[id === 'size' ? 'width' : id] = parseInt(e.target.value);
        updateFilters();
      });
    });

    document.querySelectorAll('.bg-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const bg = document.getElementById('background');
        bg.className = 'background-layer bg-' + btn.dataset.bg;

        if (btn.dataset.bg === 'text') {
          bg.innerHTML = Array(200).fill().map(() =>
            'Lorem ipsum dolor sit amet, consectetur adipiscing elit. '
          ).join('');
        } else {
          bg.innerHTML = '';
        }
      });
    });

    // Divider drag
    const divider = document.getElementById('divider');
    let isDragging = false;

    divider.addEventListener('mousedown', () => isDragging = true);
    document.addEventListener('mouseup', () => isDragging = false);
    document.addEventListener('mousemove', e => {
      if (!isDragging) return;

      const container = document.querySelector('.split-view');
      const rect = container.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const percent = Math.max(20, Math.min(80, (x / rect.width) * 100));

      document.querySelector('.split-left').style.flex = `0 0 ${percent}%`;
      document.querySelector('.split-right').style.flex = `0 0 ${100 - percent}%`;
      divider.style.left = `${percent}%`;
    });

    // Initial render
    updateFilters();
  </script>
</body>
</html>
