<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Specular PoC - Environment-Aware Methods Comparison</title>
  <style>
    :root {
      --panel-width: 280px;
      --panel-height: 200px;
      --border-radius: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-weight: 300;
      font-size: 24px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .control-group label {
      font-size: 12px;
      color: #aaa;
    }

    .control-group input[type="range"] {
      width: 150px;
    }

    .control-group .value {
      font-size: 11px;
      color: #666;
      text-align: right;
    }

    .background-select {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .background-select button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      font-size: 12px;
    }

    .background-select button.active {
      background: rgba(100,150,255,0.3);
    }

    .demo-container {
      position: relative;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px;
      border-radius: 20px;
      overflow: hidden;
    }

    /* Background patterns */
    .bg-gradient {
      background: linear-gradient(135deg,
        #ff6b6b 0%, #feca57 20%, #48dbfb 40%,
        #ff9ff3 60%, #54a0ff 80%, #5f27cd 100%);
    }

    .bg-spotlight {
      background: radial-gradient(ellipse at 30% 20%, #fff 0%, #333 30%, #000 70%);
    }

    .bg-stripes {
      background: repeating-linear-gradient(
        45deg,
        #fff 0px, #fff 20px,
        #000 20px, #000 40px
      );
    }

    .bg-photo {
      background: url('https://images.unsplash.com/photo-1557683316-973673baf926?w=1200') center/cover;
    }

    .bg-ui {
      background: linear-gradient(180deg, #2d3436 0%, #636e72 100%);
    }

    .panels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      position: relative;
      z-index: 1;
    }

    .panel-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .panel {
      width: var(--panel-width);
      height: var(--panel-height);
      border-radius: var(--border-radius);
      position: relative;
      overflow: hidden;
    }

    .panel-label {
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .panel-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      text-align: center;
      max-width: 280px;
    }

    /* Method badges */
    .method-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.6);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      color: #fff;
      z-index: 10;
    }

    /* SVG container */
    .svg-defs {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    /* Performance info */
    .perf-info {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      padding: 3px 6px;
      border-radius: 3px;
      font-size: 9px;
      color: #0f0;
      z-index: 10;
    }
  </style>
</head>
<body>
  <h1>Specular PoC: Environment-Aware Methods</h1>
  <p class="subtitle">Comparing 6 specular highlight approaches using backdrop-filter: url(#svg)</p>

  <div class="controls">
    <div class="control-group">
      <label>Width</label>
      <input type="range" id="width" min="100" max="400" value="280">
      <span class="value" id="width-val">280px</span>
    </div>
    <div class="control-group">
      <label>Height</label>
      <input type="range" id="height" min="80" max="300" value="200">
      <span class="value" id="height-val">200px</span>
    </div>
    <div class="control-group">
      <label>Border Radius</label>
      <input type="range" id="radius" min="0" max="100" value="24">
      <span class="value" id="radius-val">24px</span>
    </div>
    <div class="control-group">
      <label>Blur Amount</label>
      <input type="range" id="blur" min="0" max="30" value="10">
      <span class="value" id="blur-val">10px</span>
    </div>
    <div class="control-group">
      <label>Specular Intensity</label>
      <input type="range" id="intensity" min="0" max="100" value="60">
      <span class="value" id="intensity-val">60%</span>
    </div>
    <div class="control-group background-select">
      <label>Background:</label>
      <button class="active" data-bg="gradient">Gradient</button>
      <button data-bg="spotlight">Spotlight</button>
      <button data-bg="stripes">Stripes</button>
      <button data-bg="ui">UI Dark</button>
    </div>
  </div>

  <div class="demo-container bg-gradient" id="demo-container">
    <div class="panels-grid" id="panels-grid">
      <!-- Panels will be generated by JS -->
    </div>
  </div>

  <!-- SVG Filter Definitions -->
  <svg class="svg-defs" xmlns="http://www.w3.org/2000/svg">
    <defs id="filter-defs">
      <!-- Filters will be generated by JS -->
    </defs>
  </svg>

  <script type="module">
    // =========================================================
    // Specular Method Definitions
    // =========================================================

    const methods = [
      {
        id: 'static',
        name: 'Static (Current)',
        desc: 'Pre-computed specular map with fixed light direction',
        createFilter: createStaticFilter
      },
      {
        id: 'luma-extract',
        name: 'Method 1: Luminance Extract',
        desc: 'Extract background luminance, apply as specular via edge mask',
        createFilter: createLumaExtractFilter
      },
      {
        id: 'directional-blur',
        name: 'Method 2: Directional Blur',
        desc: 'Heavy blur + displacement offset for pseudo-reflection',
        createFilter: createDirectionalBlurFilter
      },
      {
        id: 'fresnel-hybrid',
        name: 'Method 3: Fresnel Hybrid',
        desc: 'Pre-computed Fresnel mask weighted by background luminance',
        createFilter: createFresnelHybridFilter
      },
      {
        id: 'multi-ibl',
        name: 'Method 4: Multi-stage IBL',
        desc: 'Multiple blur levels blended for roughness simulation',
        createFilter: createMultiIBLFilter
      },
      {
        id: 'svg-specular',
        name: 'Method 5: feSpecularLighting',
        desc: 'SVG native specular + luminance modulation',
        createFilter: createSVGSpecularFilter
      }
    ];

    // =========================================================
    // Filter Creation Functions
    // =========================================================

    function createStaticFilter(id, params) {
      const { width, height, radius, blur, intensity } = params;

      // Generate edge mask as data URL
      const edgeMask = generateEdgeMask(width, height, radius);

      return `
        <filter id="${id}" x="-10%" y="-10%" width="120%" height="120%"
                filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
                color-interpolation-filters="sRGB">

          <!-- Base blur -->
          <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>

          <!-- Static specular map (edge highlight) -->
          <feImage href="${edgeMask}" x="0" y="0" width="${width}" height="${height}"
                   preserveAspectRatio="none" result="specMap"/>

          <!-- Apply specular intensity -->
          <feComponentTransfer in="specMap" result="specAdjusted">
            <feFuncA type="linear" slope="${intensity / 100}"/>
          </feComponentTransfer>

          <!-- Blend specular over blurred background -->
          <feBlend in="specAdjusted" in2="blurred" mode="screen"/>
        </filter>
      `;
    }

    function createLumaExtractFilter(id, params) {
      const { width, height, radius, blur, intensity } = params;
      const edgeMask = generateEdgeMask(width, height, radius);

      return `
        <filter id="${id}" x="-10%" y="-10%" width="120%" height="120%"
                filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
                color-interpolation-filters="sRGB">

          <!-- Base blur -->
          <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>

          <!-- Extract luminance from background -->
          <feColorMatrix in="SourceGraphic" type="matrix"
            values="0.299 0.587 0.114 0 0
                    0.299 0.587 0.114 0 0
                    0.299 0.587 0.114 0 0
                    0     0     0     1 0"
            result="luma"/>

          <!-- Blur luminance for soft reflection -->
          <feGaussianBlur in="luma" stdDeviation="${blur * 1.5}" result="lumaBlur"/>

          <!-- Load edge mask -->
          <feImage href="${edgeMask}" x="0" y="0" width="${width}" height="${height}"
                   preserveAspectRatio="none" result="edgeMask"/>

          <!-- Mask luminance with edge -->
          <feComposite in="lumaBlur" in2="edgeMask" operator="in" result="edgeLuma"/>

          <!-- Intensity adjustment with gamma for Fresnel-like falloff -->
          <feComponentTransfer in="edgeLuma" result="specular">
            <feFuncR type="gamma" amplitude="${intensity / 50}" exponent="1.5" offset="0"/>
            <feFuncG type="gamma" amplitude="${intensity / 50}" exponent="1.5" offset="0"/>
            <feFuncB type="gamma" amplitude="${intensity / 50}" exponent="1.5" offset="0"/>
            <feFuncA type="linear" slope="${intensity / 100}"/>
          </feComponentTransfer>

          <!-- Final blend -->
          <feBlend in="specular" in2="blurred" mode="screen"/>
        </filter>
      `;
    }

    function createDirectionalBlurFilter(id, params) {
      const { width, height, radius, blur, intensity } = params;
      const normalMap = generateNormalMap(width, height, radius);

      return `
        <filter id="${id}" x="-20%" y="-20%" width="140%" height="140%"
                filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
                color-interpolation-filters="sRGB">

          <!-- Base blur -->
          <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>

          <!-- Heavy blur for environment probe -->
          <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 4}" result="envProbe"/>

          <!-- Load normal/direction map -->
          <feImage href="${normalMap}" x="0" y="0" width="${width}" height="${height}"
                   preserveAspectRatio="none" result="normalMap"/>

          <!-- Displace environment probe by normal direction -->
          <feDisplacementMap in="envProbe" in2="normalMap"
                             scale="${intensity * 0.5}"
                             xChannelSelector="R" yChannelSelector="G"
                             result="reflected"/>

          <!-- Extract bright areas as specular -->
          <feComponentTransfer in="reflected" result="specular">
            <feFuncR type="linear" slope="1.5" intercept="-0.3"/>
            <feFuncG type="linear" slope="1.5" intercept="-0.3"/>
            <feFuncB type="linear" slope="1.5" intercept="-0.3"/>
            <feFuncA type="linear" slope="${intensity / 100}"/>
          </feComponentTransfer>

          <!-- Blend with screen mode -->
          <feBlend in="specular" in2="blurred" mode="screen"/>
        </filter>
      `;
    }

    function createFresnelHybridFilter(id, params) {
      const { width, height, radius, blur, intensity } = params;
      const fresnelMask = generateFresnelMask(width, height, radius);

      return `
        <filter id="${id}" x="-10%" y="-10%" width="120%" height="120%"
                filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
                color-interpolation-filters="sRGB">

          <!-- Base blur -->
          <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>

          <!-- Extract and blur background luminance -->
          <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 2}" result="envBlur"/>
          <feColorMatrix in="envBlur" type="matrix"
            values="0.299 0.587 0.114 0 0
                    0.299 0.587 0.114 0 0
                    0.299 0.587 0.114 0 0
                    0     0     0     1 0"
            result="envLuma"/>

          <!-- Load pre-computed Fresnel mask -->
          <feImage href="${fresnelMask}" x="0" y="0" width="${width}" height="${height}"
                   preserveAspectRatio="none" result="fresnel"/>

          <!-- Multiply Fresnel with environment luminance -->
          <feBlend in="fresnel" in2="envLuma" mode="multiply" result="fresnelEnv"/>

          <!-- Boost intensity -->
          <feComponentTransfer in="fresnelEnv" result="specular">
            <feFuncR type="linear" slope="${intensity / 40}"/>
            <feFuncG type="linear" slope="${intensity / 40}"/>
            <feFuncB type="linear" slope="${intensity / 40}"/>
            <feFuncA type="linear" slope="${intensity / 100}"/>
          </feComponentTransfer>

          <!-- Final blend -->
          <feBlend in="specular" in2="blurred" mode="screen"/>
        </filter>
      `;
    }

    function createMultiIBLFilter(id, params) {
      const { width, height, radius, blur, intensity } = params;
      const roughnessMap = generateRoughnessMap(width, height, radius);

      return `
        <filter id="${id}" x="-10%" y="-10%" width="120%" height="120%"
                filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
                color-interpolation-filters="sRGB">

          <!-- Base blur -->
          <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>

          <!-- Multi-level IBL blur pyramid -->
          <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 0.5}" result="ibl0"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 2}" result="ibl1"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 5}" result="ibl2"/>

          <!-- Load roughness/edge map -->
          <feImage href="${roughnessMap}" x="0" y="0" width="${width}" height="${height}"
                   preserveAspectRatio="none" result="roughMap"/>

          <!-- Blend IBL levels based on roughness -->
          <!-- Sharp reflection at edges (low roughness) -->
          <feComposite in="ibl0" in2="roughMap" operator="in" result="sharp"/>

          <!-- Medium reflection -->
          <feComposite in="ibl1" in2="roughMap" operator="in" result="medium"/>
          <feComponentTransfer in="medium" result="mediumScaled">
            <feFuncA type="linear" slope="0.5"/>
          </feComponentTransfer>

          <!-- Combine levels -->
          <feBlend in="sharp" in2="mediumScaled" mode="screen" result="combined"/>

          <!-- Apply intensity -->
          <feComponentTransfer in="combined" result="specular">
            <feFuncR type="linear" slope="${intensity / 50}"/>
            <feFuncG type="linear" slope="${intensity / 50}"/>
            <feFuncB type="linear" slope="${intensity / 50}"/>
          </feComponentTransfer>

          <!-- Final blend -->
          <feBlend in="specular" in2="blurred" mode="screen"/>
        </filter>
      `;
    }

    function createSVGSpecularFilter(id, params) {
      const { width, height, radius, blur, intensity } = params;
      const bumpMap = generateBumpMap(width, height, radius);

      return `
        <filter id="${id}" x="-10%" y="-10%" width="120%" height="120%"
                filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse"
                color-interpolation-filters="sRGB">

          <!-- Base blur -->
          <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>

          <!-- Load bump/height map for lighting calculation -->
          <feImage href="${bumpMap}" x="0" y="0" width="${width}" height="${height}"
                   preserveAspectRatio="none" result="bumpMap"/>

          <!-- SVG native specular lighting -->
          <feSpecularLighting in="bumpMap"
                              surfaceScale="3"
                              specularConstant="${intensity / 50}"
                              specularExponent="20"
                              lighting-color="white"
                              result="specLight">
            <fePointLight x="${width * 0.7}" y="${-height * 0.3}" z="${Math.max(width, height) * 0.8}"/>
          </feSpecularLighting>

          <!-- Extract background luminance for modulation -->
          <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 2}" result="bgBlur"/>
          <feColorMatrix in="bgBlur" type="luminanceToAlpha" result="bgLuma"/>

          <!-- Modulate specular by background luminance -->
          <feComposite in="specLight" in2="bgLuma" operator="arithmetic"
                       k1="0.5" k2="0.3" k3="0.2" k4="0"
                       result="modSpec"/>

          <!-- Final blend -->
          <feBlend in="modSpec" in2="blurred" mode="screen"/>
        </filter>
      `;
    }

    // =========================================================
    // Mask/Map Generation Functions
    // =========================================================

    function generateEdgeMask(width, height, radius) {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      const halfW = width / 2;
      const halfH = height / 2;
      const r = Math.min(radius, halfW, halfH);
      const innerW = halfW - r;
      const innerH = halfH - r;
      const ringWidth = Math.max(3, Math.min(width, height) * 0.015);

      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;

      for (let py = 0; py < height; py++) {
        for (let px = 0; px < width; px++) {
          const idx = (py * width + px) * 4;
          const dx = px - halfW;
          const dy = py - halfH;
          const absX = Math.abs(dx);
          const absY = Math.abs(dy);

          // Check bounds with border radius
          let inBounds = true;
          if (absX > innerW && absY > innerH) {
            const cornerX = absX - innerW;
            const cornerY = absY - innerH;
            if (cornerX * cornerX + cornerY * cornerY > r * r) {
              inBounds = false;
            }
          } else if (absX > halfW || absY > halfH) {
            inBounds = false;
          }

          if (!inBounds) {
            data[idx] = data[idx + 1] = data[idx + 2] = data[idx + 3] = 0;
            continue;
          }

          // Calculate edge distance
          let edgeDist;
          if (absX <= innerW && absY <= innerH) {
            edgeDist = Math.min(halfW - absX, halfH - absY);
          } else if (absX <= innerW) {
            edgeDist = halfH - absY;
          } else if (absY <= innerH) {
            edgeDist = halfW - absX;
          } else {
            const cornerX = absX - innerW;
            const cornerY = absY - innerH;
            edgeDist = r - Math.sqrt(cornerX * cornerX + cornerY * cornerY);
          }

          // Ring pattern at edge
          const ringStart = 1;
          const ringEnd = ringStart + ringWidth;
          let alpha = 0;

          if (edgeDist >= ringStart && edgeDist <= ringEnd) {
            const ringPos = (edgeDist - ringStart) / ringWidth;
            alpha = Math.sin(ringPos * Math.PI);
          }

          const brightness = Math.round(255 * alpha);
          data[idx] = data[idx + 1] = data[idx + 2] = 255;
          data[idx + 3] = brightness;
        }
      }

      ctx.putImageData(imageData, 0, 0);
      return canvas.toDataURL('image/png');
    }

    function generateNormalMap(width, height, radius) {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      const halfW = width / 2;
      const halfH = height / 2;
      const r = Math.min(radius, halfW, halfH);
      const innerW = halfW - r;
      const innerH = halfH - r;

      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;

      for (let py = 0; py < height; py++) {
        for (let px = 0; px < width; px++) {
          const idx = (py * width + px) * 4;
          const dx = px - halfW;
          const dy = py - halfH;
          const absX = Math.abs(dx);
          const absY = Math.abs(dy);

          let inBounds = true;
          if (absX > innerW && absY > innerH) {
            const cornerX = absX - innerW;
            const cornerY = absY - innerH;
            if (cornerX * cornerX + cornerY * cornerY > r * r) {
              inBounds = false;
            }
          } else if (absX > halfW || absY > halfH) {
            inBounds = false;
          }

          if (!inBounds) {
            data[idx] = data[idx + 1] = 128;
            data[idx + 2] = 255;
            data[idx + 3] = 0;
            continue;
          }

          // Calculate normal direction (pointing outward from edge)
          let normalX = 0, normalY = 0;
          let edgeDist;

          if (absX <= innerW && absY <= innerH) {
            const distToX = halfW - absX;
            const distToY = halfH - absY;
            edgeDist = Math.min(distToX, distToY);
            if (distToX < distToY) {
              normalX = dx > 0 ? 1 : -1;
            } else {
              normalY = dy > 0 ? 1 : -1;
            }
          } else if (absX <= innerW) {
            edgeDist = halfH - absY;
            normalY = dy > 0 ? 1 : -1;
          } else if (absY <= innerH) {
            edgeDist = halfW - absX;
            normalX = dx > 0 ? 1 : -1;
          } else {
            const cornerX = absX - innerW;
            const cornerY = absY - innerH;
            const cornerDist = Math.sqrt(cornerX * cornerX + cornerY * cornerY);
            edgeDist = r - cornerDist;
            if (cornerDist > 0.001) {
              normalX = (cornerX / cornerDist) * (dx > 0 ? 1 : -1);
              normalY = (cornerY / cornerDist) * (dy > 0 ? 1 : -1);
            }
          }

          // Fade normal strength based on distance from edge
          const maxDist = Math.min(halfW, halfH) * 0.3;
          const edgeFade = Math.max(0, 1 - edgeDist / maxDist);

          // Encode normal as RGB (128 = 0, 0 = -1, 255 = +1)
          data[idx] = Math.round(128 + normalX * edgeFade * 127);
          data[idx + 1] = Math.round(128 + normalY * edgeFade * 127);
          data[idx + 2] = 128;
          data[idx + 3] = Math.round(255 * edgeFade);
        }
      }

      ctx.putImageData(imageData, 0, 0);
      return canvas.toDataURL('image/png');
    }

    function generateFresnelMask(width, height, radius) {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      const halfW = width / 2;
      const halfH = height / 2;
      const r = Math.min(radius, halfW, halfH);
      const innerW = halfW - r;
      const innerH = halfH - r;

      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;

      for (let py = 0; py < height; py++) {
        for (let px = 0; px < width; px++) {
          const idx = (py * width + px) * 4;
          const dx = px - halfW;
          const dy = py - halfH;
          const absX = Math.abs(dx);
          const absY = Math.abs(dy);

          let inBounds = true;
          if (absX > innerW && absY > innerH) {
            const cornerX = absX - innerW;
            const cornerY = absY - innerH;
            if (cornerX * cornerX + cornerY * cornerY > r * r) {
              inBounds = false;
            }
          } else if (absX > halfW || absY > halfH) {
            inBounds = false;
          }

          if (!inBounds) {
            data[idx] = data[idx + 1] = data[idx + 2] = data[idx + 3] = 0;
            continue;
          }

          // Calculate edge distance for Fresnel
          let edgeDist;
          if (absX <= innerW && absY <= innerH) {
            edgeDist = Math.min(halfW - absX, halfH - absY);
          } else if (absX <= innerW) {
            edgeDist = halfH - absY;
          } else if (absY <= innerH) {
            edgeDist = halfW - absX;
          } else {
            const cornerX = absX - innerW;
            const cornerY = absY - innerH;
            edgeDist = r - Math.sqrt(cornerX * cornerX + cornerY * cornerY);
          }

          // Fresnel approximation: stronger at edges (grazing angles)
          const maxDist = Math.min(halfW, halfH);
          const normalizedDist = edgeDist / maxDist;

          // Schlick-like approximation: F = F0 + (1-F0)(1-cos)^5
          // Here cos ~ normalizedDist (distance from edge ~ viewing angle)
          const F0 = 0.04; // Glass base reflectance
          const fresnel = F0 + (1 - F0) * Math.pow(1 - normalizedDist, 3);

          const brightness = Math.round(255 * fresnel);
          data[idx] = data[idx + 1] = data[idx + 2] = brightness;
          data[idx + 3] = Math.round(255 * fresnel);
        }
      }

      ctx.putImageData(imageData, 0, 0);
      return canvas.toDataURL('image/png');
    }

    function generateRoughnessMap(width, height, radius) {
      // For IBL: edge = smooth (low roughness), center = rough
      // This is inverse of edge mask with smooth gradient
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      const halfW = width / 2;
      const halfH = height / 2;
      const r = Math.min(radius, halfW, halfH);
      const innerW = halfW - r;
      const innerH = halfH - r;

      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;

      for (let py = 0; py < height; py++) {
        for (let px = 0; px < width; px++) {
          const idx = (py * width + px) * 4;
          const dx = px - halfW;
          const dy = py - halfH;
          const absX = Math.abs(dx);
          const absY = Math.abs(dy);

          let inBounds = true;
          if (absX > innerW && absY > innerH) {
            const cornerX = absX - innerW;
            const cornerY = absY - innerH;
            if (cornerX * cornerX + cornerY * cornerY > r * r) {
              inBounds = false;
            }
          } else if (absX > halfW || absY > halfH) {
            inBounds = false;
          }

          if (!inBounds) {
            data[idx] = data[idx + 1] = data[idx + 2] = data[idx + 3] = 0;
            continue;
          }

          // Edge distance
          let edgeDist;
          if (absX <= innerW && absY <= innerH) {
            edgeDist = Math.min(halfW - absX, halfH - absY);
          } else if (absX <= innerW) {
            edgeDist = halfH - absY;
          } else if (absY <= innerH) {
            edgeDist = halfW - absX;
          } else {
            const cornerX = absX - innerW;
            const cornerY = absY - innerH;
            edgeDist = r - Math.sqrt(cornerX * cornerX + cornerY * cornerY);
          }

          // Smooth edge falloff for IBL weighting
          const maxDist = Math.min(halfW, halfH) * 0.4;
          const edgeFactor = Math.max(0, 1 - edgeDist / maxDist);
          const smoothFactor = edgeFactor * edgeFactor * (3 - 2 * edgeFactor); // smoothstep

          const brightness = Math.round(255 * smoothFactor);
          data[idx] = data[idx + 1] = data[idx + 2] = brightness;
          data[idx + 3] = brightness;
        }
      }

      ctx.putImageData(imageData, 0, 0);
      return canvas.toDataURL('image/png');
    }

    function generateBumpMap(width, height, radius) {
      // Height map for feSpecularLighting: dome shape
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      const halfW = width / 2;
      const halfH = height / 2;
      const r = Math.min(radius, halfW, halfH);
      const innerW = halfW - r;
      const innerH = halfH - r;

      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;

      for (let py = 0; py < height; py++) {
        for (let px = 0; px < width; px++) {
          const idx = (py * width + px) * 4;
          const dx = px - halfW;
          const dy = py - halfH;
          const absX = Math.abs(dx);
          const absY = Math.abs(dy);

          let inBounds = true;
          if (absX > innerW && absY > innerH) {
            const cornerX = absX - innerW;
            const cornerY = absY - innerH;
            if (cornerX * cornerX + cornerY * cornerY > r * r) {
              inBounds = false;
            }
          } else if (absX > halfW || absY > halfH) {
            inBounds = false;
          }

          if (!inBounds) {
            data[idx] = data[idx + 1] = data[idx + 2] = 0;
            data[idx + 3] = 0;
            continue;
          }

          // Calculate normalized edge distance [0, 1]
          let edgeDist;
          if (absX <= innerW && absY <= innerH) {
            edgeDist = Math.min(halfW - absX, halfH - absY);
          } else if (absX <= innerW) {
            edgeDist = halfH - absY;
          } else if (absY <= innerH) {
            edgeDist = halfW - absX;
          } else {
            const cornerX = absX - innerW;
            const cornerY = absY - innerH;
            edgeDist = r - Math.sqrt(cornerX * cornerX + cornerY * cornerY);
          }

          const maxDist = Math.min(halfW, halfH);
          const t = Math.min(1, edgeDist / maxDist);

          // Dome profile: height = sqrt(1 - (1-t)^2) for spherical
          // or simpler parabolic: height = t * (2 - t)
          const height_val = t * (2 - t);

          const brightness = Math.round(255 * height_val);
          data[idx] = data[idx + 1] = data[idx + 2] = brightness;
          data[idx + 3] = 255;
        }
      }

      ctx.putImageData(imageData, 0, 0);
      return canvas.toDataURL('image/png');
    }

    // =========================================================
    // UI and Rendering
    // =========================================================

    let currentParams = {
      width: 280,
      height: 200,
      radius: 24,
      blur: 10,
      intensity: 60
    };

    function updateFilters() {
      const filterDefs = document.getElementById('filter-defs');
      filterDefs.innerHTML = '';

      methods.forEach(method => {
        const filterHTML = method.createFilter(`filter-${method.id}`, currentParams);
        filterDefs.insertAdjacentHTML('beforeend', filterHTML);
      });
    }

    function updatePanels() {
      const grid = document.getElementById('panels-grid');
      grid.innerHTML = '';

      const { width, height, radius } = currentParams;

      document.documentElement.style.setProperty('--panel-width', `${width}px`);
      document.documentElement.style.setProperty('--panel-height', `${height}px`);
      document.documentElement.style.setProperty('--border-radius', `${radius}px`);

      methods.forEach(method => {
        const wrapper = document.createElement('div');
        wrapper.className = 'panel-wrapper';

        const panel = document.createElement('div');
        panel.className = 'panel';
        panel.style.backdropFilter = `url(#filter-${method.id})`;
        panel.style.webkitBackdropFilter = `url(#filter-${method.id})`;

        const badge = document.createElement('div');
        badge.className = 'method-badge';
        badge.textContent = method.id;
        panel.appendChild(badge);

        const label = document.createElement('div');
        label.className = 'panel-label';
        label.textContent = method.name;

        const desc = document.createElement('div');
        desc.className = 'panel-desc';
        desc.textContent = method.desc;

        wrapper.appendChild(panel);
        wrapper.appendChild(label);
        wrapper.appendChild(desc);
        grid.appendChild(wrapper);
      });
    }

    function init() {
      // Bind controls
      const controls = ['width', 'height', 'radius', 'blur', 'intensity'];
      controls.forEach(name => {
        const input = document.getElementById(name);
        const valueEl = document.getElementById(`${name}-val`);

        input.addEventListener('input', () => {
          const val = parseInt(input.value);
          currentParams[name] = val;
          valueEl.textContent = name === 'intensity' ? `${val}%` : `${val}px`;
          updateFilters();
          updatePanels();
        });
      });

      // Background selection
      document.querySelectorAll('.background-select button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.background-select button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          const container = document.getElementById('demo-container');
          container.className = 'demo-container bg-' + btn.dataset.bg;
        });
      });

      // Initial render
      updateFilters();
      updatePanels();
    }

    init();
  </script>
</body>
</html>
