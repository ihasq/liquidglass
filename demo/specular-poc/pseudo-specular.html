<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dual Rim Specular Methods</title>
  <style>
    :root {
      --panel-width: 240px;
      --panel-height: 160px;
      --border-radius: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-weight: 300;
      font-size: 24px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 24px;
      font-size: 13px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      background: rgba(255,255,255,0.05);
      padding: 16px;
      border-radius: 12px;
      max-width: 1100px;
      margin-left: auto;
      margin-right: auto;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .control-group label {
      font-size: 11px;
      color: #aaa;
    }

    .control-group input[type="range"] {
      width: 100px;
    }

    .control-group .value {
      font-size: 10px;
      color: #666;
      text-align: right;
    }

    .background-select {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .background-select button {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      font-size: 11px;
    }

    .background-select button.active {
      background: rgba(100,150,255,0.3);
    }

    .demo-container {
      position: relative;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px;
      border-radius: 16px;
      overflow: hidden;
    }

    .bg-gradient {
      background: linear-gradient(135deg,
        #667eea 0%, #764ba2 25%, #f093fb 50%,
        #f5576c 75%, #4facfe 100%);
    }

    .bg-dark {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    .bg-light {
      background: linear-gradient(180deg, #f8f9fa 0%, #e9ecef 50%, #dee2e6 100%);
    }

    .panels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .panel-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .panel {
      width: var(--panel-width);
      height: var(--panel-height);
      border-radius: var(--border-radius);
      position: relative;
    }

    .panel-label {
      font-size: 12px;
      font-weight: 500;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .panel-desc {
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      max-width: 260px;
      line-height: 1.4;
    }

    .method-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      background: rgba(0,0,0,0.6);
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 9px;
      color: #fff;
      z-index: 10;
    }

    .method-badge.recommended {
      background: rgba(59, 130, 246, 0.8);
    }

    .svg-defs {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    .section-title {
      text-align: center;
      font-size: 14px;
      color: #667eea;
      margin: 30px 0 15px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      margin: 20px 0;
    }

    .angle-display {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      color: #888;
    }

    .angle-preview {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      position: relative;
    }

    .angle-arrow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 16px;
      height: 2px;
      background: #667eea;
      transform-origin: left center;
    }

    .angle-arrow.secondary {
      background: #f59e0b;
    }
  </style>
</head>
<body>
  <h1>Dual Rim Specular</h1>
  <p class="subtitle">Two-light rim specular for natural glass highlight appearance</p>

  <div class="controls">
    <div class="control-group">
      <label>Width</label>
      <input type="range" id="width" min="120" max="360" value="240">
      <span class="value" id="width-val">240px</span>
    </div>
    <div class="control-group">
      <label>Height</label>
      <input type="range" id="height" min="80" max="240" value="160">
      <span class="value" id="height-val">160px</span>
    </div>
    <div class="control-group">
      <label>Border Radius</label>
      <input type="range" id="radius" min="0" max="80" value="20">
      <span class="value" id="radius-val">20px</span>
    </div>
    <div class="control-group">
      <label>Blur</label>
      <input type="range" id="blur" min="0" max="25" value="10">
      <span class="value" id="blur-val">10px</span>
    </div>
    <div class="control-group">
      <label>Intensity</label>
      <input type="range" id="intensity" min="0" max="100" value="50">
      <span class="value" id="intensity-val">50%</span>
    </div>
    <div class="control-group">
      <label>Light 1 (Primary)</label>
      <input type="range" id="lightAngle1" min="0" max="360" value="315">
      <span class="value" id="lightAngle1-val">315deg (2 o'clock)</span>
    </div>
    <div class="control-group">
      <label>Light 2 (Secondary)</label>
      <input type="range" id="lightAngle2" min="0" max="360" value="135">
      <span class="value" id="lightAngle2-val">135deg (8 o'clock)</span>
    </div>
    <div class="control-group">
      <label>Light 2 Strength</label>
      <input type="range" id="light2Strength" min="0" max="100" value="60">
      <span class="value" id="light2Strength-val">60%</span>
    </div>
    <div class="control-group background-select">
      <label>BG:</label>
      <button class="active" data-bg="gradient">Gradient</button>
      <button data-bg="dark">Dark</button>
      <button data-bg="light">Light</button>
    </div>
  </div>

  <div class="demo-container bg-gradient" id="demo-container">
    <div class="section-title">Dual Rim Methods</div>
    <div class="panels-grid" id="dual-light-methods"></div>
  </div>

  <svg class="svg-defs" xmlns="http://www.w3.org/2000/svg">
    <defs id="filter-defs"></defs>
  </svg>

  <script type="module">
    // =========================================================
    // Method Definitions
    // =========================================================

    const dualLightMethods = [
      {
        id: 'dual-rim',
        name: 'Dual Rim (Equal)',
        desc: 'Both lights at 100%. Symmetric highlight.',
        category: 'dual',
        recommended: true
      },
      {
        id: 'dual-rim-weighted',
        name: 'Dual Rim (Weighted)',
        desc: 'Secondary light adjustable. Asymmetric highlight.',
        category: 'dual',
        recommended: true
      }
    ];

    const allMethods = dualLightMethods;

    // =========================================================
    // Specular Map Generators
    // =========================================================

    function getEdgeInfo(px, py, halfW, halfH, innerW, innerH, r) {
      const dx = px - halfW;
      const dy = py - halfH;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);

      let inBounds = true;
      let edgeDist = 0;
      let normalX = 0, normalY = 0;

      if (absX > innerW && absY > innerH) {
        const cornerX = absX - innerW;
        const cornerY = absY - innerH;
        const cornerDist = Math.sqrt(cornerX * cornerX + cornerY * cornerY);
        if (cornerDist > r) {
          inBounds = false;
        } else {
          edgeDist = r - cornerDist;
          if (cornerDist > 0.001) {
            normalX = (cornerX / cornerDist) * (dx > 0 ? 1 : -1);
            normalY = (cornerY / cornerDist) * (dy > 0 ? 1 : -1);
          }
        }
      } else if (absX > halfW || absY > halfH) {
        inBounds = false;
      } else if (absX <= innerW && absY <= innerH) {
        const distToX = halfW - absX;
        const distToY = halfH - absY;
        edgeDist = Math.min(distToX, distToY);
        if (distToX < distToY) {
          normalX = dx > 0 ? 1 : -1;
        } else {
          normalY = dy > 0 ? 1 : -1;
        }
      } else if (absX <= innerW) {
        edgeDist = halfH - absY;
        normalY = dy > 0 ? 1 : -1;
      } else {
        edgeDist = halfW - absX;
        normalX = dx > 0 ? 1 : -1;
      }

      return { inBounds, edgeDist, normalX, normalY };
    }

    function generateDualRim(width, height, radius, intensity, lightAngle1, lightAngle2, light2Strength = 1.0) {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      const halfW = width / 2, halfH = height / 2;
      const r = Math.min(radius, halfW, halfH);
      const innerW = halfW - r, innerH = halfH - r;
      const ringWidth = Math.max(3, Math.min(width, height) * 0.02);

      // Two light directions
      const light1Rad = (lightAngle1 * Math.PI) / 180;
      const light1X = Math.cos(light1Rad);
      const light1Y = Math.sin(light1Rad);

      const light2Rad = (lightAngle2 * Math.PI) / 180;
      const light2X = Math.cos(light2Rad);
      const light2Y = Math.sin(light2Rad);

      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;

      for (let py = 0; py < height; py++) {
        for (let px = 0; px < width; px++) {
          const idx = (py * width + px) * 4;
          const { inBounds, edgeDist, normalX, normalY } = getEdgeInfo(px, py, halfW, halfH, innerW, innerH, r);

          if (!inBounds) {
            data[idx] = data[idx + 1] = data[idx + 2] = data[idx + 3] = 0;
            continue;
          }

          // Dot products with both light directions
          const dot1 = normalX * light1X + normalY * light1Y;
          const dot2 = normalX * light2X + normalY * light2Y;

          const lightFacing1 = Math.max(0, dot1);
          const lightFacing2 = Math.max(0, dot2) * light2Strength;

          // Combine both lights (additive, clamped)
          const combinedLight = Math.min(1, lightFacing1 + lightFacing2);

          let alpha = 0;
          if (edgeDist >= 0 && edgeDist <= ringWidth) {
            const ringPos = edgeDist / ringWidth;
            // Peak at edge, fade inward
            alpha = (1 - ringPos) * combinedLight * intensity;
          }

          data[idx] = data[idx + 1] = data[idx + 2] = 255;
          data[idx + 3] = Math.round(255 * Math.min(1, alpha));
        }
      }

      ctx.putImageData(imageData, 0, 0);
      return canvas.toDataURL('image/png');
    }

    // =========================================================
    // Filter Creation
    // =========================================================

    function createFilter(methodId, filterId, params) {
      const { width, height, radius, blur, intensity, lightAngle1, lightAngle2, light2Strength } = params;
      const intensityNorm = intensity / 100;

      let specMap;

      const weight = methodId === 'dual-rim' ? 1.0 : light2Strength / 100;
      specMap = generateDualRim(width, height, radius, intensityNorm, lightAngle1, lightAngle2, weight);

      return `
        <filter id="${filterId}" x="-10%" y="-10%" width="120%" height="120%"
                filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse">
          <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>
          <feImage href="${specMap}" x="0" y="0" width="${width}" height="${height}" preserveAspectRatio="none" result="spec"/>
          <feBlend in="spec" in2="blurred" mode="screen"/>
        </filter>
      `;
    }

    // =========================================================
    // UI
    // =========================================================

    let currentParams = {
      width: 240,
      height: 160,
      radius: 20,
      blur: 10,
      intensity: 50,
      lightAngle1: 315,  // 2 o'clock
      lightAngle2: 135,  // 8 o'clock
      light2Strength: 60
    };

    function angleToClockPosition(angle) {
      // 315 = 2 o'clock, 45 = 4 o'clock, etc.
      const hour = ((90 - angle) / 30 + 12) % 12;
      const roundedHour = Math.round(hour) || 12;
      return `${roundedHour} o'clock`;
    }

    function updateAll() {
      const filterDefs = document.getElementById('filter-defs');
      filterDefs.innerHTML = '';

      allMethods.forEach(method => {
        const filterHTML = createFilter(method.id, `filter-${method.id}`, currentParams);
        filterDefs.insertAdjacentHTML('beforeend', filterHTML);
      });

      const { width, height, radius } = currentParams;
      document.documentElement.style.setProperty('--panel-width', `${width}px`);
      document.documentElement.style.setProperty('--panel-height', `${height}px`);
      document.documentElement.style.setProperty('--border-radius', `${radius}px`);

      const container = document.getElementById('dual-light-methods');
      container.innerHTML = '';

      allMethods.forEach(method => {
        const wrapper = document.createElement('div');
        wrapper.className = 'panel-wrapper';

        const panel = document.createElement('div');
        panel.className = 'panel';
        panel.style.backdropFilter = `url(#filter-${method.id})`;
        panel.style.webkitBackdropFilter = `url(#filter-${method.id})`;

        const badge = document.createElement('div');
        badge.className = 'method-badge' + (method.recommended ? ' recommended' : '');
        badge.textContent = method.id;
        panel.appendChild(badge);

        const label = document.createElement('div');
        label.className = 'panel-label';
        label.textContent = method.name;

        const desc = document.createElement('div');
        desc.className = 'panel-desc';
        desc.textContent = method.desc;

        wrapper.appendChild(panel);
        wrapper.appendChild(label);
        wrapper.appendChild(desc);

        container.appendChild(wrapper);
      });
    }

    function init() {
      const controls = ['width', 'height', 'radius', 'blur', 'intensity', 'lightAngle1', 'lightAngle2', 'light2Strength'];

      controls.forEach(name => {
        const input = document.getElementById(name);
        const valueEl = document.getElementById(`${name}-val`);

        input.addEventListener('input', () => {
          const val = parseInt(input.value);
          currentParams[name] = val;

          if (name === 'intensity' || name === 'light2Strength') {
            valueEl.textContent = `${val}%`;
          } else if (name === 'lightAngle1' || name === 'lightAngle2') {
            valueEl.textContent = `${val}deg (${angleToClockPosition(val)})`;
          } else {
            valueEl.textContent = `${val}px`;
          }

          updateAll();
        });
      });

      document.querySelectorAll('.background-select button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.background-select button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('demo-container').className = 'demo-container bg-' + btn.dataset.bg;
        });
      });

      updateAll();
    }

    init();
  </script>
</body>
</html>
