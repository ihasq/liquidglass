<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Specular Methods - Performance Benchmark</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 300;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .benchmark-container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      overflow: hidden;
    }

    .results-table th,
    .results-table td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .results-table th {
      background: rgba(255,255,255,0.1);
      font-weight: 500;
    }

    .results-table tr:last-child td {
      border-bottom: none;
    }

    .bar-container {
      width: 200px;
      height: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s ease-out;
    }

    .bar.fast { background: linear-gradient(90deg, #00b894, #00cec9); }
    .bar.medium { background: linear-gradient(90deg, #fdcb6e, #e17055); }
    .bar.slow { background: linear-gradient(90deg, #e17055, #d63031); }

    .status {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #888;
    }

    .test-area {
      position: fixed;
      top: -1000px;
      left: -1000px;
      width: 400px;
      height: 300px;
      background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
    }

    .test-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 200px;
      border-radius: 24px;
    }

    .metric {
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 14px;
    }

    .metric.best {
      color: #00cec9;
      font-weight: bold;
    }

    .summary {
      margin-top: 30px;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }

    .summary h3 {
      margin-bottom: 15px;
      color: #667eea;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .summary-card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }

    .summary-value {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }

    .summary-label {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
    }

    .svg-defs {
      position: absolute;
      width: 0;
      height: 0;
    }
  </style>
</head>
<body>
  <h1>Specular Methods - Performance Benchmark</h1>

  <div class="controls">
    <button id="run-benchmark">Run Benchmark</button>
    <button id="run-resize-test">Run Resize Stress Test</button>
  </div>

  <div class="benchmark-container">
    <div class="status" id="status">Click "Run Benchmark" to start performance measurement</div>

    <table class="results-table" id="results-table" style="display: none;">
      <thead>
        <tr>
          <th>Method</th>
          <th>Filter Creation</th>
          <th>First Paint</th>
          <th>Resize (avg)</th>
          <th>Relative Cost</th>
        </tr>
      </thead>
      <tbody id="results-body">
      </tbody>
    </table>

    <div class="summary" id="summary" style="display: none;">
      <h3>Summary</h3>
      <div class="summary-grid" id="summary-grid">
      </div>
    </div>
  </div>

  <!-- Hidden test area -->
  <div class="test-area" id="test-area">
    <div class="test-panel" id="test-panel"></div>
  </div>

  <svg class="svg-defs" xmlns="http://www.w3.org/2000/svg">
    <defs id="filter-defs"></defs>
  </svg>

  <script type="module">
    // Same filter creation functions as index.html
    // ... (abbreviated for clarity, would include all methods)

    const methods = [
      { id: 'static', name: 'Static (Current)' },
      { id: 'luma-extract', name: 'Luminance Extract' },
      { id: 'directional-blur', name: 'Directional Blur' },
      { id: 'fresnel-hybrid', name: 'Fresnel Hybrid' },
      { id: 'multi-ibl', name: 'Multi-stage IBL' },
      { id: 'svg-specular', name: 'feSpecularLighting' }
    ];

    // Simplified filter generators for benchmarking
    function generateEdgeMask(width, height, radius) {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      const halfW = width / 2;
      const halfH = height / 2;
      const r = Math.min(radius, halfW, halfH);
      const innerW = halfW - r;
      const innerH = halfH - r;
      const ringWidth = Math.max(3, Math.min(width, height) * 0.015);

      const imageData = ctx.createImageData(width, height);
      const data = imageData.data;

      for (let py = 0; py < height; py++) {
        for (let px = 0; px < width; px++) {
          const idx = (py * width + px) * 4;
          const dx = px - halfW;
          const dy = py - halfH;
          const absX = Math.abs(dx);
          const absY = Math.abs(dy);

          let inBounds = true;
          if (absX > innerW && absY > innerH) {
            const cornerX = absX - innerW;
            const cornerY = absY - innerH;
            if (cornerX * cornerX + cornerY * cornerY > r * r) {
              inBounds = false;
            }
          } else if (absX > halfW || absY > halfH) {
            inBounds = false;
          }

          if (!inBounds) {
            data[idx] = data[idx + 1] = data[idx + 2] = data[idx + 3] = 0;
            continue;
          }

          let edgeDist;
          if (absX <= innerW && absY <= innerH) {
            edgeDist = Math.min(halfW - absX, halfH - absY);
          } else if (absX <= innerW) {
            edgeDist = halfH - absY;
          } else if (absY <= innerH) {
            edgeDist = halfW - absX;
          } else {
            const cornerX = absX - innerW;
            const cornerY = absY - innerH;
            edgeDist = r - Math.sqrt(cornerX * cornerX + cornerY * cornerY);
          }

          const ringStart = 1;
          const ringEnd = ringStart + ringWidth;
          let alpha = 0;

          if (edgeDist >= ringStart && edgeDist <= ringEnd) {
            const ringPos = (edgeDist - ringStart) / ringWidth;
            alpha = Math.sin(ringPos * Math.PI);
          }

          const brightness = Math.round(255 * alpha);
          data[idx] = data[idx + 1] = data[idx + 2] = 255;
          data[idx + 3] = brightness;
        }
      }

      ctx.putImageData(imageData, 0, 0);
      return canvas.toDataURL('image/png');
    }

    function createFilter(methodId, params) {
      const { width, height, radius, blur, intensity } = params;
      const edgeMask = generateEdgeMask(width, height, radius);

      // Simplified filters for benchmarking
      const filters = {
        'static': `
          <filter id="bench-static" x="-10%" y="-10%" width="120%" height="120%"
                  filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse">
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>
            <feImage href="${edgeMask}" x="0" y="0" width="${width}" height="${height}" preserveAspectRatio="none" result="specMap"/>
            <feComponentTransfer in="specMap" result="specAdjusted">
              <feFuncA type="linear" slope="${intensity / 100}"/>
            </feComponentTransfer>
            <feBlend in="specAdjusted" in2="blurred" mode="screen"/>
          </filter>`,

        'luma-extract': `
          <filter id="bench-luma-extract" x="-10%" y="-10%" width="120%" height="120%"
                  filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse">
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>
            <feColorMatrix in="SourceGraphic" type="matrix"
              values="0.299 0.587 0.114 0 0 0.299 0.587 0.114 0 0 0.299 0.587 0.114 0 0 0 0 0 1 0" result="luma"/>
            <feGaussianBlur in="luma" stdDeviation="${blur * 1.5}" result="lumaBlur"/>
            <feImage href="${edgeMask}" x="0" y="0" width="${width}" height="${height}" preserveAspectRatio="none" result="edgeMask"/>
            <feComposite in="lumaBlur" in2="edgeMask" operator="in" result="edgeLuma"/>
            <feComponentTransfer in="edgeLuma" result="specular">
              <feFuncR type="gamma" amplitude="${intensity / 50}" exponent="1.5" offset="0"/>
              <feFuncG type="gamma" amplitude="${intensity / 50}" exponent="1.5" offset="0"/>
              <feFuncB type="gamma" amplitude="${intensity / 50}" exponent="1.5" offset="0"/>
              <feFuncA type="linear" slope="${intensity / 100}"/>
            </feComponentTransfer>
            <feBlend in="specular" in2="blurred" mode="screen"/>
          </filter>`,

        'directional-blur': `
          <filter id="bench-directional-blur" x="-20%" y="-20%" width="140%" height="140%"
                  filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse">
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 4}" result="envProbe"/>
            <feImage href="${edgeMask}" x="0" y="0" width="${width}" height="${height}" preserveAspectRatio="none" result="normalMap"/>
            <feDisplacementMap in="envProbe" in2="normalMap" scale="${intensity * 0.5}" xChannelSelector="R" yChannelSelector="G" result="reflected"/>
            <feComponentTransfer in="reflected" result="specular">
              <feFuncR type="linear" slope="1.5" intercept="-0.3"/>
              <feFuncG type="linear" slope="1.5" intercept="-0.3"/>
              <feFuncB type="linear" slope="1.5" intercept="-0.3"/>
              <feFuncA type="linear" slope="${intensity / 100}"/>
            </feComponentTransfer>
            <feBlend in="specular" in2="blurred" mode="screen"/>
          </filter>`,

        'fresnel-hybrid': `
          <filter id="bench-fresnel-hybrid" x="-10%" y="-10%" width="120%" height="120%"
                  filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse">
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 2}" result="envBlur"/>
            <feColorMatrix in="envBlur" type="matrix"
              values="0.299 0.587 0.114 0 0 0.299 0.587 0.114 0 0 0.299 0.587 0.114 0 0 0 0 0 1 0" result="envLuma"/>
            <feImage href="${edgeMask}" x="0" y="0" width="${width}" height="${height}" preserveAspectRatio="none" result="fresnel"/>
            <feBlend in="fresnel" in2="envLuma" mode="multiply" result="fresnelEnv"/>
            <feComponentTransfer in="fresnelEnv" result="specular">
              <feFuncR type="linear" slope="${intensity / 40}"/>
              <feFuncG type="linear" slope="${intensity / 40}"/>
              <feFuncB type="linear" slope="${intensity / 40}"/>
              <feFuncA type="linear" slope="${intensity / 100}"/>
            </feComponentTransfer>
            <feBlend in="specular" in2="blurred" mode="screen"/>
          </filter>`,

        'multi-ibl': `
          <filter id="bench-multi-ibl" x="-10%" y="-10%" width="120%" height="120%"
                  filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse">
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 0.5}" result="ibl0"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 2}" result="ibl1"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 5}" result="ibl2"/>
            <feImage href="${edgeMask}" x="0" y="0" width="${width}" height="${height}" preserveAspectRatio="none" result="roughMap"/>
            <feComposite in="ibl0" in2="roughMap" operator="in" result="sharp"/>
            <feComposite in="ibl1" in2="roughMap" operator="in" result="medium"/>
            <feComponentTransfer in="medium" result="mediumScaled">
              <feFuncA type="linear" slope="0.5"/>
            </feComponentTransfer>
            <feBlend in="sharp" in2="mediumScaled" mode="screen" result="combined"/>
            <feComponentTransfer in="combined" result="specular">
              <feFuncR type="linear" slope="${intensity / 50}"/>
              <feFuncG type="linear" slope="${intensity / 50}"/>
              <feFuncB type="linear" slope="${intensity / 50}"/>
            </feComponentTransfer>
            <feBlend in="specular" in2="blurred" mode="screen"/>
          </filter>`,

        'svg-specular': `
          <filter id="bench-svg-specular" x="-10%" y="-10%" width="120%" height="120%"
                  filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse">
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur}" result="blurred"/>
            <feImage href="${edgeMask}" x="0" y="0" width="${width}" height="${height}" preserveAspectRatio="none" result="bumpMap"/>
            <feSpecularLighting in="bumpMap" surfaceScale="3" specularConstant="${intensity / 50}" specularExponent="20" lighting-color="white" result="specLight">
              <fePointLight x="${width * 0.7}" y="${-height * 0.3}" z="${Math.max(width, height) * 0.8}"/>
            </feSpecularLighting>
            <feGaussianBlur in="SourceGraphic" stdDeviation="${blur * 2}" result="bgBlur"/>
            <feColorMatrix in="bgBlur" type="luminanceToAlpha" result="bgLuma"/>
            <feComposite in="specLight" in2="bgLuma" operator="arithmetic" k1="0.5" k2="0.3" k3="0.2" k4="0" result="modSpec"/>
            <feBlend in="modSpec" in2="blurred" mode="screen"/>
          </filter>`
      };

      return filters[methodId];
    }

    // Benchmark functions
    async function measureFilterCreation(methodId, params) {
      const start = performance.now();
      const filterHTML = createFilter(methodId, params);
      const end = performance.now();
      return end - start;
    }

    async function measureFirstPaint(methodId, params) {
      const filterDefs = document.getElementById('filter-defs');
      const panel = document.getElementById('test-panel');

      // Create filter
      filterDefs.innerHTML = createFilter(methodId, params);

      // Force layout
      panel.style.backdropFilter = 'none';
      panel.offsetHeight; // Force reflow

      const start = performance.now();
      panel.style.backdropFilter = `url(#bench-${methodId})`;
      panel.style.webkitBackdropFilter = `url(#bench-${methodId})`;

      // Wait for paint
      await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

      const end = performance.now();
      return end - start;
    }

    async function measureResize(methodId, params, iterations = 10) {
      const filterDefs = document.getElementById('filter-defs');
      const panel = document.getElementById('test-panel');

      const times = [];
      const sizes = [
        { width: 200, height: 150 },
        { width: 280, height: 200 },
        { width: 350, height: 250 },
        { width: 280, height: 200 }
      ];

      for (let i = 0; i < iterations; i++) {
        const size = sizes[i % sizes.length];
        const newParams = { ...params, ...size };

        const start = performance.now();

        filterDefs.innerHTML = createFilter(methodId, newParams);
        panel.style.width = `${size.width}px`;
        panel.style.height = `${size.height}px`;

        await new Promise(resolve => requestAnimationFrame(resolve));

        const end = performance.now();
        times.push(end - start);
      }

      return times.reduce((a, b) => a + b, 0) / times.length;
    }

    async function runBenchmark() {
      const status = document.getElementById('status');
      const resultsTable = document.getElementById('results-table');
      const resultsBody = document.getElementById('results-body');
      const summary = document.getElementById('summary');
      const summaryGrid = document.getElementById('summary-grid');

      const runBtn = document.getElementById('run-benchmark');
      runBtn.disabled = true;

      resultsTable.style.display = 'table';
      resultsBody.innerHTML = '';
      summary.style.display = 'none';

      const params = {
        width: 280,
        height: 200,
        radius: 24,
        blur: 10,
        intensity: 60
      };

      const results = [];
      let baselineTime = 0;

      for (let i = 0; i < methods.length; i++) {
        const method = methods[i];
        status.textContent = `Testing ${method.name}... (${i + 1}/${methods.length})`;

        // Warm up
        await measureFirstPaint(method.id, params);
        await new Promise(resolve => setTimeout(resolve, 100));

        // Measure
        const createTime = await measureFilterCreation(method.id, params);
        const paintTime = await measureFirstPaint(method.id, params);
        const resizeTime = await measureResize(method.id, params, 10);

        if (i === 0) baselineTime = paintTime;

        const relativeCost = paintTime / baselineTime;

        results.push({
          method: method.name,
          createTime,
          paintTime,
          resizeTime,
          relativeCost
        });

        // Add row
        const row = document.createElement('tr');
        const barClass = relativeCost < 1.3 ? 'fast' : relativeCost < 1.8 ? 'medium' : 'slow';

        row.innerHTML = `
          <td>${method.name}</td>
          <td class="metric">${createTime.toFixed(2)}ms</td>
          <td class="metric">${paintTime.toFixed(2)}ms</td>
          <td class="metric">${resizeTime.toFixed(2)}ms</td>
          <td>
            <div class="bar-container">
              <div class="bar ${barClass}" style="width: ${Math.min(100, relativeCost * 50)}%"></div>
            </div>
            <span class="metric">${relativeCost.toFixed(2)}x</span>
          </td>
        `;
        resultsBody.appendChild(row);

        await new Promise(resolve => setTimeout(resolve, 50));
      }

      // Find best
      const bestPaint = Math.min(...results.map(r => r.paintTime));
      const bestResize = Math.min(...results.map(r => r.resizeTime));

      resultsBody.querySelectorAll('tr').forEach((row, i) => {
        const cells = row.querySelectorAll('.metric');
        if (results[i].paintTime === bestPaint) cells[1].classList.add('best');
        if (results[i].resizeTime === bestResize) cells[2].classList.add('best');
      });

      // Show summary
      summary.style.display = 'block';
      summaryGrid.innerHTML = `
        <div class="summary-card">
          <div class="summary-value">${results[0].paintTime.toFixed(1)}ms</div>
          <div class="summary-label">Static Baseline</div>
        </div>
        <div class="summary-card">
          <div class="summary-value">${(results.reduce((a, r) => a + r.paintTime, 0) / results.length).toFixed(1)}ms</div>
          <div class="summary-label">Average Paint Time</div>
        </div>
        <div class="summary-card">
          <div class="summary-value">${Math.max(...results.map(r => r.relativeCost)).toFixed(2)}x</div>
          <div class="summary-label">Max Overhead</div>
        </div>
        <div class="summary-card">
          <div class="summary-value">${results.find(r => r.method.includes('Fresnel')).relativeCost.toFixed(2)}x</div>
          <div class="summary-label">Fresnel Hybrid Cost</div>
        </div>
      `;

      status.textContent = 'Benchmark complete!';
      runBtn.disabled = false;
    }

    async function runResizeStressTest() {
      const status = document.getElementById('status');
      const runBtn = document.getElementById('run-resize-test');
      runBtn.disabled = true;

      const panel = document.getElementById('test-panel');
      const filterDefs = document.getElementById('filter-defs');

      status.textContent = 'Running resize stress test...';

      const params = { width: 280, height: 200, radius: 24, blur: 10, intensity: 60 };

      for (const method of methods) {
        status.textContent = `Stress testing ${method.name}...`;

        filterDefs.innerHTML = createFilter(method.id, params);
        panel.style.backdropFilter = `url(#bench-${method.id})`;

        const startTime = performance.now();
        let frames = 0;

        // Rapid resize for 2 seconds
        while (performance.now() - startTime < 2000) {
          const w = 200 + Math.random() * 200;
          const h = 150 + Math.random() * 150;

          const newParams = { ...params, width: w, height: h };
          filterDefs.innerHTML = createFilter(method.id, newParams);
          panel.style.width = `${w}px`;
          panel.style.height = `${h}px`;

          await new Promise(resolve => requestAnimationFrame(resolve));
          frames++;
        }

        const fps = frames / 2;
        console.log(`${method.name}: ${fps.toFixed(1)} FPS during stress`);
      }

      status.textContent = 'Stress test complete! Check console for FPS results.';
      runBtn.disabled = false;
    }

    document.getElementById('run-benchmark').addEventListener('click', runBenchmark);
    document.getElementById('run-resize-test').addEventListener('click', runResizeStressTest);
  </script>
</body>
</html>
