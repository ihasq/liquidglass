<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 20px; background: #f0f0f0; font-family: sans-serif; }
.container { display: flex; gap: 20px; flex-wrap: wrap; }
.test { width: 210px; height: 150px; position: relative; display: inline-block; margin: 10px; border-radius: 30px; overflow: hidden; }
.bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(0deg, #333 0px, #333 2px, transparent 2px, transparent 20px),
              repeating-linear-gradient(90deg, #333 0px, #333 2px, transparent 2px, transparent 20px),
              linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 50%, #45b7d1 100%); }
.glass { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.label { text-align: center; margin-top: 5px; font-size: 12px; font-weight: bold; }
.controls { margin: 20px 0; padding: 15px; background: #fff; border-radius: 8px; }
</style>
</head>
<body>
<h2>YogaDM Uniform Scale Radius Demo</h2>
<p>Source WebP: 210x150, R=30. Uniform scaling for radius >= 30px. Smaller radii require asset regeneration.</p>

<svg style="position:absolute;width:0;height:0"><defs>
<!-- Filters will be created dynamically -->
</defs></svg>

<div class="container" id="demos"></div>

<div class="controls">
  <label>Add Custom Radius: <input type="number" id="customRadius" value="60" min="5" max="70"></label>
  <button onclick="addDemo(parseInt(document.getElementById('customRadius').value))">Add</button>
</div>

<script>
const SRC_W = 210, SRC_H = 150, SRC_R = 30;
const SRC_EDGE_W = SRC_W - 2 * SRC_R;
const SRC_EDGE_H = SRC_H - 2 * SRC_R;
const WEBP_URL = '/demo/displacement-map.webp';

let filterCount = 0;

function buildFilter(targetR) {
  const filterId = `yogadm-${filterCount++}`;
  const ns = 'http://www.w3.org/2000/svg';
  const defs = document.querySelector('svg defs');

  const filter = document.createElementNS(ns, 'filter');
  filter.id = filterId;
  filter.setAttribute('x', '-50%');
  filter.setAttribute('y', '-50%');
  filter.setAttribute('width', '200%');
  filter.setAttribute('height', '200%');
  filter.setAttribute('filterUnits', 'objectBoundingBox');
  filter.setAttribute('primitiveUnits', 'userSpaceOnUse');
  filter.setAttribute('color-interpolation-filters', 'sRGB');

  const W = 210, H = 150;

  // Uniform scaling: scale factor based on radius ratio
  const scale = targetR / SRC_R;

  let offsetX, offsetY, scaledW, scaledH;

  if (scale >= 1) {
    // Scale up: center the larger image (corners are zoomed in)
    scaledW = W * scale;
    scaledH = H * scale;
    offsetX = (W - scaledW) / 2;
    offsetY = (H - scaledH) / 2;
  } else {
    // Scale down: use original size at (0,0) to ensure full coverage
    // Smaller radii than source cannot be achieved without asset regeneration
    // Fall back to source radius (scale = 1)
    scaledW = W;
    scaledH = H;
    offsetX = 0;
    offsetY = 0;
  }

  filter.innerHTML = `
    <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blur"/>
    <feImage href="${WEBP_URL}" x="${offsetX}" y="${offsetY}" width="${scaledW}" height="${scaledH}" preserveAspectRatio="none" result="disp"/>
    <feDisplacementMap in="blur" in2="disp" scale="98" xChannelSelector="R" yChannelSelector="G"/>
  `;

  defs.appendChild(filter);
  return filterId;
}

function addDemo(radius) {
  const container = document.getElementById('demos');
  const filterId = buildFilter(radius);

  const wrapper = document.createElement('div');
  wrapper.innerHTML = `
    <div class="test" style="border-radius:${radius}px">
      <div class="bg"></div>
      <div class="glass" style="backdrop-filter:url(#${filterId})"></div>
    </div>
    <div class="label">R=${radius}px ${radius === SRC_R ? '(baseline)' : ''}</div>
  `;
  container.appendChild(wrapper);
}

// Create demos for various radii
// Note: Radii smaller than source (30px) fall back to source radius
[30, 45, 60, 75].forEach(addDemo);
</script>
</body>
</html>
