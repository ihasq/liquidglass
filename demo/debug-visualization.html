<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Displacement Map Visualization</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: white;
      padding: 40px;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
    }
    .map-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    canvas {
      border: 2px solid #333;
      border-radius: 8px;
    }
    h2 {
      margin: 0 0 30px 0;
    }
    h3 {
      margin: 0;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>
  <h2>Displacement Map Debug Visualization</h2>
  <div class="container" id="container"></div>

  <script type="module">
    import { generateDisplacementMap, generateSpecularMap, getProfile } from '../src/index.ts';

    const container = document.getElementById('container');
    const profiles = ['squircle', 'circle', 'lip', 'parabolic', 'concave'];

    for (const profile of profiles) {
      const div = document.createElement('div');
      div.className = 'map-preview';

      // Generate displacement map
      const dispResult = generateDisplacementMap({
        width: 200,
        height: 200,
        profile: profile,
        refractiveIndex: 1.5,
        thickness: 1.0,
        refractionLevel: 1.0,
        borderRadius: profile === 'circle' ? 100 : 20
      });

      const dispCanvas = dispResult.canvas;
      dispCanvas.style.width = '200px';
      dispCanvas.style.height = '200px';

      // Generate specular map
      const specResult = generateSpecularMap({
        width: 200,
        height: 200,
        profile: profile,
        lightDirection: { x: 0.6, y: -0.8 },
        intensity: 0.5,
        saturation: 0.2,
        borderRadius: profile === 'circle' ? 100 : 20
      });

      const specCanvas = specResult.canvas;
      specCanvas.style.width = '200px';
      specCanvas.style.height = '200px';

      // Create labels
      const dispLabel = document.createElement('h3');
      dispLabel.textContent = `${profile} - Displacement`;

      const specLabel = document.createElement('h3');
      specLabel.textContent = `${profile} - Specular`;

      // Create wrapper divs
      const dispWrapper = document.createElement('div');
      dispWrapper.className = 'map-preview';
      dispWrapper.appendChild(dispLabel);
      dispWrapper.appendChild(dispCanvas);

      const specWrapper = document.createElement('div');
      specWrapper.className = 'map-preview';
      specWrapper.appendChild(specLabel);
      specWrapper.appendChild(specCanvas);

      container.appendChild(dispWrapper);
      container.appendChild(specWrapper);
    }

    console.log('Visualization generated');
  </script>
</body>
</html>
