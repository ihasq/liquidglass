<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 20px; background: #f0f0f0; font-family: sans-serif; }
.container { display: flex; gap: 20px; }
.test { width: 210px; height: 150px; position: relative; display: inline-block; border-radius: 30px; overflow: hidden; }
.test.r60 { border-radius: 60px; }
.bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(0deg, #333 0px, #333 2px, transparent 2px, transparent 20px),
              repeating-linear-gradient(90deg, #333 0px, #333 2px, transparent 2px, transparent 20px),
              linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 50%, #45b7d1 100%); }
.glass { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.label { text-align: center; margin-top: 5px; font-size: 12px; }
</style>
</head>
<body>
<h2>Corner Scaling Test</h2>

<svg style="position:absolute;width:0;height:0"><defs>
<!-- R=30 baseline (single feImage) -->
<filter id="f30" x="-10%" y="-10%" width="120%" height="120%" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
  <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blur"/>
  <feImage href="/demo/displacement-map.webp" x="0" y="0" width="210" height="150" preserveAspectRatio="none" result="disp"/>
  <feDisplacementMap in="blur" in2="disp" scale="98" xChannelSelector="R" yChannelSelector="G"/>
</filter>

<!-- R=60 just top-left corner, scaled 2x -->
<filter id="f60-tl" x="-10%" y="-10%" width="120%" height="120%" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
  <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blur"/>
  <!-- Scale entire image 2x, mask to 60x60 -->
  <feImage href="/demo/displacement-map.webp" x="0" y="0" width="420" height="300" preserveAspectRatio="none" result="disp"/>
  <feDisplacementMap in="blur" in2="disp" scale="98" xChannelSelector="R" yChannelSelector="G"/>
</filter>
</defs></svg>

<div class="container">
  <div>
    <div class="test"><div class="bg"></div><div class="glass" style="backdrop-filter:url(#f30)"></div></div>
    <div class="label">R=30 (baseline)</div>
  </div>
  <div>
    <div class="test r60"><div class="bg"></div><div class="glass" style="backdrop-filter:url(#f60-tl)"></div></div>
    <div class="label">R=60 with 2x scaled WebP</div>
  </div>
</div>

</body>
</html>
