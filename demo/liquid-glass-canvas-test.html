<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Glass - Canvas Displacement Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 40px;
      position: relative;
    }

    .grid-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      display: grid;
      grid-template-columns: repeat(auto-fill, 50px);
      grid-template-rows: repeat(auto-fill, 50px);
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }

    .grid-cell {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      font-family: 'SF Mono', Monaco, monospace;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .grid-cell:nth-child(odd) {
      background: rgba(255,100,100,0.3);
      color: #ff6b6b;
    }

    .grid-cell:nth-child(even) {
      background: rgba(100,200,255,0.3);
      color: #4ecdc4;
    }

    h1 {
      color: white;
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    .controls {
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 30px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .control-group label {
      color: white;
      font-size: 14px;
      min-width: 100px;
    }

    .control-group input[type="range"] {
      width: 150px;
    }

    .control-group span {
      color: #0f0;
      font-family: monospace;
      min-width: 60px;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }

    .demo-card {
      background: transparent;
      border: 1px dashed rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 20px;
    }

    .demo-card h3 {
      color: white;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .glass-container {
      position: relative;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glass-panel {
      --liquidglass-refraction: 50;
      --liquidglass-thickness: 50;
      --liquidglass-softness: 10;
      --liquidglass-gloss: 50;
      padding: 30px;
      color: white;
      font-weight: 600;
      text-align: center;
      cursor: grab;
      user-select: none;
      background: rgba(255, 255, 255, 0.08);
    }

    .glass-panel:active {
      cursor: grabbing;
    }

    .glass-panel.draggable {
      position: absolute;
      transition: none;
    }

    #glass1 {
      border-radius: 20px;
      width: 200px;
      height: 100px;
    }

    #glass2 {
      border-radius: 50px;
      width: 150px;
      height: 150px;
    }

    #glass3 {
      border-radius: 10px;
      width: 250px;
      height: 80px;
    }

    #glass4 {
      border-radius: var(--dynamic-radius, 20px);
      width: var(--dynamic-width, 200px);
      height: var(--dynamic-height, 100px);
    }

    .info {
      margin-top: 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      font-family: monospace;
    }

    .resize-handle {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 20px;
      height: 20px;
      background: rgba(255,255,255,0.3);
      border-radius: 4px;
      cursor: nwse-resize;
    }
  </style>
</head>
<body>
  <div class="grid-background" id="grid-bg"></div>
  <h1>Liquid Glass - Canvas Displacement Test</h1>

  <div class="controls">
    <div class="control-group">
      <label>Border Radius:</label>
      <input type="range" id="radius" min="0" max="100" value="20">
      <span id="radius-val">20px</span>
    </div>
    <div class="control-group">
      <label>Width:</label>
      <input type="range" id="width" min="100" max="400" value="200">
      <span id="width-val">200px</span>
    </div>
    <div class="control-group">
      <label>Height:</label>
      <input type="range" id="height" min="50" max="200" value="100">
      <span id="height-val">100px</span>
    </div>
    <div class="control-group">
      <label>Refraction:</label>
      <input type="range" id="refraction" min="0" max="100" value="50">
      <span id="refraction-val">50</span>
    </div>
    <div class="control-group">
      <label>Gloss:</label>
      <input type="range" id="gloss" min="0" max="100" value="50">
      <span id="gloss-val">50</span>
    </div>
    <div class="control-group">
      <label>Thickness:</label>
      <input type="range" id="thickness" min="0" max="100" value="50">
      <span id="thickness-val">50</span>
    </div>
  </div>

  <div class="demo-grid">
    <div class="demo-card">
      <h3>Fixed: 200x100, radius 20px</h3>
      <div class="glass-container">
        <div class="glass-panel" id="glass1">Liquid Glass</div>
      </div>
      <div class="info" id="info1">Loading...</div>
    </div>

    <div class="demo-card">
      <h3>Circle: 150x150, radius 50px</h3>
      <div class="glass-container">
        <div class="glass-panel" id="glass2">Circle</div>
      </div>
      <div class="info" id="info2">Loading...</div>
    </div>

    <div class="demo-card">
      <h3>Wide: 250x80, radius 10px</h3>
      <div class="glass-container">
        <div class="glass-panel" id="glass3">Wide Panel</div>
      </div>
      <div class="info" id="info3">Loading...</div>
    </div>

    <div class="demo-card">
      <h3>Dynamic (controlled by sliders)</h3>
      <div class="glass-container">
        <div class="glass-panel" id="glass4">Dynamic</div>
      </div>
      <div class="info" id="info4">Loading...</div>
    </div>
  </div>

  <script>
    // Generate grid background with letters and numbers
    (function() {
      const grid = document.getElementById('grid-bg');
      const cols = Math.ceil(window.innerWidth / 50);
      const rows = Math.ceil(window.innerHeight / 50) + 10;
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';

      for (let i = 0; i < rows * cols; i++) {
        const cell = document.createElement('div');
        cell.className = 'grid-cell';
        cell.textContent = chars[i % chars.length];
        grid.appendChild(cell);
      }
    })();
  </script>

  <script type="module">
    import '../src/liquidglass.ts';

    // Update info for each glass element
    function updateInfo(id) {
      const el = document.getElementById(id);
      const info = document.getElementById(id.replace('glass', 'info'));
      const style = getComputedStyle(el);
      const rect = el.getBoundingClientRect();

      info.textContent = `${Math.round(rect.width)}x${Math.round(rect.height)}, radius: ${style.borderRadius}`;
    }

    // Initial info update
    setTimeout(() => {
      updateInfo('glass1');
      updateInfo('glass2');
      updateInfo('glass3');
      updateInfo('glass4');
    }, 100);

    // Dynamic controls for glass4
    const glass4 = document.getElementById('glass4');

    document.getElementById('radius').addEventListener('input', e => {
      const val = e.target.value;
      document.getElementById('radius-val').textContent = val + 'px';
      document.documentElement.style.setProperty('--dynamic-radius', val + 'px');
      // Force style recalculation
      glass4.style.borderRadius = val + 'px';
      setTimeout(() => updateInfo('glass4'), 50);
    });

    document.getElementById('width').addEventListener('input', e => {
      const val = e.target.value;
      document.getElementById('width-val').textContent = val + 'px';
      glass4.style.width = val + 'px';
      setTimeout(() => updateInfo('glass4'), 50);
    });

    document.getElementById('height').addEventListener('input', e => {
      const val = e.target.value;
      document.getElementById('height-val').textContent = val + 'px';
      glass4.style.height = val + 'px';
      setTimeout(() => updateInfo('glass4'), 50);
    });

    document.getElementById('refraction').addEventListener('input', e => {
      const val = e.target.value;
      document.getElementById('refraction-val').textContent = val;
      glass4.style.setProperty('--liquidglass-refraction', val);
    });

    document.getElementById('gloss').addEventListener('input', e => {
      const val = e.target.value;
      document.getElementById('gloss-val').textContent = val;
      glass4.style.setProperty('--liquidglass-gloss', val);
    });

    document.getElementById('thickness').addEventListener('input', e => {
      const val = e.target.value;
      document.getElementById('thickness-val').textContent = val;
      glass4.style.setProperty('--liquidglass-thickness', val);
    });

    // Drag functionality
    document.querySelectorAll('.glass-panel').forEach(el => {
      el.classList.add('draggable');

      // Set initial position
      const container = el.parentElement;
      const rect = el.getBoundingClientRect();
      const containerRect = container.getBoundingClientRect();
      el.style.left = (rect.left - containerRect.left) + 'px';
      el.style.top = (rect.top - containerRect.top) + 'px';

      let isDragging = false;
      let startX, startY, initialX, initialY;

      el.addEventListener('mousedown', e => {
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        initialX = el.offsetLeft;
        initialY = el.offsetTop;
        el.style.zIndex = 1000;
      });

      document.addEventListener('mousemove', e => {
        if (!isDragging) return;

        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        el.style.left = (initialX + dx) + 'px';
        el.style.top = (initialY + dy) + 'px';
      });

      document.addEventListener('mouseup', () => {
        if (isDragging) {
          isDragging = false;
          el.style.zIndex = '';
        }
      });

      // Touch support
      el.addEventListener('touchstart', e => {
        isDragging = true;
        const touch = e.touches[0];
        startX = touch.clientX;
        startY = touch.clientY;
        initialX = el.offsetLeft;
        initialY = el.offsetTop;
        el.style.zIndex = 1000;
      }, { passive: true });

      document.addEventListener('touchmove', e => {
        if (!isDragging) return;
        const touch = e.touches[0];
        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;
        el.style.left = (initialX + dx) + 'px';
        el.style.top = (initialY + dy) + 'px';
      }, { passive: true });

      document.addEventListener('touchend', () => {
        if (isDragging) {
          isDragging = false;
          el.style.zIndex = '';
        }
      });
    });
  </script>
</body>
</html>
