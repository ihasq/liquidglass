<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 20px; background: #f0f0f0; font-family: sans-serif; }
.test { width: 210px; height: 150px; position: relative; display: inline-block; margin: 10px; border-radius: 30px; overflow: hidden; }
.bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(0deg, #333 0px, #333 2px, transparent 2px, transparent 20px),
              repeating-linear-gradient(90deg, #333 0px, #333 2px, transparent 2px, transparent 20px),
              linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 50%, #45b7d1 100%); }
.glass { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.label { text-align: center; margin-top: 5px; font-size: 12px; }
</style>
</head>
<body>
<h2>Simple Filter Comparison (No 9-Slice)</h2>

<svg style="position:absolute;width:0;height:0"><defs>
<!-- Kube PNG filter -->
<filter id="kube-filter" x="0" y="0" width="100%" height="100%" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
  <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blur"/>
  <feImage id="kube-disp" x="0" y="0" width="210" height="150" preserveAspectRatio="none" result="disp"/>
  <feDisplacementMap in="blur" in2="disp" scale="98" xChannelSelector="R" yChannelSelector="G"/>
</filter>

<!-- WebP filter (identical structure) -->
<filter id="webp-filter" x="0" y="0" width="100%" height="100%" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
  <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blur"/>
  <feImage id="webp-disp" href="/demo/displacement-map.webp" x="0" y="0" width="210" height="150" preserveAspectRatio="none" result="disp"/>
  <feDisplacementMap in="blur" in2="disp" scale="98" xChannelSelector="R" yChannelSelector="G"/>
</filter>
</defs></svg>

<div class="test"><div class="bg"></div><div class="glass" style="backdrop-filter:url(#kube-filter)"></div></div>
<div class="test"><div class="bg"></div><div class="glass" style="backdrop-filter:url(#webp-filter)"></div></div>

<div class="label">Kube PNG</div>
<div class="label" style="margin-left:180px">WebP</div>

<script>
(async () => {
  const blob = await (await fetch('/e2e/debug/kube-assets/displacement-map-w2qrsb.png')).blob();
  document.getElementById('kube-disp').setAttribute('href', URL.createObjectURL(blob));
  console.log('Loaded Kube PNG');
})();
</script>
</body>
</html>
