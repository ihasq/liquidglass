<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background:
        repeating-linear-gradient(0deg, #000 0px, #000 1px, transparent 1px, transparent 50px),
        repeating-linear-gradient(90deg, #000 0px, #000 1px, transparent 1px, transparent 50px),
        #fff;
    }
    liquid-glass {
      display: block;
      width: 300px;
      height: 200px;

    background-opacity="0"
  ></liquid-glass>
  <script type="module">
    import { registerLiquidGlassElement } from '../src/index.ts';
    registerLiquidGlassElement();

</html>
