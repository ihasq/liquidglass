<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 20px; background: #f0f0f0; font-family: sans-serif; }
.container { display: flex; gap: 20px; flex-wrap: wrap; }
.panel { display: inline-block; }
.test { width: 210px; height: 150px; position: relative; border-radius: 30px; overflow: hidden; }
.bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(0deg, #333 0px, #333 2px, transparent 2px, transparent 20px),
              repeating-linear-gradient(90deg, #333 0px, #333 2px, transparent 2px, transparent 20px),
              linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 50%, #45b7d1 100%); }
.glass { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.label { text-align: center; margin-top: 5px; font-size: 12px; }
</style>
</head>
<body>
<h2>Uniform Scale Test (No 9-Slice)</h2>
<p>Scaling the entire displacement map uniformly to change corner radius.</p>

<svg style="position:absolute;width:0;height:0"><defs>
<!-- Base: 210x150, R=30 (scale=1.0) -->
<filter id="r30" x="-50%" y="-50%" width="200%" height="200%" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
  <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blur"/>
  <feImage href="/demo/displacement-map.webp" x="0" y="0" width="210" height="150" preserveAspectRatio="none" result="disp"/>
  <feDisplacementMap in="blur" in2="disp" scale="98" xChannelSelector="R" yChannelSelector="G"/>
</filter>

<!-- R=45: scale by 1.5x (45/30), center the larger image -->
<filter id="r45" x="-50%" y="-50%" width="200%" height="200%" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
  <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blur"/>
  <!-- 210*1.5=315, 150*1.5=225. Center: x=(210-315)/2=-52.5, y=(150-225)/2=-37.5 -->
  <feImage href="/demo/displacement-map.webp" x="-52.5" y="-37.5" width="315" height="225" preserveAspectRatio="none" result="disp"/>
  <feDisplacementMap in="blur" in2="disp" scale="98" xChannelSelector="R" yChannelSelector="G"/>
</filter>

<!-- R=60: scale by 2x (60/30), center the larger image -->
<filter id="r60" x="-50%" y="-50%" width="200%" height="200%" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
  <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blur"/>
  <!-- 210*2=420, 150*2=300. Center: x=(210-420)/2=-105, y=(150-300)/2=-75 -->
  <feImage href="/demo/displacement-map.webp" x="-105" y="-75" width="420" height="300" preserveAspectRatio="none" result="disp"/>
  <feDisplacementMap in="blur" in2="disp" scale="98" xChannelSelector="R" yChannelSelector="G"/>
</filter>

<!-- R=15: scale by 0.5x (15/30), center the smaller image -->
<filter id="r15" x="-50%" y="-50%" width="200%" height="200%" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
  <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blur"/>
  <!-- 210*0.5=105, 150*0.5=75. Center: x=(210-105)/2=52.5, y=(150-75)/2=37.5 -->
  <feImage href="/demo/displacement-map.webp" x="52.5" y="37.5" width="105" height="75" preserveAspectRatio="none" result="disp"/>
  <feDisplacementMap in="blur" in2="disp" scale="98" xChannelSelector="R" yChannelSelector="G"/>
</filter>
</defs></svg>

<div class="container">
  <div class="panel">
    <div class="test" style="border-radius:15px"><div class="bg"></div><div class="glass" style="backdrop-filter:url(#r15)"></div></div>
    <div class="label">R=15 (0.5x scale)</div>
  </div>
  <div class="panel">
    <div class="test" style="border-radius:30px"><div class="bg"></div><div class="glass" style="backdrop-filter:url(#r30)"></div></div>
    <div class="label">R=30 (baseline)</div>
  </div>
  <div class="panel">
    <div class="test" style="border-radius:45px"><div class="bg"></div><div class="glass" style="backdrop-filter:url(#r45)"></div></div>
    <div class="label">R=45 (1.5x scale)</div>
  </div>
  <div class="panel">
    <div class="test" style="border-radius:60px"><div class="bg"></div><div class="glass" style="backdrop-filter:url(#r60)"></div></div>
    <div class="label">R=60 (2x scale)</div>
  </div>
</div>

</body>
</html>
